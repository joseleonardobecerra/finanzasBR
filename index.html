<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Finanzas Familia - Master Excel & Cloud</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      document.getElementById('root').innerHTML = `
        <div style="padding: 20px; color: #ff8080; font-family: sans-serif; background-color: #0f0f11; height: 100vh;">
          <h2 style="font-weight: bold; margin-bottom: 10px;">Oops! Error al cargar:</h2>
          <p>${message}</p>
          <p style="font-size: 12px; margin-top: 10px; color: #a0a0a0;">Línea: ${lineno}</p>
        </div>
      `;
      return true;
    };
  </script>
</head>
<body class="bg-[#0f0f11] text-slate-200">
  
  <div id="root">
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif;">
      <div style="width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px;"></div>
      <p style="color: #94a3b8; font-size: 14px; font-weight: 500;">Conectando FinanzasFamilia...</p>
      <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    // ============================================================================
    // ☁️ CONFIGURACIÓN DE FIREBASE (Con tus credenciales)
    // ============================================================================
    const firebaseConfig = {
      apiKey: "AIzaSyDRreZW3bVZG7h7frWeOy0jqrgqLpTw6cw",
      authDomain: "finanzasbr2026.firebaseapp.com",
      projectId: "finanzasbr2026",
      storageBucket: "finanzasbr2026.firebasestorage.app",
      messagingSenderId: "718446857856",
      appId: "1:718446857856:web:9720f19c580a464d616065",
      measurementId: "G-8XXLCBGP0Z"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    const cloudDocRef = db.collection('finanzas').doc('datos_familia');

    // --- ÍCONOS ---
    const SvgWrapper = ({ size=18, className="", children }) => (
      <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{children}</svg>
    );

    const LayoutDashboard = (p) => <SvgWrapper {...p}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></SvgWrapper>;
    const Wallet = (p) => <SvgWrapper {...p}><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></SvgWrapper>;
    const Receipt = (p) => <SvgWrapper {...p}><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17.5v-11"/></SvgWrapper>;
    const ShieldAlert = (p) => <SvgWrapper {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v4"/><path d="M12 16h.01"/></SvgWrapper>;
    const Target = (p) => <SvgWrapper {...p}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></SvgWrapper>;
    const TrendingUp = (p) => <SvgWrapper {...p}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></SvgWrapper>;
    const Calculator = (p) => <SvgWrapper {...p}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></SvgWrapper>;
    const Plus = (p) => <SvgWrapper {...p}><path d="M5 12h14"/><path d="M12 5v14"/></SvgWrapper>;
    const Trash2 = (p) => <SvgWrapper {...p}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></SvgWrapper>;
    const AlertCircle = (p) => <SvgWrapper {...p}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></SvgWrapper>;
    const CheckCircle2 = (p) => <SvgWrapper {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></SvgWrapper>;
    const Info = (p) => <SvgWrapper {...p}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></SvgWrapper>;
    const Settings2 = (p) => <SvgWrapper {...p}><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></SvgWrapper>;
    const Download = (p) => <SvgWrapper {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></SvgWrapper>;
    const Upload = (p) => <SvgWrapper {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></SvgWrapper>;
    const Landmark = (p) => <SvgWrapper {...p}><line x1="3" x2="21" y1="22" y2="22"/><line x1="6" x2="6" y1="18" y2="11"/><line x1="10" x2="10" y1="18" y2="11"/><line x1="14" x2="14" y1="18" y2="11"/><line x1="18" x2="18" y1="18" y2="11"/><polygon points="12 2 20 7 4 7"/></SvgWrapper>;
    const ArrowRightLeft = (p) => <SvgWrapper {...p}><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></SvgWrapper>;
    const ChevronLeft = (p) => <SvgWrapper {...p}><path d="m15 18-6-6 6-6"/></SvgWrapper>;
    const ChevronRight = (p) => <SvgWrapper {...p}><path d="m9 18 6-6-6-6"/></SvgWrapper>;
    const Calendar = (p) => <SvgWrapper {...p}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></SvgWrapper>;
    const ShoppingCart = (p) => <SvgWrapper {...p}><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></SvgWrapper>;
    const Check = (p) => <SvgWrapper {...p}><path d="M20 6 9 17l-5-5"/></SvgWrapper>;
    const FileSpreadsheet = (p) => <SvgWrapper {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></SvgWrapper>;
    const Activity = (p) => <SvgWrapper {...p}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></SvgWrapper>;
    const Edit3 = (p) => <SvgWrapper {...p}><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></SvgWrapper>;
    const BarChart3 = (p) => <SvgWrapper {...p}><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></SvgWrapper>;
    const CreditCard = (p) => <SvgWrapper {...p}><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></SvgWrapper>;
    const PiggyBank = (p) => <SvgWrapper {...p}><path d="M19 5c-1.5 0-2.8 1.4-3 2-3.5-1.5-11-.3-11 5 0 1.8 0 3 2 4.5V20h4v-2h3v2h4v-4c1-.5 1.5-1 2-1.5L20 8.5c0-2.5-1.5-3.5-1-3.5z"/><path d="M2 9v1c0 1.1.9 2 2 2h1"/><path d="M16 11h.01"/></SvgWrapper>;
    const PieChart = (p) => <SvgWrapper {...p}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></SvgWrapper>;
    const CheckSquare = (p) => <SvgWrapper {...p}><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></SvgWrapper>;
    const MoreHorizontal = (p) => <SvgWrapper {...p}><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></SvgWrapper>;
    const ArrowUpRight = (p) => <SvgWrapper {...p}><path d="M7 7h10v10"/><path d="M7 17 17 7"/></SvgWrapper>;
    const ArrowDownRight = (p) => <SvgWrapper {...p}><path d="M7 17h10V7"/><path d="M7 7l10 10"/></SvgWrapper>;
    const Minus = (p) => <SvgWrapper {...p}><path d="M5 12h14"/></SvgWrapper>;
    const BarChart = (p) => <SvgWrapper {...p}><line x1="12" x2="12" y1="20" y2="10"/><line x1="18" x2="18" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="16"/></SvgWrapper>;

    // --- Sistema Anticaídas de React ---
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      componentDidCatch(error, errorInfo) { console.error("Error en pestaña:", error, errorInfo); }
      render() {
        if (this.state.hasError) {
          return (
            <div className="p-6 bg-rose-950/30 border border-rose-500 rounded-xl m-4 md:m-8 text-rose-400">
              <h2 className="font-bold text-lg mb-2 flex items-center gap-2"><AlertCircle size={20} /> Error en esta sección</h2>
              <p className="text-sm opacity-80">{this.state.error.toString()}</p>
              <button onClick={() => this.setState({hasError: false})} className="mt-4 px-4 py-2 bg-rose-600 hover:bg-rose-500 text-white rounded text-sm font-bold">Intentar cargar de nuevo</button>
            </div>
          );
        }
        return this.props.children; 
      }
    }

    // --- UTILIDADES ---
    const formatCOP = (value) => new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(value);
    const getTasaMensual = (tasaEA) => Math.pow(1 + tasaEA / 100, 1 / 12) - 1;
    const deleteItem = (setter, id) => setter(prev => prev.filter(item => item.id !== id));
    
    // Fallback robusto para generación de IDs
    const generateId = () => {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
      return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 9);
    };
    
    const getLocalToday = () => {
      const d = new Date();
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      return d.toISOString().split('T')[0];
    };

    const loadSheetJS = async () => {
      if (window.XLSX) return window.XLSX;
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
        script.onload = () => resolve(window.XLSX);
        script.onerror = () => reject(new Error('No se pudo cargar SheetJS'));
        document.head.appendChild(script);
      });
    };

    // --- Componentes UI Base ---
    const Card = ({ children, className = "" }) => <div className={`bg-slate-900 border border-slate-800 rounded-xl shadow-lg p-4 md:p-5 ${className}`}>{children}</div>;

    const Input = ({ label, type = "text", value, onChange, placeholder, className="", min, max, step, disabled, error, title }) => (
      <div className={`flex flex-col gap-1.5 ${className}`}>
        {label && <label className={`text-xs font-medium ${error ? 'text-rose-400' : 'text-slate-400'}`}>{label}</label>}
        <input type={type} value={value} onChange={onChange} placeholder={placeholder} min={min} max={max} step={step} disabled={disabled} title={title}
          className={`bg-slate-950 border ${error ? 'border-rose-500 focus:ring-rose-500' : 'border-slate-800 focus:ring-indigo-500'} rounded-lg px-3 py-2.5 md:py-2 text-sm text-slate-200 focus:outline-none focus:ring-1 transition-colors disabled:opacity-50`} />
        {error && <span className="text-[10px] text-rose-400 mt-0.5">{error}</span>}
      </div>
    );

    const Select = ({ label, value, onChange, options, className="", required, error, disabled }) => (
      <div className={`flex flex-col gap-1.5 ${className}`}>
        <label className={`text-xs font-medium ${error ? 'text-rose-400' : 'text-slate-400'}`}>{label}</label>
        <select value={value} onChange={onChange} required={required} disabled={disabled}
          className={`bg-slate-950 border ${error ? 'border-rose-500 focus:ring-rose-500' : 'border-slate-800 focus:ring-indigo-500'} rounded-lg px-3 py-2.5 md:py-2 text-sm text-slate-200 focus:outline-none focus:ring-1 transition-colors disabled:opacity-50`}>
          <option value="">Seleccione...</option>
          {options.map((opt, i) => {
            const val = typeof opt === 'object' && opt !== null ? opt.value : opt;
            const lbl = typeof opt === 'object' && opt !== null ? opt.label : opt;
            return <option key={i} value={val}>{lbl}</option>;
          })}
        </select>
        {error && <span className="text-[10px] text-rose-400 mt-0.5">{error}</span>}
      </div>
    );

    const Toast = ({ toast, onClose }) => {
      if (!toast) return null;
      return (
        <div className={`fixed bottom-24 md:bottom-10 right-4 md:right-10 px-4 py-3 rounded-lg shadow-2xl z-50 flex items-center gap-3 animate-in slide-in-from-bottom-5 ${toast.type === 'success' ? 'bg-emerald-600' : 'bg-rose-600'} text-white`}>
          {toast.type === 'success' ? <CheckCircle2 size={18}/> : <AlertCircle size={18}/>}
          <span className="text-sm font-medium">{toast.msg}</span>
          <button onClick={onClose} className="ml-2 opacity-70 hover:opacity-100"><Trash2 size={14} className="hidden"/></button>
        </div>
      );
    };

    const PagoFijoCard = ({ pf, cuentasPermitidas, onPay }) => {
      const [cuentaId, setCuentaId] = useState('');
      const [montoCustom, setMontoCustom] = useState(pf.monto);
      const [editMonto, setEditMonto] = useState(false);

      return (
        <div className="bg-slate-900 border border-slate-700 rounded-xl p-4 shadow-lg flex flex-col justify-between">
          <div>
            <div className="flex justify-between items-start mb-3">
              <div><p className="font-bold text-white text-base">{pf.descripcion}</p><p className="text-xs text-slate-400">{pf.categoria}</p></div>
              <div className="text-right">
                {!editMonto ? (
                  <p className="font-bold text-amber-400 cursor-pointer flex items-center gap-1.5 bg-slate-950 px-2 py-1 rounded border border-slate-800 hover:border-amber-500/50 transition-colors" onClick={() => setEditMonto(true)} title="Clic para modificar monto">
                    {formatCOP(montoCustom)} <Edit3 size={12}/>
                  </p>
                ) : (
                  <input type="number" value={montoCustom} onChange={(e) => setMontoCustom(e.target.value)} onBlur={() => setEditMonto(false)} className="w-24 text-sm bg-slate-950 text-white border border-indigo-500 rounded p-1.5 text-right outline-none shadow-inner" autoFocus />
                )}
              </div>
            </div>
          </div>
          <div className="flex flex-col gap-2 mt-2 pt-3 border-t border-slate-800">
            <label className="text-[10px] text-slate-500 font-bold uppercase">Medio de pago</label>
            <div className="flex gap-2">
              <select value={cuentaId} onChange={e=>setCuentaId(e.target.value)} className="flex-1 bg-slate-950 border border-slate-700 rounded-lg px-2 py-2 text-xs text-slate-200 outline-none focus:border-indigo-500">
                <option value="">Selecciona...</option>
                {cuentasPermitidas.map(c => <option key={c.value} value={c.value}>{c.label}</option>)}
              </select>
              <button onClick={() => onPay(cuentaId, montoCustom)} className="bg-emerald-600 hover:bg-emerald-500 text-white px-4 rounded-lg font-bold flex items-center justify-center transition-colors shadow-md">OK</button>
            </div>
          </div>
        </div>
      );
    };

    const IngresoFijoCard = ({ inc, cuentasPermitidas, onReceive, cuentas }) => {
      const defaultCuenta = cuentas.find(c => c.name.includes(inc.cuentaName));
      const [cuentaId, setCuentaId] = useState(defaultCuenta ? defaultCuenta.id : '');
      const [montoCustom, setMontoCustom] = useState(inc.monto);
      const [editMonto, setEditMonto] = useState(false);

      return (
        <div className="bg-slate-900 border border-slate-700 rounded-xl p-4 shadow-lg flex flex-col justify-between">
          <div>
            <div className="flex justify-between items-start mb-3">
              <div><p className="font-bold text-white text-base">{inc.descripcion}</p><p className="text-xs text-slate-400">{inc.persona ? `Persona: ${inc.persona} • ` : ''}{inc.tipo}</p></div>
              <div className="text-right">
                {!editMonto ? (
                  <p className="font-bold text-emerald-400 cursor-pointer flex items-center gap-1.5 bg-slate-950 px-2 py-1 rounded border border-slate-800 hover:border-emerald-500/50 transition-colors" onClick={() => setEditMonto(true)} title="Clic para modificar monto">
                    {formatCOP(montoCustom)} <Edit3 size={12}/>
                  </p>
                ) : (
                  <input type="number" value={montoCustom} onChange={(e) => setMontoCustom(e.target.value)} onBlur={() => setEditMonto(false)} className="w-24 text-sm bg-slate-950 text-white border border-emerald-500 rounded p-1.5 text-right outline-none shadow-inner" autoFocus />
                )}
              </div>
            </div>
          </div>
          <div className="flex flex-col gap-2 mt-2 pt-3 border-t border-slate-800">
            <label className="text-[10px] text-slate-500 font-bold uppercase">Destino de los fondos</label>
            <div className="flex gap-2">
              <select value={cuentaId} onChange={e=>setCuentaId(e.target.value)} className="flex-1 bg-slate-950 border border-slate-700 rounded-lg px-2 py-2 text-xs text-slate-200 outline-none focus:border-emerald-500">
                <option value="">Selecciona...</option>
                {cuentasPermitidas.map(c => <option key={c.value} value={c.value}>{c.label}</option>)}
              </select>
              <button onClick={() => onReceive(cuentaId, montoCustom)} className="bg-emerald-600 hover:bg-emerald-500 text-white px-4 rounded-lg font-bold flex items-center justify-center transition-colors shadow-md">OK</button>
            </div>
          </div>
        </div>
      );
    };

    // --- Componentes de Pestañas ---
const DashboardTab = ({ flujoNetoMes, cuotasMesTotal, cuotasMesRestantes, ingresosMesTotal, egresosMesTotal, deudaTotal, liquidezTotal, selectedMonth, egresosMes, ingresos, egresos, presupuestos, pagosFijos, ingresosFijos, cuentas }) => {
      const [chartFilter, setChartFilter] = useState('Todos');
      
      // ✨ NUEVA LÓGICA DE PRECISIÓN:
      // 1. Identificamos cuáles IDs de cuenta pertenecen a Tarjetas de Crédito
      const idsTarjetas = cuentas.filter(c => c.type === 'credit').map(c => c.id);

      // 2. Total pagos con T. crédito: Todo lo que se pagó usando una cuenta de crédito (Fijo o Variable)
      const totalPagosConTC = egresosMes
        .filter(e => idsTarjetas.includes(e.cuentaId))
        .reduce((s, e) => s + e.monto, 0);

      // 3. Total pagos fijos (Sin TC): Gastos tipo 'Fijo' que salieron de Efectivo o Bancos (NO de TC)
      const gastadoFijoSinTC = egresosMes
        .filter(e => e.tipo === 'Fijo' && !idsTarjetas.includes(e.cuentaId))
        .reduce((s, e) => s + e.monto, 0);

      // 4. Total pagos variables: Todo lo que no sea 'Fijo'
      const gastadoVar = egresosMes
        .filter(e => e.tipo !== 'Fijo')
        .reduce((s, e) => s + e.monto, 0);

      // --- El resto de cálculos de proyección se mantienen igual ---
      const totalPresupuestadoFijo = pagosFijos ? pagosFijos.reduce((sum, item) => sum + item.monto, 0) : 0;
      const totalPresupuestadoVar = presupuestos ? presupuestos.reduce((sum, item) => sum + item.limite, 0) : 0;
      const proyeccionIngresosMes = ingresosFijos ? ingresosFijos.reduce((sum, item) => sum + Number(item.monto), 0) : 0; 
      const proyeccionPagoMes = totalPresupuestadoFijo + totalPresupuestadoVar;
      const totalProyeccionMes = proyeccionIngresosMes - proyeccionPagoMes;

      const ingresosMesActual = ingresos.filter(i => i.fecha.startsWith(selectedMonth));
      const ingresosPendientesTotal = ingresosFijos ? ingresosFijos.filter(inf => !ingresosMesActual.some(i => i.ingresoFijoId === inf.id)).reduce((sum, inf) => sum + Number(inf.monto), 0) : 0;

      const pagosFijosPendientesTotal = pagosFijos ? pagosFijos.filter(pf => {
        const isPagado = egresosMes.some(e => e.pagoFijoId === pf.id);
        return !isPagado;
      }).reduce((sum, pf) => sum + pf.monto, 0) : 0;

      // Lógica para las gráficas
      const gastosFiltrados = chartFilter === 'Todos' ? egresosMes : egresosMes.filter(e => e.tipo === chartFilter);
      const gastosPorCategoria = {};
      gastosFiltrados.forEach(g => {
        const cat = g.categoria || 'Otros';
        gastosPorCategoria[cat] = (gastosPorCategoria[cat] || 0) + g.monto;
      });
      const chartData = Object.entries(gastosPorCategoria).sort((a,b)=>b[1]-a[1]);
      const maxMonto = chartData.length > 0 ? chartData[0][1] : 1;

      return (
        <div className="space-y-6 animate-in fade-in duration-500 pb-20 md:pb-0">
          <header><h1 className="text-2xl md:text-3xl font-bold text-white tracking-tight">Inicio y Dashboard Global</h1><p className="text-sm md:text-base text-slate-400 mt-1">Resumen de flujos, PowerBI de egresos y proyecciones.</p></header>

          <div className="grid grid-cols-2 lg:grid-cols-3 gap-3 md:gap-4">
            <Card className="p-3 md:p-5 border-t-4 border-t-emerald-500">
              <h3 className="text-slate-400 text-xs md:text-sm font-medium">Ingresos del Mes</h3>
              <p className="text-lg md:text-2xl font-bold text-emerald-400 mt-1">{formatCOP(ingresosMesTotal)}</p>
            </Card>
            <Card className="p-3 md:p-5 border-t-4 border-t-emerald-500/50">
              <h3 className="text-slate-400 text-xs md:text-sm font-medium">Ingresos Esperados</h3>
              <p className="text-lg md:text-2xl font-bold text-emerald-400/80 mt-1">{formatCOP(ingresosPendientesTotal)}</p>
            </Card>
            <Card className={`p-3 md:p-5 border-t-4 ${flujoNetoMes >= 0 ? 'border-t-indigo-500' : 'border-t-rose-500'}`}>
              <h3 className="text-slate-400 text-xs md:text-sm font-medium">Flujo Libre (Caja)</h3>
              <p className={`text-lg md:text-2xl font-bold mt-1 ${flujoNetoMes >= 0 ? 'text-indigo-400' : 'text-rose-500'}`}>
                {formatCOP(flujoNetoMes)}
              </p>
            </Card>

            <Card className="p-3 md:p-5 border-t-4 border-t-rose-500">
              <h3 className="text-slate-400 text-xs md:text-sm font-medium">Egresos Totales</h3>
              <p className="text-lg md:text-2xl font-bold text-rose-400 mt-1">{formatCOP(egresosMesTotal)}</p>
            </Card>
            <Card className="p-3 md:p-5 border-t-4 border-t-amber-500">
              <h3 className="text-slate-400 text-xs md:text-sm font-medium">Pagos Fijos Pendientes</h3>
              <p className="text-lg md:text-2xl font-bold text-amber-400 mt-1">{formatCOP(pagosFijosPendientesTotal)}</p>
            </Card>
            <Card className="p-3 md:p-5 border-t-4 border-t-amber-500">
              <h3 className="text-slate-400 text-xs md:text-sm font-medium">Pagos Créditos Pendientes</h3>
              <p className="text-lg md:text-2xl font-bold text-amber-400 mt-1">{formatCOP(cuotasMesRestantes)} <span className="text-[10px] text-slate-500 font-normal block">De {formatCOP(cuotasMesTotal)}</span></p>
            </Card>
          </div>

          <Card className="flex flex-col border-t-4 border-t-indigo-500 bg-slate-900/80">
            <h2 className="text-lg font-semibold text-white mb-4 flex items-center gap-2"><Calculator size={18} className="text-indigo-400" /> Resumen y Proyección Detallada</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 bg-slate-950 p-4 md:p-6 rounded-xl border border-slate-800">
              <div className="space-y-4">
                <div className="flex justify-between text-sm items-center"><span className="text-slate-400">Proyección ingresos mes</span> <span className="font-bold text-emerald-400">{formatCOP(proyeccionIngresosMes)}</span></div>
                <div className="flex justify-between text-sm items-center"><span className="text-slate-400">Proyección pago mes (fijo)</span> <span className="font-bold text-rose-400">{formatCOP(totalPresupuestadoFijo)}</span></div>
                <div className="flex justify-between text-sm items-center"><span className="text-slate-400">Proyección pago mes (variable)</span> <span className="font-bold text-rose-400">{formatCOP(totalPresupuestadoVar)}</span></div>
                <div className="flex justify-between text-base font-bold pt-3 border-t border-slate-800 items-center"><span className="text-slate-200">TOTAL proyección mes</span> <span className={totalProyeccionMes >= 0 ? 'text-indigo-400' : 'text-rose-500'}>{formatCOP(totalProyeccionMes)}</span></div>
              </div>
         <div className="space-y-4 md:border-l md:border-slate-800 md:pl-6">
                <div className="flex justify-between text-sm items-center"><span className="text-slate-400">Total Ingresos mes</span> <span className="font-bold text-emerald-400">{formatCOP(ingresosMesTotal)}</span></div>
                <div className="flex justify-between text-sm items-center"><span className="text-slate-400">Total pagos fijos (Sin TC)</span> <span className="font-bold text-rose-400">{formatCOP(gastadoFijoSinTC)}</span></div>
                <div className="flex justify-between text-sm items-center"><span className="text-slate-400">Total pagos con T. crédito</span> <span className="font-bold text-rose-400">{formatCOP(pagosTCReales)}</span></div>
                <div className="flex justify-between text-sm items-center"><span className="text-slate-400">Total pagos variables</span> <span className="font-bold text-rose-400">{formatCOP(gastadoVar)}</span></div>
                <div className="flex justify-between text-base font-bold pt-3 border-t border-slate-800 items-center"><span className="text-slate-200">TOTAL PAGOS</span> <span className="text-rose-500">{formatCOP(totalPagoRealMasTC)}</span></div>
              </div>
            </div>
          </Card>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <Card className="flex flex-col">
              <h2 className="text-lg font-semibold text-white mb-6 flex items-center gap-2"><BarChart size={18} className="text-emerald-400" /> Tendencia Histórica (6 Meses)</h2>
              <div className="flex-1 flex items-end justify-between gap-2 h-48 pb-2 border-b border-slate-800">
                {trendData.map((d, i) => {
                  const hInc = (d.ing / maxTrendVal) * 100;
                  const hExp = (d.egr / maxTrendVal) * 100;
                  return (
                    <div key={i} className="flex flex-col items-center w-full h-full justify-end group relative">
                      <div className="flex gap-1 w-full justify-center items-end h-full">
                        <div style={{ height: `${Math.max(hInc, 2)}%` }} className="w-1/3 max-w-[12px] bg-emerald-500/80 rounded-t-sm transition-all group-hover:bg-emerald-400"></div>
                        <div style={{ height: `${Math.max(hExp, 2)}%` }} className="w-1/3 max-w-[12px] bg-rose-500/80 rounded-t-sm transition-all group-hover:bg-rose-400"></div>
                      </div>
                      <div className="opacity-0 group-hover:opacity-100 absolute -top-12 bg-slate-950 border border-slate-800 text-white text-[10px] p-2 rounded shadow-xl whitespace-nowrap z-10 pointer-events-none transition-opacity">
                        <p className="text-emerald-400">Ing: {formatCOP(d.ing)}</p>
                        <p className="text-rose-400">Egr: {formatCOP(d.egr)}</p>
                      </div>
                    </div>
                  )
                })}
              </div>
              <div className="flex justify-between mt-2 px-1">
                {trendData.map((d, i) => <span key={i} className="text-[10px] font-medium text-slate-500 uppercase">{d.label}</span>)}
              </div>
              <div className="flex justify-center gap-4 mt-4 text-xs font-medium text-slate-400">
                <span className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 rounded bg-emerald-500/80"></div> Ingresos</span>
                <span className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 rounded bg-rose-500/80"></div> Egresos</span>
              </div>
            </Card>

            <Card className="flex flex-col">
              <div className="flex flex-col md:flex-row justify-between md:items-center mb-6 gap-4">
                <h2 className="text-lg font-semibold text-white flex items-center gap-2"><BarChart3 size={18} className="text-indigo-400" /> Distribución de Egresos</h2>
                <div className="flex bg-slate-950 rounded-lg p-1 border border-slate-800 text-xs font-medium w-full md:w-auto">
                  <button onClick={()=>setChartFilter('Todos')} className={`flex-1 md:flex-none px-4 py-2 rounded ${chartFilter==='Todos' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-slate-200'}`}>Todos</button>
                  <button onClick={()=>setChartFilter('Fijo')} className={`flex-1 md:flex-none px-4 py-2 rounded ${chartFilter==='Fijo' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-slate-200'}`}>Fijos</button>
                  <button onClick={()=>setChartFilter('Variable')} className={`flex-1 md:flex-none px-4 py-2 rounded ${chartFilter==='Variable' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-slate-200'}`}>Variables</button>
                </div>
              </div>
              <div className="flex-1 space-y-4 overflow-y-auto max-h-[250px] pr-2">
                {chartData.length === 0 && <p className="text-sm text-slate-500 text-center py-10">No hay egresos registrados.</p>}
                {chartData.map(([name, amount]) => {
                  const width = Math.max((amount / maxMonto) * 100, 2);
                  return (
                    <div key={name} className="relative">
                      <div className="flex justify-between text-sm mb-1.5">
                        <span className="text-slate-300 font-medium truncate pr-4">{name}</span>
                        <span className="font-bold text-slate-200">{formatCOP(amount)}</span>
                      </div>
                      <div className="w-full bg-slate-950 rounded-full h-3 overflow-hidden border border-slate-800">
                        <div className="h-full bg-indigo-500 rounded-full transition-all duration-1000" style={{ width: `${width}%` }}></div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </Card>
          </div>
        </div>
      );
    };

const ScoreTab = ({ scoreData, scoreHistory, selectedMonth, presupuestos, egresosMes, cuentas, ingresosMesTotal, egresosMesTotal, cuotasMesTotal }) => {
      const { score, desglose, recs } = scoreData;

      const prevMonthDate = new Date(`${selectedMonth}-01T12:00:00`);
      prevMonthDate.setMonth(prevMonthDate.getMonth() - 1);
      const prevMonthStr = prevMonthDate.toISOString().slice(0, 7);
      const prevScore = scoreHistory[prevMonthStr] || null;

      const scoreColor = score === 0 && desglose.length === 1 ? 'text-slate-500' : score >= 80 ? 'text-emerald-400' : score >= 50 ? 'text-amber-400' : 'text-rose-400';
      const scoreBg = score === 0 && desglose.length === 1 ? 'bg-slate-700' : score >= 80 ? 'bg-emerald-500' : score >= 50 ? 'bg-amber-500' : 'bg-rose-500';

      const tasaAhorro = ingresosMesTotal > 0 ? ((ingresosMesTotal - egresosMesTotal - cuotasMesTotal) / ingresosMesTotal) * 100 : 0;
      const nivelEndeudamiento = ingresosMesTotal > 0 ? (cuotasMesTotal / ingresosMesTotal) * 100 : 0;
      
      const deudasPeligrosas = cuentas.filter(c => ['credit', 'loan'].includes(c.type) && c.currentDebt > 0 && c.tasaEA >= 25).sort((a,b) => b.tasaEA - a.tasaEA);
      
      const alertasPresupuesto = presupuestos.map(p => {
         const gastado = egresosMes.filter(e => e.categoria.toLowerCase() === p.categoria.toLowerCase() && e.tipo !== 'Fijo').reduce((s, e) => s + e.monto, 0);
         return { ...p, gastado, porcentaje: p.limite > 0 ? (gastado / p.limite) * 100 : 0 };
      }).filter(p => p.porcentaje >= 75).sort((a,b) => b.porcentaje - a.porcentaje);

      // Combinamos las recomendaciones del algoritmo principal con las alertas dinámicas de deudas/presupuestos
      const dynamicRecs = useMemo(() => {
        let items = [...recs];
        if (deudasPeligrosas.length > 0) {
            items.push({
                ico: <ShieldAlert size={24} className="text-rose-500" />,
                title: "Deuda de Alto Riesgo Detectada",
                txt: `Tu cuenta "${deudasPeligrosas[0].name}" tiene un interés muy alto (${deudasPeligrosas[0].tasaEA}% E.A.). Te recomendamos aplicar pagos extra urgentemente.`
            });
        }
        if (nivelEndeudamiento > 40) {
            items.push({
                ico: <AlertCircle size={24} className="text-amber-500" />,
                title: "Peligro de Sobreendeudamiento",
                txt: `Tus cuotas mensuales representan el ${nivelEndeudamiento.toFixed(1)}% de tus ingresos. El límite saludable es el 30-40%.`
            });
        }
        if (tasaAhorro < 10 && ingresosMesTotal > 0) {
            items.push({
                ico: <TrendingUp size={24} className="text-amber-500" />,
                title: "Impulsa tu Ahorro",
                txt: `Tu flujo de caja actual solo te permite ahorrar un ${tasaAhorro.toFixed(1)}%. Intenta aplicar la regla 50-30-20.`
            });
        }
        if (tasaAhorro >= 20) {
            items.push({
                ico: <PiggyBank size={24} className="text-emerald-500" />,
                title: "¡Excelente capacidad de ahorro!",
                txt: `Estás reteniendo un ${tasaAhorro.toFixed(1)}% de lo que ganas. Te sugerimos abrir la pestaña Simuladores y automatizar transferencias a inversión.`
            });
        }
        if (alertasPresupuesto.some(p => p.porcentaje >= 100)) {
            items.push({
                ico: <Target size={24} className="text-rose-500" />,
                title: "Presupuestos Rotos",
                txt: `Has excedido el límite en algunas categorías variables este mes. Revisa tus gastos impulsivos en la pestaña Presupuestos.`
            });
        }
        if (items.length === 0) {
            items.push({
                ico: <CheckCircle2 size={24} className="text-emerald-500" />,
                title: "Todo en orden",
                txt: "Tus indicadores principales son saludables. Mantén tus presupuestos al día y tus deudas controladas."
            });
        }
        return items;
      }, [deudasPeligrosas, nivelEndeudamiento, tasaAhorro, alertasPresupuesto, ingresosMesTotal, recs]);

      return (
        <div className="space-y-6 animate-in fade-in duration-500 pb-20 md:pb-0">
          <header>
            <h1 className="text-2xl md:text-3xl font-bold text-white tracking-tight flex items-center gap-2"><Activity className="text-indigo-400 w-8 h-8"/> Score Familia</h1>
            <p className="text-sm md:text-base text-slate-400 mt-1">Diagnóstico, alertas y el porqué de tu calificación financiera.</p>
          </header>

          <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 mt-4">
            <div className="lg:col-span-4 space-y-6">
              <Card className="flex flex-col items-center justify-center py-8 bg-slate-900/50 relative overflow-hidden">
                {prevScore !== null && score > 0 && (
                  <div className="absolute top-4 right-4 flex items-center gap-1 text-xs font-bold bg-slate-950 px-3 py-1.5 rounded-full border border-slate-800">
                    {score > prevScore ? <span className="text-emerald-400 flex items-center gap-1"><ArrowUpRight size={14}/> +{score - prevScore} pts</span> :
                     score < prevScore ? <span className="text-rose-400 flex items-center gap-1"><ArrowDownRight size={14}/> {prevScore - score} pts</span> :
                     <span className="text-slate-400 flex items-center gap-1"><Minus size={14}/> = pts</span>}
                  </div>
                )}
                <h2 className="text-lg font-semibold text-white mb-2 flex items-center gap-2"><Activity size={18} className="text-emerald-400"/> Salud Financiera</h2>
                <div className={`text-7xl font-black font-mono mt-2 ${scoreColor}`}>{score}</div>
                <p className={`font-bold mt-2 ${scoreColor}`}>
                  {score === 0 && desglose.length === 1 ? 'Faltan Datos' : score >= 80 ? 'Excelente Salud' : score >= 50 ? 'Requiere Atención' : 'Situación Crítica'}
                </p>
                <div className="w-full max-w-[200px] bg-slate-800 rounded-full h-2 mt-6">
                  <div className={`h-full rounded-full transition-all duration-1000 ${scoreBg}`} style={{width: `${score}%`}}></div>
                </div>
              </Card>

              {/* ✨ NUEVO: Explicación matemática del Score */}
              <Card className="border-t-4 border-t-indigo-500">
                <h3 className="text-sm font-bold text-white mb-4 uppercase tracking-wider flex items-center gap-2"><Info size={16} className="text-indigo-400"/> ¿Por qué este puntaje?</h3>
                <div className="space-y-3">
                  {desglose.map((item, idx) => (
                    <div key={idx} className="flex justify-between items-center text-sm border-b border-slate-800/50 pb-2 last:border-0 last:pb-0">
                      <span className="text-slate-300 pr-2">{item.text}</span>
                      <span className={`font-bold whitespace-nowrap ${item.type === 'success' ? 'text-emerald-400' : item.type === 'danger' ? 'text-rose-400' : item.type === 'warning' ? 'text-amber-400' : 'text-slate-400'}`}>
                        {item.pts > 0 ? `+${item.pts}` : item.pts < 0 ? `${item.pts}` : item.pts === 0 && item.type !== 'neutral' ? '0' : ''}
                      </span>
                    </div>
                  ))}
                </div>
              </Card>

              <div className="grid grid-cols-2 gap-4">
                 <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 text-center flex flex-col items-center justify-center">
                    <p className="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-1">Tasa de Ahorro</p>
                    <p className={`text-2xl font-bold ${tasaAhorro >= 15 ? 'text-emerald-400' : tasaAhorro > 0 ? 'text-amber-400' : 'text-rose-400'}`}>{tasaAhorro.toFixed(1)}%</p>
                 </div>
                 <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 text-center flex flex-col items-center justify-center">
                    <p className="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-1">Carga de Deuda</p>
                    <p className={`text-2xl font-bold ${nivelEndeudamiento <= 30 ? 'text-emerald-400' : nivelEndeudamiento <= 45 ? 'text-amber-400' : 'text-rose-400'}`}>{nivelEndeudamiento.toFixed(1)}%</p>
                 </div>
              </div>
            </div>

            <div className="lg:col-span-8 space-y-6">
              <Card className="h-full border-t-4 border-t-amber-500">
                <h2 className="text-lg font-semibold text-white mb-4 border-b border-slate-800 pb-3 flex items-center gap-2"><Target size={18} className="text-amber-400"/> Plan de Acción Sugerido</h2>
                <div className="space-y-4">
                  {dynamicRecs.map((r, i) => (
                    <div key={i} className="bg-slate-950 border border-slate-800/80 rounded-xl p-4 flex gap-4 items-start hover:border-slate-700 transition-colors">
                      <div className="mt-1 bg-slate-900 p-2 rounded-lg shadow-inner">{r.ico}</div>
                      <div><h3 className="font-bold text-sm text-slate-200">{r.title}</h3><p className="text-xs text-slate-400 mt-1 leading-relaxed">{r.txt}</p></div>
                    </div>
                  ))}
                </div>
              </Card>
            </div>
          </div>
        </div>
      );
    };

    const CuentasTab = ({ cuentas, setCuentas, transferencias, setTransferencias, egresos, setEgresos, showToast }) => {
      const [cuentaEdit, setCuentaEdit] = useState({ id: null, name: '', type: 'bank', initialBalance: '', initialDebt: '', limit: '', tasaEA: '', cuotaMinima: '' });
      const [nuevaTx, setNuevaTx] = useState({ fecha: getLocalToday(), fromId: '', toId: '', monto: '', costoAvance: '0', descripcion: '' });
      const [errors, setErrors] = useState({});
      const [txErrors, setTxErrors] = useState({});
      const [showForm, setShowForm] = useState(false);
      const formRef = useRef(null);
      const fileInputRef = useRef(null);

      const guardarCuenta = (e) => {
        e.preventDefault();
        let errs = {};
        if(!cuentaEdit.name) errs.name = "Obligatorio";
        if(Object.keys(errs).length > 0) { setErrors(errs); return; }

        let baseData = {
          name: cuentaEdit.name, type: cuentaEdit.type, 
          initialBalance: Number(cuentaEdit.initialBalance) || 0, initialDebt: Number(cuentaEdit.initialDebt) || 0, 
          limit: Number(cuentaEdit.limit) || 0, cuotaMinima: Number(cuentaEdit.cuotaMinima) || 0,
          tasaEA: Number(cuentaEdit.tasaEA) || 0
        };

        if (cuentaEdit.id) {
          setCuentas(prev => prev.map(c => c.id === cuentaEdit.id ? { ...c, ...baseData } : c));
          showToast("Cuenta actualizada correctamente.");
        } else {
          setCuentas(prev => [...prev, { id: generateId(), ...baseData }]);
          showToast("Cuenta creada correctamente.");
        }
        limpiarFormCuenta();
      };

      const limpiarFormCuenta = () => {
        setCuentaEdit({ id: null, name: '', type: 'bank', initialBalance: '', initialDebt: '', limit: '', tasaEA: '', cuotaMinima: '' });
        setErrors({});
        setShowForm(false);
      };

      const cargarParaEditar = (c) => {
        setCuentaEdit({ id: c.id, name: c.name, type: c.type, initialBalance: c.initialBalance, initialDebt: c.currentDebt, limit: c.limit, tasaEA: c.tasaEA, cuotaMinima: c.cuotaMinima });
        setErrors({});
        setShowForm(true);
        setTimeout(() => formRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
      };

      const agregarTransferencia = (e) => {
        e.preventDefault();
        let errs = {};
        if(!nuevaTx.fromId) errs.fromId = "Obligatorio";
        if(!nuevaTx.toId) errs.toId = "Obligatorio";
        if(!nuevaTx.monto) errs.monto = "Obligatorio";
        if(!nuevaTx.fecha) errs.fecha = "Obligatorio";
        if(nuevaTx.fromId === nuevaTx.toId && nuevaTx.fromId) errs.toId = "Destino debe ser distinto al origen";
        if(Object.keys(errs).length > 0) { setTxErrors(errs); return; }

        const transId = generateId();
        setTransferencias(prev => [...prev, { ...nuevaTx, id: transId, monto: Number(nuevaTx.monto) }]);
        if (Number(nuevaTx.costoAvance) > 0) {
          setEgresos(prev => [...prev, { id: generateId(), fecha: nuevaTx.fecha, descripcion: `Comisión Transferencia: ${nuevaTx.descripcion}`, categoria: 'Otros', tipo: 'Variable', monto: Number(nuevaTx.costoAvance), cuentaId: nuevaTx.fromId }]);
          showToast(`Transferencia y comisión registradas.`);
        } else {
          showToast("Transferencia registrada exitosamente.");
        }
        setNuevaTx({ fecha: getLocalToday(), fromId: '', toId: '', monto: '', costoAvance: '0', descripcion: '' });
        setTxErrors({});
      };

      // --- IMPORTAR / EXPORTAR INDIVIDUAL DE CUENTAS ---
      const handleExport = async () => {
        try {
          const xlsx = await loadSheetJS();
          const wb = xlsx.utils.book_new();
          
          const headersCuentas = ["ID", "Nombre", "Tipo", "SaldoBase"];
          const dataCuentas = cuentas.filter(c => ['bank','cash'].includes(c.type)).map(c => ({ ID: c.id, Nombre: c.name, Tipo: c.type, SaldoBase: c.initialBalance }));
          const wsCuentas = xlsx.utils.json_to_sheet(dataCuentas.length > 0 ? dataCuentas : [{}], { header: headersCuentas });
          xlsx.utils.book_append_sheet(wb, wsCuentas, "Cuentas_Bancos");

          const headersTrans = ["ID", "Fecha", "Origen", "Destino", "Monto", "CostoAvance", "Descripcion"];
          const dataTrans = transferencias.map(t => ({ ID: t.id, Fecha: t.fecha, Origen: cuentas.find(c=>c.id===t.fromId)?.name || '', Destino: cuentas.find(c=>c.id===t.toId)?.name || '', Monto: t.monto, CostoAvance: t.costoAvance || 0, Descripcion: t.descripcion }));
          const wsTrans = xlsx.utils.json_to_sheet(dataTrans.length > 0 ? dataTrans : [{}], { header: headersTrans });
          xlsx.utils.book_append_sheet(wb, wsTrans, "Transferencias");
          
          xlsx.writeFile(wb, `Cuentas_y_Transferencias_${new Date().toISOString().split('T')[0]}.xlsx`);
          showToast("Cuentas y Transferencias exportadas con éxito.");
        } catch(e) { showToast("Error al exportar a Excel.", "error"); }
      };

      const handleImport = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        try {
          const xlsx = await loadSheetJS();
          const reader = new FileReader();
          reader.onload = (evt) => {
            try {
              const wb = xlsx.read(evt.target.result, { type: 'binary' });
              let importados = 0;
              if (wb.Sheets["Cuentas_Bancos"]) {
                const data = xlsx.utils.sheet_to_json(wb.Sheets["Cuentas_Bancos"]);
                data.forEach(i => {
                   if(i.Nombre) {
                       setCuentas(prev => {
                          const exists = prev.find(c => c.name === i.Nombre && ['bank','cash'].includes(c.type));
                          if(exists) return prev; 
                          importados++;
                          return [...prev, { id: i.ID || generateId(), name: i.Nombre, type: i.Tipo || 'bank', initialBalance: Number(i.SaldoBase)||0, initialDebt:0, limit:0, tasaEA:0, cuotaMinima:0 }];
                       });
                   }
                });
              }
              if (wb.Sheets["Transferencias"]) {
                const data = xlsx.utils.sheet_to_json(wb.Sheets["Transferencias"]);
                data.forEach(i => {
                   if(i.Monto) {
                       setTransferencias(prev => {
                           const exists = prev.find(t => t.fecha === i.Fecha && t.monto === Number(i.Monto) && t.descripcion === i.Descripcion);
                           if(exists) return prev;
                           importados++;
                           return [...prev, { id: i.ID || generateId(), fecha: i.Fecha || getLocalToday(), fromId: cuentas.find(c=>c.name===i.Origen)?.id || cuentas[0]?.id, toId: cuentas.find(c=>c.name===i.Destino)?.id || cuentas[1]?.id, monto: Number(i.Monto)||0, costoAvance: Number(i.CostoAvance)||0, descripcion: i.Descripcion || '' }];
                       });
                   }
                });
              }
              showToast(importados > 0 ? `Se importaron ${importados} registros.` : "No se encontraron registros nuevos.");
            } catch(err) { showToast("Error procesando el archivo de Excel.", "error"); }
          };
          reader.readAsBinaryString(file);
        } catch(err) { showToast("Error al abrir herramienta de Excel.", "error"); }
        e.target.value = '';
      };

      const tipoOrigen = cuentas.find(c=>c.id===nuevaTx.fromId)?.type;
      const tipoDestino = cuentas.find(c=>c.id===nuevaTx.toId)?.type;
      const esAvance = tipoOrigen === 'credit' && ['bank','cash'].includes(tipoDestino);

      const c_ahorros = cuentas.filter(c => ['bank', 'cash'].includes(c.type));

      const renderCuentaCard = (c, colorClass) => (
        <div key={c.id} className="flex justify-between items-center p-3 bg-slate-950 rounded-lg border border-slate-800">
          <div>
            <p className="text-sm font-medium text-slate-200">{c.name}</p>
            <p className="text-[10px] text-slate-500">Saldo real: {formatCOP(c.currentBalance)}</p>
          </div>
          <div className="text-right flex items-center gap-2 md:gap-3">
            <p className={`text-sm font-bold ${colorClass}`}>{formatCOP(c.currentBalance)}</p>
            <button onClick={() => cargarParaEditar(c)} className="text-slate-600 hover:text-indigo-400 p-1"><Edit3 size={14}/></button>
            <button onClick={() => {deleteItem(setCuentas, c.id); showToast("Cuenta eliminada");}} className="text-slate-600 hover:text-rose-400 p-1"><Trash2 size={14}/></button>
          </div>
        </div>
      );

      return (
        <div className="space-y-6 animate-in fade-in duration-500 pb-20 md:pb-0">
          <header className="flex flex-col md:flex-row md:justify-between md:items-end gap-4">
            <div>
              <h1 className="text-2xl md:text-3xl font-bold text-white tracking-tight flex items-center gap-2 md:gap-3"><Landmark className="text-indigo-400 w-6 h-6 md:w-8 md:h-8"/> Cuentas y Transferencias</h1>
              <p className="text-sm md:text-base text-slate-400 mt-1">Gestiona tu capital en bancos y traslados.</p>
            </div>
            <div className="flex flex-wrap gap-2">
              <button onClick={() => { limpiarFormCuenta(); setShowForm(!showForm); }} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-colors">
                <Plus size={16}/> {showForm ? 'Ocultar' : 'Agregar Cuenta'}
              </button>
              <input type="file" accept=".xlsx, .xls" ref={fileInputRef} onChange={handleImport} className="hidden" />
              <button onClick={() => fileInputRef.current.click()} className="bg-slate-800 hover:bg-slate-700 text-emerald-400 px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-colors border border-emerald-500/30"><Upload size={14}/> Importar</button>
              <button onClick={handleExport} className="bg-emerald-600/20 hover:bg-emerald-600/30 text-emerald-400 px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-colors border border-emerald-500/30"><Download size={14}/> Exportar</button>
            </div>
          </header>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            {showForm && (
              <Card className="lg:col-span-3 border-t-4 border-t-indigo-500 bg-indigo-950/10 mb-2">
                <div className="flex justify-between items-center mb-4" ref={formRef}>
                  <h2 className="text-base font-semibold text-white">{cuentaEdit.id ? '✏️ Editar Cuenta' : '✨ Crear Nueva Cuenta'}</h2>
                  {cuentaEdit.id && <button onClick={limpiarFormCuenta} className="text-xs text-indigo-400 hover:underline">Cancelar Edición</button>}
                </div>
                <form onSubmit={guardarCuenta} className="grid grid-cols-2 md:grid-cols-4 gap-3 items-end">
                  <Input label="Nombre" value={cuentaEdit.name} onChange={e=>setCuentaEdit({...cuentaEdit, name: e.target.value})} error={errors.name} className="col-span-2 md:col-span-1" />
                  <Select label="Tipo" options={[{value:'bank', label:'Cuenta Ahorro'}, {value:'cash', label:'Efectivo'}, {value:'pocket', label:'Inversión / Bolsillo'}]} value={cuentaEdit.type} onChange={e=>setCuentaEdit({...cuentaEdit, type: e.target.value})} className="col-span-2 md:col-span-1" />
                  
                  <Input type="number" label="Saldo Base/Inicial ($)" value={cuentaEdit.initialBalance} onChange={e=>setCuentaEdit({...cuentaEdit, initialBalance: e.target.value})} className="col-span-2 md:col-span-2" />
                  <button type="submit" className="col-span-2 md:col-span-4 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded-lg text-sm transition-colors mt-2">{cuentaEdit.id ? 'Actualizar Datos' : 'Guardar Nueva Cuenta'}</button>
                </form>
              </Card>
            )}

            <div className="lg:col-span-2 grid grid-cols-1 gap-4">
              <Card>
                <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3 flex items-center gap-2"><Wallet size={16}/> Cuentas de Ahorro / Retiros</h3>
                <div className="space-y-2">{c_ahorros.map(c=>renderCuentaCard(c, 'text-emerald-400'))}</div>
              </Card>
            </div>

            <div className="space-y-4">
              <Card className="border-t-4 border-t-amber-500">
                <h2 className="text-base font-semibold text-white mb-3 flex items-center gap-2"><ArrowRightLeft size={16} className="text-amber-400"/> Traslado de Fondos</h2>
                <p className="text-xs text-slate-400 mb-4">Mueve dinero de una cuenta a otra.</p>
                <form onSubmit={agregarTransferencia} className="space-y-3">
                  <Select label="Origen (Sale de)" options={cuentas.filter(c=>['bank','cash','credit'].includes(c.type)).map(c => ({value: c.id, label: c.name}))} value={nuevaTx.fromId} onChange={e=>setNuevaTx({...nuevaTx, fromId: e.target.value})} error={txErrors.fromId} />
                  <Select label="Destino (Entra a)" options={cuentas.filter(c=>['bank','cash'].includes(c.type)).map(c => ({value: c.id, label: c.name}))} value={nuevaTx.toId} onChange={e=>setNuevaTx({...nuevaTx, toId: e.target.value})} error={txErrors.toId} />
                  <div className="grid grid-cols-2 gap-2">
                    <Input type="number" label="Monto ($)" value={nuevaTx.monto} onChange={e=>setNuevaTx({...nuevaTx, monto: e.target.value})} error={txErrors.monto} min="1" />
                    <Input type="date" label="Fecha" value={nuevaTx.fecha} onChange={e=>setNuevaTx({...nuevaTx, fecha: e.target.value})} error={txErrors.fecha} />
                  </div>
                  {esAvance && (
                    <div className="p-3 bg-rose-500/10 border border-rose-500/30 rounded-lg">
                      <p className="text-[10px] text-rose-400 mb-2 font-bold uppercase">Detectado Avance desde Tarjeta</p>
                      <Input type="number" label="Costo de transacción ($) (Se irá a Egresos Variables)" value={nuevaTx.costoAvance} onChange={e=>setNuevaTx({...nuevaTx, costoAvance: e.target.value})} required min="0" />
                    </div>
                  )}
                  <Input label="Descripción (Opcional)" placeholder="Ej: Traslado a bolsillo" value={nuevaTx.descripcion} onChange={e=>setNuevaTx({...nuevaTx, descripcion: e.target.value})} />
                  <button type="submit" className="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-2.5 rounded-lg text-sm transition-colors">Registrar Traslado</button>
                </form>
              </Card>
            </div>
          </div>
        </div>
      );
    };

    const IngresosTab = ({ ingresos, setIngresos, ingresosFijos, cuentas, selectedMonth, showToast, filtroPersona }) => {
      const todayStr = getLocalToday();
      const defaultPersona = filtroPersona === 'Leo' ? 'L' : (filtroPersona === 'Andre' ? 'A' : '');
      const [nuevo, setNuevo] = useState({ fecha: todayStr, descripcion: '', persona: defaultPersona, tipo: 'Fijo', monto: '', cuentaId: '', plantilla: 'otro' });
      const [editId, setEditId] = useState(null);
      const [errors, setErrors] = useState({});
      const [showForm, setShowForm] = useState(false);
      const formRef = useRef(null);
      const fileInputRef = useRef(null);

      // --- IMPORTAR / EXPORTAR INDIVIDUAL DE INGRESOS ---
      const handleExport = async () => {
        try {
          const xlsx = await loadSheetJS();
          const wb = xlsx.utils.book_new();
          const headers = ["ID", "Fecha", "Descripcion", "Persona", "Tipo", "Cuenta", "Monto"];
          const data = ingresos.map(i => ({ ID: i.id, Fecha: i.fecha, Descripcion: i.descripcion, Persona: i.persona, Tipo: i.tipo, Cuenta: cuentas.find(c=>c.id===i.cuentaId)?.name || i.cuentaId, Monto: i.monto }));
          const ws = xlsx.utils.json_to_sheet(data.length > 0 ? data : [{}], { header: headers });
          xlsx.utils.book_append_sheet(wb, ws, "Ingresos");
          xlsx.writeFile(wb, `Ingresos_Historial_${new Date().toISOString().split('T')[0]}.xlsx`);
          showToast("Historial exportado con éxito.");
        } catch(e) { showToast("Error al exportar a Excel.", "error"); }
      };

      const handleImport = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        try {
          const xlsx = await loadSheetJS();
          const reader = new FileReader();
          reader.onload = (evt) => {
            try {
              const wb = xlsx.read(evt.target.result, { type: 'binary' });
              const sheetName = wb.Sheets["Ingresos"] ? "Ingresos" : wb.SheetNames[0];
              const importedData = xlsx.utils.sheet_to_json(wb.Sheets[sheetName]);
              let importados = 0;
              
              setIngresos(prev => {
                  let nuevos = [...prev];
                  importedData.filter(i=>i.Monto).forEach(i => {
                      const fecha = i.Fecha || new Date().toISOString().split('T')[0];
                      const desc = i.Descripcion || 'Ingreso Importado';
                      const monto = Number(i.Monto) || 0;
                      // Verificación anti-duplicados por fila
                      const exists = nuevos.some(existing => existing.fecha === fecha && existing.descripcion === desc && existing.monto === monto);
                      
                      if(!exists) {
                          const cuentaEncontrada = cuentas.find(c => c.name === i.Cuenta)?.id || cuentas[0]?.id;
                          nuevos.push({
                              id: i.ID || generateId(), fecha, descripcion: desc, persona: i.Persona || '',
                              tipo: i.Tipo || 'Variable', monto, cuentaId: cuentaEncontrada
                          });
                          importados++;
                      }
                  });
                  return nuevos;
              });
              showToast(importados > 0 ? `Se importaron ${importados} ingresos.` : "No hay ingresos nuevos.");
            } catch(err) { showToast("Error procesando los datos del archivo.", "error"); }
          };
          reader.readAsBinaryString(file);
        } catch(err) { showToast("Error al abrir herramienta de Excel.", "error"); }
        e.target.value = '';
      };

      const currentMonthNum = selectedMonth.split('-')[1];
      const opcionesPlantillas = [
        { value: 'otro', label: 'Otro (Ingreso manual)' },
        { value: 'Salario L', label: 'Salario Leo' },
        { value: 'Salario A (Q1)', label: 'Salario Andre (Q1)' },
        { value: 'Salario A (Q2)', label: 'Salario Andre (Q2)' },
        { value: 'Bono Salario A', label: 'Bono Salario Andre' }
      ];
      
      if (currentMonthNum === '07') {
        opcionesPlantillas.push({ value: 'Prima 1 L', label: 'Prima 1 Leo' });
        opcionesPlantillas.push({ value: 'Prima 1 A', label: 'Prima 1 Andre' });
      } else if (currentMonthNum === '12') {
        opcionesPlantillas.push({ value: 'Prima 2 L', label: 'Prima 2 Leo' });
        opcionesPlantillas.push({ value: 'Prima 2 A', label: 'Prima 2 Andre' });
      }

      const handlePlantillaChange = (e) => {
        const val = e.target.value;
        if (val === 'otro' || val === '') {
          setNuevo({...nuevo, plantilla: val, descripcion: ''});
          return;
        }
        let baseMonto = 0; let cuentaName = ''; let persona = ''; let tipo = 'Fijo';
        const currentYear = new Date().getFullYear();
        const currentMonth = selectedMonth.split('-')[1];
        let dia = '01';

        if (val === 'Salario L') {
           baseMonto = 5765251; cuentaName = 'Bancolombia Leo'; persona = 'L'; 
           const endOfMonth = new Date(currentYear, currentMonth, 0).getDate();
           dia = endOfMonth <= 30 ? '27' : '28'; 
        } else if (val === 'Salario A (Q1)') {
           baseMonto = 1200000; cuentaName = 'Banco de Bogotá Andre'; persona = 'A'; dia = '14';
        } else if (val === 'Salario A (Q2)') {
           baseMonto = 1200000; cuentaName = 'Banco de Bogotá Andre'; persona = 'A'; dia = '28';
        } else if (val === 'Bono Salario A') {
           baseMonto = 500000; cuentaName = 'Banco de Bogotá Andre'; persona = 'A'; tipo = 'Variable'; dia = '28';
        } else if (val === 'Prima 1 L' || val === 'Prima 2 L') {
           baseMonto = 2800000; cuentaName = 'Bancolombia Leo'; persona = 'L'; tipo = 'Bono';
        } else if (val === 'Prima 1 A' || val === 'Prima 2 A') {
           baseMonto = 1200000; cuentaName = 'Banco de Bogotá Andre'; persona = 'A'; tipo = 'Bono';
        }
        const cuentaEncontrada = cuentas.find(c => c.name.includes(cuentaName))?.id || cuentas[0]?.id;

        setNuevo({ fecha: `${selectedMonth}-${dia}`, descripcion: val, persona: persona, tipo: tipo, monto: baseMonto.toString(), cuentaId: cuentaEncontrada || '', plantilla: val });
        setErrors({});
        formRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      };

      const guardar = (e) => { 
        e.preventDefault();
        let errs = {};
        if(!nuevo.descripcion) errs.descripcion = "Obligatorio";
        if(!nuevo.monto) errs.monto = "Obligatorio";
        if(!nuevo.cuentaId) errs.cuentaId = "Obligatorio";
        if(!nuevo.fecha) errs.fecha = "Obligatorio";
        if(Object.keys(errs).length > 0) { setErrors(errs); return; }
        
        if (editId) {
          setIngresos(prev => prev.map(i => i.id === editId ? { ...nuevo, monto: Number(nuevo.monto) } : i));
          setEditId(null);
          showToast("Ingreso actualizado.");
        } else {
          setIngresos(prev => [...prev, { ...nuevo, id: generateId(), monto: Number(nuevo.monto) }]); 
          showToast("Ingreso guardado correctamente.");
        }
        setNuevo({ fecha: todayStr, descripcion: '', persona: defaultPersona, tipo: 'Fijo', monto: '', cuentaId: '', plantilla: 'otro' }); 
        setErrors({});
      };

      const procesarIngresoFijo = (ingFijoId, cuentaId, montoFinal) => {
        if(!cuentaId) { showToast("Selecciona a qué cuenta ingresó el dinero.", "error"); return; }
        const inf = ingresosFijos.find(i => i.id === ingFijoId);
        const isCurrentMonth = selectedMonth === new Date().toISOString().slice(0, 7);
        const diaStr = isCurrentMonth ? new Date().getDate().toString().padStart(2, '0') : '01';
        const fechaIngreso = `${selectedMonth}-${diaStr}`; 
        
        const nuevoIngreso = { 
          id: generateId(), fecha: fechaIngreso, descripcion: inf.descripcion, 
          persona: inf.persona, tipo: inf.tipo, monto: Number(montoFinal) || inf.monto, 
          cuentaId: cuentaId, ingresoFijoId: inf.id 
        };
        setIngresos(prev => [...prev, nuevoIngreso]);
        showToast(`Ingreso de ${inf.descripcion} registrado.`);
      };

      const cargarParaEditar = (ing) => {
        setNuevo({ fecha: ing.fecha, descripcion: ing.descripcion, persona: ing.persona || '', tipo: ing.tipo || 'Variable', monto: ing.monto.toString(), cuentaId: ing.cuentaId, plantilla: 'otro' });
        setEditId(ing.id);
        setErrors({});
        setShowForm(true);
        setTimeout(() => formRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
      }

      const cancelarEdicion = () => {
        setEditId(null);
        setNuevo({ fecha: todayStr, descripcion: '', persona: defaultPersona, tipo: 'Fijo', monto: '', cuentaId: '', plantilla: 'otro' });
        setErrors({});
        setShowForm(false);
      }
      
      const ingresosMes = ingresos.filter(i => i.fecha.startsWith(selectedMonth));
      const optionsCuentas = cuentas.filter(c => ['bank', 'cash', 'pocket'].includes(c.type)).map(c => ({value: c.id, label: c.name}));

      const ingresosPendientes = ingresosFijos.map(inf => {
        const ingresoEsteMes = ingresosMes.find(i => i.ingresoFijoId === inf.id);
        const cuentaDefault = cuentas.find(c => c.name.includes(inf.cuentaName));
        return { ...inf, recibido: !!ingresoEsteMes, ingresoInfo: ingresoEsteMes, defaultCuentaId: cuentaDefault ? cuentaDefault.id : '' };
      }).sort((a, b) => a.recibido - b.recibido);

      return (
        <div className="space-y-6 animate-in fade-in duration-500 pb-20 md:pb-0">
          <header className="flex flex-col md:flex-row md:justify-between md:items-end gap-4">
            <div>
              <h1 className="text-2xl md:text-3xl font-bold text-white tracking-tight flex items-center gap-2 md:gap-3"><Wallet className="text-emerald-400 w-6 h-6 md:w-8 md:h-8"/> Ingresos</h1>
              <p className="text-sm md:text-base text-slate-400 mt-1">Registra tus ingresos de forma manual o utiliza la lista de fijos esperados.</p>
            </div>
            <div className="flex flex-wrap gap-2">
              <button onClick={() => { cancelarEdicion(); setShowForm(!showForm); }} className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-colors">
                <Plus size={16}/> {showForm ? 'Ocultar' : 'Nuevo Ingreso'}
              </button>
              <input type="file" accept=".xlsx, .xls" ref={fileInputRef} onChange={handleImport} className="hidden" />
              <button onClick={() => fileInputRef.current.click()} className="bg-slate-800 hover:bg-slate-700 text-emerald-400 px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-colors border border-emerald-500/30"><Upload size={14}/> Importar</button>
              <button onClick={handleExport} className="bg-emerald-600/20 hover:bg-emerald-600/30 text-emerald-400 px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-colors border border-emerald-500/30"><Download size={14}/> Exportar</button>
            </div>
          </header>

          <div className="grid grid-cols-1 gap-6">
            {showForm && (
              <Card className={editId ? "border-t-4 border-t-amber-500 bg-amber-950/10" : "border-t-4 border-t-emerald-500 bg-slate-900/80"}>
                <div className="flex justify-between items-center mb-4" ref={formRef}>
                  <h2 className="text-lg font-semibold text-white">{editId ? '✏️ Editar Ingreso' : '1. Registrar Ingreso Manual'}</h2>
                  {editId && <button onClick={cancelarEdicion} className="text-xs text-amber-400 hover:underline">Cancelar Edición</button>}
                </div>
                <form onSubmit={guardar} className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-3 mb-2 items-end">
                  {!editId && (
                    <Select label="Plantilla Rápida" options={opcionesPlantillas} value={nuevo.plantilla} onChange={handlePlantillaChange} className="col-span-1 sm:col-span-2 md:col-span-4" />
                  )}
                  {nuevo.plantilla === 'otro' || editId ? (
                     <Input label="Descripción del Ingreso" placeholder="Ej: Venta extra" value={nuevo.descripcion} onChange={e=>setNuevo({...nuevo, descripcion: e.target.value})} error={errors.descripcion} className="col-span-1 sm:col-span-2" />
                  ) : null}
                  
                  <Input type="date" label="Fecha" value={nuevo.fecha} onChange={e=>setNuevo({...nuevo, fecha: e.target.value})} error={errors.fecha} className="col-span-1" />
                  <Select label="Destino (Cuenta)" options={optionsCuentas} value={nuevo.cuentaId} onChange={e=>setNuevo({...nuevo, cuentaId: e.target.value})} error={errors.cuentaId} className="col-span-1" />
                  <Input type="number" label="Monto ($)" value={nuevo.monto} onChange={e=>setNuevo({...nuevo, monto: e.target.value})} error={errors.monto} className="col-span-1" />
                  <Input label="Persona (Opcional)" placeholder="Ej: L o A" value={nuevo.persona} onChange={e=>setNuevo({...nuevo, persona: e.target.value})} className="col-span-1" />
                  <Select label="Tipo" options={[{value:'Fijo',label:'Fijo'}, {value:'Variable',label:'Variable'}, {value:'Bono',label:'Bono'}, {value:'Freelance',label:'Freelance'}, {value:'Rendimiento',label:'Rendimiento'}]} value={nuevo.tipo} onChange={e=>setNuevo({...nuevo, tipo: e.target.value})} className="col-span-1 sm:col-span-2" />
                  
                  <div className="flex gap-2 col-span-1 sm:col-span-2 md:col-span-4 mt-2">
                    <button type="submit" className={`flex-1 ${editId ? 'bg-amber-600 hover:bg-amber-700' : 'bg-emerald-600 hover:bg-emerald-700'} text-white font-bold py-3 rounded-lg flex items-center justify-center gap-2 transition-colors`}>
                      {editId ? 'Actualizar Ingreso' : <><Plus size={18} /> Guardar Ingreso</>}
                    </button>
                    {editId && <button type="button" onClick={cancelarEdicion} className="bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-6 rounded-lg transition-colors">Cancelar</button>}
                  </div>
                </form>
              </Card>
            )}

            <Card className="h-full border-t-4 border-t-emerald-500/50">
              <div className="flex justify-between items-end mb-4">
                <h2 className="text-lg md:text-xl font-bold text-white flex items-center gap-2"><CheckSquare size={20} className="text-emerald-400"/> 2. Ingresos Fijos Esperados</h2>
              </div>
              {ingresosFijos.length > 0 ? (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                  {ingresosPendientes.map(inc => {
                    if (inc.recibido) {
                      return (
                        <div key={inc.id} className="bg-emerald-900/10 border border-emerald-500/20 rounded-lg p-3 flex justify-between items-center opacity-70">
                          <div><p className="font-bold text-emerald-400 line-through">{inc.descripcion}</p><p className="text-[10px] text-emerald-500/70">Recibido en {cuentas.find(c=>c.id===inc.ingresoInfo.cuentaId)?.name}</p></div>
                          <CheckCircle2 size={24} className="text-emerald-500" />
                        </div>
                      );
                    }
                    return <IngresoFijoCard key={inc.id} inc={inc} cuentasPermitidas={optionsCuentas} onReceive={(cuentaId, monto) => procesarIngresoFijo(inc.id, cuentaId, monto)} cuentas={cuentas} />;
                  })}
                </div>
              ) : (
                <p className="text-sm text-slate-500 py-4">No hay ingresos fijos configurados.</p>
              )}
            </Card>
          </div>

          <div className="mt-8 pt-8 border-t border-slate-800">
            <div className="flex justify-between items-end mb-4">
              <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider">Historial Completo de Ingresos</h3>
            </div>
            <div className="overflow-x-auto bg-slate-900 rounded-xl border border-slate-800">
              <table className="w-full text-sm text-left min-w-[600px]">
                <thead className="text-xs text-slate-400 uppercase bg-slate-950">
                  <tr><th className="px-4 py-4 rounded-tl-lg">Fecha</th><th className="px-4 py-4">Descripción</th><th className="px-4 py-4">Destino/Tipo</th><th className="px-4 py-4 text-right">Monto</th><th className="px-4 py-4 rounded-tr-lg"></th></tr>
                </thead>
                <tbody className="divide-y divide-slate-800/50">
                  {ingresosMes.map(ing => (
                    <tr key={ing.id} className={`transition-colors ${editId === ing.id ? 'bg-amber-900/20' : 'hover:bg-slate-800/20'}`}>
                      <td className="px-4 py-3 text-slate-300 whitespace-nowrap">{ing.fecha}</td>
                      <td className="px-4 py-3 text-slate-300 font-medium">{ing.descripcion}</td>
                      <td className="px-4 py-3 text-slate-400">
                        <span className="bg-slate-800 px-2 py-1 rounded-md text-xs block w-max mb-1">{ing.tipo}</span>
                        <span className="text-[10px] text-emerald-400/80">Entró a: {cuentas.find(c => c.id === ing.cuentaId)?.name || '?'}</span>
                      </td>
                      <td className="px-4 py-3 text-right font-bold text-emerald-400">{formatCOP(ing.monto)}</td>
                      <td className="px-4 py-3 text-right flex items-center justify-end gap-2">
                        <button onClick={() => cargarParaEditar(ing)} className="text-slate-500 hover:text-indigo-400 p-1.5" title="Editar Ingreso"><Edit3 size={16} /></button>
                        <button onClick={() => {deleteItem(setIngresos, ing.id); showToast("Ingreso eliminado");}} className="text-slate-500 hover:text-rose-400 p-1.5" title="Eliminar"><Trash2 size={16} /></button>
                      </td>
                    </tr>
                  ))}
                  {ingresosMes.length === 0 && <tr><td colSpan="5" className="text-center py-8 text-slate-500">No hay ingresos registrados este mes.</td></tr>}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    };
    const EgresosTab = ({ egresos, setEgresos, pagosFijos, setPagosFijos, cuentas, selectedMonth, categoriasMaestras, showToast, comprasCuotas, setComprasCuotas }) => {
      const todayStr = getLocalToday();
      const [gastoForm, setGastoForm] = useState({ id: null, editSource: null, fecha: todayStr, descripcion: '', categoria: categoriasMaestras[0] || 'Otros', metodoPago: '', cuentaId: '', monto: '', cuotas: '', tasaEA: '', esPagoDeuda: false, deudaDestinoId: '' });
      const [errorsVar, setErrorsVar] = useState({});
      const varRef = useRef(null);
      const fileInputRef = useRef(null);

      const isCreditCard = gastoForm.metodoPago === 'credit';

      const cuotaMensual = useMemo(() => {
        if (!isCreditCard) return 0;
        const p = Number(gastoForm.monto) || 0;
        const n = Number(gastoForm.cuotas) || 1;
        const ea = Number(gastoForm.tasaEA) || 0;
        const tm = Math.pow(1 + ea/100, 1/12) - 1;
        if (p <= 0 || n <= 0) return 0;
        if (tm === 0) return p / n;
        return (p * tm) / (1 - Math.pow(1 + tm, -n));
      }, [isCreditCard, gastoForm.monto, gastoForm.cuotas, gastoForm.tasaEA]);

      const handleMetodoChange = (e) => {
        setGastoForm(prev => ({...prev, metodoPago: e.target.value, cuentaId: '', cuotas: '', tasaEA: ''}));
      };

      const handleCuentaChange = (e) => {
        const cId = e.target.value;
        const card = cuentas.find(c => c.id === cId);
        setGastoForm(prev => ({
            ...prev,
            cuentaId: cId,
            tasaEA: card?.type === 'credit' ? (card.tasaEA || 0) : '',
            cuotas: card?.type === 'credit' ? (prev.cuotas || '1') : ''
        }));
      };

      const guardarGasto = (e) => {
        e.preventDefault();
        let errs = {};
        if(!gastoForm.descripcion) errs.descripcion = "Obligatorio";
        if(!gastoForm.monto) errs.monto = "Obligatorio";
        if(!gastoForm.metodoPago) errs.metodoPago = "Obligatorio";
        if(!gastoForm.cuentaId) errs.cuentaId = "Obligatorio";
        if(gastoForm.editSource !== 'cuotas' && !gastoForm.fecha) errs.fecha = "Obligatorio";
        if(isCreditCard && !gastoForm.cuotas) errs.cuotas = "Obligatorio";
        if(gastoForm.esPagoDeuda && !gastoForm.deudaDestinoId) errs.deudaDestinoId = "Obligatorio";
        
        if(Object.keys(errs).length > 0) { setErrorsVar(errs); return; }

        if (gastoForm.editSource === 'cuotas') {
            setComprasCuotas(prev => prev.map(c => c.id === gastoForm.id ? { 
                ...c, 
                tarjetaId: gastoForm.cuentaId, 
                descripcion: gastoForm.descripcion, 
                montoTotal: Number(gastoForm.monto), 
                cuotasTotales: Number(gastoForm.cuotas), 
                valorMensual: Math.round(cuotaMensual) 
            } : c));
            showToast("Compra a cuotas actualizada");
        } else if (gastoForm.editSource === 'historial') {
            setEgresos(prev => prev.map(eg => eg.id === gastoForm.id ? { 
                ...eg, 
                fecha: gastoForm.fecha,
                descripcion: gastoForm.descripcion,
                categoria: gastoForm.categoria,
                monto: Number(gastoForm.monto),
                cuentaId: gastoForm.cuentaId,
                deudaId: gastoForm.esPagoDeuda ? gastoForm.deudaDestinoId : (eg.deudaId || null)
            } : eg));
            showToast("Gasto actualizado.");
        } else {
            const fechaDefault = gastoForm.fecha || todayStr; 
            
            const nuevoEgreso = { 
                id: generateId(), 
                fecha: fechaDefault, 
                descripcion: gastoForm.descripcion, 
                categoria: gastoForm.categoria, 
                monto: Number(gastoForm.monto), 
                cuentaId: gastoForm.cuentaId, 
                tipo: 'Variable',
                deudaId: gastoForm.esPagoDeuda ? gastoForm.deudaDestinoId : null
            };
