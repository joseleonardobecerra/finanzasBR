                      <div className="bg-indigo-500 h-1.5 rounded-full transition-all" style={{width: `${progreso}%`}}></div>
                    </div>
                    <div className="flex justify-between items-center">
                      <span className="text-sm font-bold text-slate-300">{formatCOP(c.valorMensual)}/mes</span>
                      <button onClick={() => avanzarCuota(c.id)} className="text-[10px] bg-emerald-600/20 text-emerald-400 hover:bg-emerald-600/30 px-2 py-1 rounded font-bold">+1 Pagada</button>
                    </div>
                  </div>
                )
              })}
              {comprasCuotas.filter(c => c.cuotasPagadas < c.cuotasTotales).length === 0 && <p className="text-slate-500 text-sm">No hay compras a cuotas activas.</p>}
            </div>
          </Card>

          {/* SECCIÓN 3: PAGOS FIJOS */}
          <div className="flex justify-between items-end mt-8">
            <h2 className="text-lg md:text-xl font-bold text-white flex items-center gap-2"><CheckSquare size={20} className="text-amber-400"/> 3. Pagos Fijos (Checklist de {selectedMonth})</h2>
          </div>

          {pagosFijos.length > 0 ? (
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              {pagosPendientes.map(pf => {
                if (pf.pagado) {
                  return (
                    <div key={pf.id} className="bg-emerald-900/10 border border-emerald-500/20 rounded-lg p-3 flex justify-between items-center opacity-70">
                      <div><p className="font-bold text-emerald-400 line-through">{pf.descripcion}</p><p className="text-[10px] text-emerald-500/70">Pagado con {cuentas.find(c=>c.id===pf.egresoInfo.cuentaId)?.name}</p></div>
                      <CheckCircle2 size={24} className="text-emerald-500" />
                    </div>
                  );
                }
                return <PagoFijoCard key={pf.id} pf={pf} cuentasPermitidas={cuentasPermitidasPago} onPay={(cuentaId, monto) => procesarPagoFijo(pf.id, cuentaId, monto)} />;
              })}
            </div>
          ) : (
            <p className="text-sm text-slate-500 py-4">No has configurado pagos fijos. Abre "Editar Plantillas Fijas" en la pestaña Presupuestos.</p>
          )}

          {/* SECCIÓN 4: TABLA DE HISTORIAL */}
          <div className="mt-8 pt-8 border-t border-slate-800">
            <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">Historial Completo de Egresos (Fijos y Variables)</h3>
            <div className="overflow-x-auto bg-slate-900 rounded-xl border border-slate-800">
              <table className="w-full text-sm text-left min-w-[600px]">
                <thead className="text-xs text-slate-400 uppercase bg-slate-950">
                  <tr><th className="px-4 py-4 rounded-tl-lg">Fecha</th><th className="px-4 py-4">Descripción</th><th className="px-4 py-4">Categoría/Cuenta</th><th className="px-4 py-4 text-right">Monto</th><th className="px-4 py-4 rounded-tr-lg"></th></tr>
                </thead>
                <tbody className="divide-y divide-slate-800/50">
                  {egresosMes.map(g => (
                    <tr key={g.id} className={`transition-colors ${gastoForm.id === g.id && gastoForm.editSource === 'historial' ? 'bg-amber-900/20' : 'hover:bg-slate-800/20'}`}>
                      <td className="px-4 py-3 text-slate-300 whitespace-nowrap">{g.fecha}</td>
                      <td className="px-4 py-3 text-slate-300 font-medium">
                        {g.descripcion}
                        {g.tipo === 'Fijo' && <span className="ml-2 text-[9px] bg-amber-500/20 text-amber-400 px-1.5 py-0.5 rounded uppercase tracking-wider">Fijo</span>}
                      </td>
                      <td className="px-4 py-3 text-slate-400">
                        <span className="bg-slate-800 px-2 py-1 rounded-md text-xs block w-max mb-1">{g.categoria}</span>
                        <span className="text-[10px] text-indigo-400/80">Pagado con: {cuentas.find(c => c.id === g.cuentaId)?.name || '?'}</span>
                      </td>
                      <td className="px-4 py-3 text-right font-bold text-rose-400">{formatCOP(g.monto)}</td>
                      <td className="px-4 py-3 text-right flex items-center justify-end gap-2">
                        <button onClick={() => cargarParaEditarVariable(g)} className="text-slate-500 hover:text-indigo-400 p-1.5" title="Editar Gasto"><Edit3 size={16} /></button>
                        <button onClick={() => {deleteItem(setEgresos, g.id); showToast("Gasto eliminado");}} className="text-slate-500 hover:text-rose-400 p-1.5" title="Eliminar"><Trash2 size={16} /></button>
                      </td>
                    </tr>
                  ))}
                  {egresosMes.length === 0 && <tr><td colSpan="5" className="text-center py-8 text-slate-500">No hay egresos registrados este mes.</td></tr>}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    };

    const PresupuestosTab = ({ presupuestos, setPresupuestos, pagosFijos, setPagosFijos, egresos, selectedMonth, showToast, categoriasMaestras }) => {
      const [tipoForm, setTipoForm] = useState('variable'); 
      const [nuevoVar, setNuevoVar] = useState({ categoria: '', limite: '' });
      const [nuevoFijo, setNuevoFijo] = useState({ descripcion: '', monto: '', categoria: categoriasMaestras[0] || 'Otros', diaPago: '' });
      const [editId, setEditId] = useState(null);
      const [errors, setErrors] = useState({});
      const [filtroLista, setFiltroLista] = useState('Todos'); 
      const formRef = useRef(null);

      const guardar = (e) => {
        e.preventDefault();
        let errs = {};
        
        if (tipoForm === 'variable') {
          if(!nuevoVar.categoria) errs.categoria = "Requerido";
          if(!nuevoVar.limite) errs.limite = "Requerido";
          if(Object.keys(errs).length > 0) { setErrors(errs); return; }
          
          if (editId) {
            setPresupuestos(prev => prev.map(p => p.id === editId ? { ...p, categoria: nuevoVar.categoria, limite: Number(nuevoVar.limite) } : p));
            setEditId(null);
            showToast("Límite actualizado.");
          } else {
            setPresupuestos(prev => [...prev, { id: generateId(), categoria: nuevoVar.categoria, limite: Number(nuevoVar.limite) }]);
            showToast("Presupuesto agregado.");
          }
          setNuevoVar({ categoria: '', limite: '' });
        } else {
          if(!nuevoFijo.descripcion) errs.descripcion = "Requerido";
          if(!nuevoFijo.categoria) errs.categoria = "Requerido";
          if(!nuevoFijo.monto) errs.monto = "Requerido";
          if(!nuevoFijo.diaPago) errs.diaPago = "Requerido";
          if(Object.keys(errs).length > 0) { setErrors(errs); return; }

          if (editId) {
            setPagosFijos(prev => prev.map(pf => pf.id === editId ? { ...pf, descripcion: nuevoFijo.descripcion, categoria: nuevoFijo.categoria, monto: Number(nuevoFijo.monto), diaPago: Number(nuevoFijo.diaPago) } : pf));
            setEditId(null);
            showToast("Gasto Fijo actualizado.");
          } else {
            setPagosFijos(prev => [...prev, { id: generateId(), descripcion: nuevoFijo.descripcion, categoria: nuevoFijo.categoria, monto: Number(nuevoFijo.monto), diaPago: Number(nuevoFijo.diaPago) }]);
            showToast("Gasto Fijo agregado.");
          }
          setNuevoFijo({ descripcion: '', monto: '', categoria: categoriasMaestras[0] || 'Otros', diaPago: '' });
        }
        setErrors({});
      };

      const cargarParaEditar = (p) => {
        setEditId(p.id);
        setErrors({});
        if (p.tipo === 'Fijo') {
          setTipoForm('fijo');
          setNuevoFijo({ descripcion: p.nombre, monto: p.limite.toString(), categoria: p.categoria, diaPago: (p.diaPago || 1).toString() });
        } else {
          setTipoForm('variable');
          setNuevoVar({ categoria: p.categoria, limite: p.limite.toString() });
        }
        formRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      const cancelarEdicion = () => {
        setEditId(null);
        setNuevoVar({ categoria: '', limite: '' });
        setNuevoFijo({ descripcion: '', monto: '', categoria: categoriasMaestras[0] || 'Otros', diaPago: '' });
        setErrors({});
      }

      const egresosMes = egresos.filter(g => g.fecha.startsWith(selectedMonth));

      // --- Combinar y Filtrar Fijos y Variables ---
      const totalFijo = pagosFijos.reduce((s, p) => s + p.monto, 0);
      const totalVar = presupuestos.reduce((s, p) => s + p.limite, 0);
      const gastadoFijo = egresosMes.filter(e => e.tipo === 'Fijo').reduce((s, e) => s + e.monto, 0);
      const gastadoVar = egresosMes.filter(e => e.tipo !== 'Fijo').reduce((s, e) => s + e.monto, 0);

      const items = useMemo(() => {
        const list = [];
        if (filtroLista === 'Todos' || filtroLista === 'Fijos') {
          pagosFijos.forEach(pf => {
            const gastado = egresosMes.filter(e => e.pagoFijoId === pf.id).reduce((s, e) => s + e.monto, 0);
            list.push({ id: pf.id, tipo: 'Fijo', nombre: pf.descripcion, categoria: pf.categoria, limite: pf.monto, gastado, diaPago: pf.diaPago });
          });
        }
        if (filtroLista === 'Todos' || filtroLista === 'Variables') {
          presupuestos.forEach(p => {
            const gastado = egresosMes.filter(e => e.categoria.toLowerCase() === p.categoria.toLowerCase() && e.tipo !== 'Fijo').reduce((s, e) => s + e.monto, 0);
            list.push({ id: p.id, tipo: 'Variable', nombre: p.categoria, categoria: p.categoria, limite: p.limite, gastado });
          });
        }
        return list.sort((a, b) => b.limite - a.limite);
      }, [pagosFijos, presupuestos, egresosMes, filtroLista]);

      return (
        <div className="space-y-6 animate-in fade-in duration-500 pb-20 md:pb-0">
          <header>
            <h1 className="text-2xl md:text-3xl font-bold text-white tracking-tight flex items-center gap-2"><PieChart className="text-indigo-400 w-8 h-8"/> Presupuestos y Ejecución</h1>
            <p className="text-sm md:text-base text-slate-400 mt-1">Controla cómo se está gastando el dinero vs lo que tenías planificado.</p>
          </header>

          {/* Resumen Global Presupuestal */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
              <p className="text-[10px] text-slate-500 uppercase font-bold mb-1">Presupuesto Fijo</p>
              <p className="text-lg font-bold text-slate-200">{formatCOP(totalFijo)}</p>
            </div>
            <div className="bg-amber-500/10 p-4 rounded-xl border border-amber-500/20">
              <p className="text-[10px] text-amber-500 uppercase font-bold mb-1">Gastado Fijo</p>
              <p className="text-lg font-bold text-amber-400">{formatCOP(gastadoFijo)}</p>
            </div>
            <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
              <p className="text-[10px] text-slate-500 uppercase font-bold mb-1">Límite Variable</p>
              <p className="text-lg font-bold text-slate-200">{formatCOP(totalVar)}</p>
            </div>
            <div className="bg-indigo-500/10 p-4 rounded-xl border border-indigo-500/20">
              <p className="text-[10px] text-indigo-400 uppercase font-bold mb-1">Gastado Variable</p>
              <p className="text-lg font-bold text-indigo-400">{formatCOP(gastadoVar)}</p>
            </div>
          </div>

          <Card className={editId ? "border-t-4 border-t-amber-500 bg-amber-950/10" : ""}>
            <div className="flex justify-between items-center mb-4" ref={formRef}>
              <div className="flex gap-4">
                <button 
                  onClick={() => { if(!editId) setTipoForm('variable') }} 
                  type="button"
                  className={`text-sm md:text-lg font-semibold transition-colors ${tipoForm === 'variable' ? 'text-white' : 'text-slate-500 hover:text-slate-300'} ${editId && tipoForm !== 'variable' ? 'hidden' : ''}`}
                >
                  {editId && tipoForm === 'variable' ? '✏️ Editar Límite Variable' : 'Añadir Límite Variable'}
                </button>
                {!editId && <span className="text-slate-700">|</span>}
                <button 
                  onClick={() => { if(!editId) setTipoForm('fijo') }} 
                  type="button"
                  className={`text-sm md:text-lg font-semibold transition-colors ${tipoForm === 'fijo' ? 'text-white' : 'text-slate-500 hover:text-slate-300'} ${editId && tipoForm !== 'fijo' ? 'hidden' : ''}`}
                >
                  {editId && tipoForm === 'fijo' ? '✏️ Editar Gasto Fijo' : 'Añadir Gasto Fijo'}
                </button>
              </div>
              {editId && <button onClick={cancelarEdicion} className="text-xs text-amber-400 hover:underline">Cancelar Edición</button>}
            </div>
            <form onSubmit={guardar} className="grid grid-cols-1 sm:grid-cols-12 gap-3 items-end">
              {tipoForm === 'variable' ? (
                <>
                  <Input label="Categoría Variable (Libre texto)" placeholder="Ej: Gasolina, Mercado..." value={nuevoVar.categoria} onChange={e=>setNuevoVar({...nuevoVar, categoria: e.target.value})} error={errors.categoria} disabled={!!editId} className="sm:col-span-5" />
                  <Input type="number" label="Límite Mensual ($)" value={nuevoVar.limite} onChange={e=>setNuevoVar({...nuevoVar, limite: e.target.value})} error={errors.limite} className="sm:col-span-4" />
                  <div className="sm:col-span-3 flex gap-2">
                     <button type="submit" className={`w-full ${editId ? 'bg-amber-600 hover:bg-amber-700' : 'bg-indigo-600 hover:bg-indigo-700'} text-white font-medium py-2.5 md:py-2 rounded-lg transition-colors`}>{editId ? 'Actualizar' : 'Añadir Límite'}</button>
                  </div>
                </>
              ) : (
                <>
                  <Input label="Descripción (Gasto Fijo)" placeholder="Ej: Internet" value={nuevoFijo.descripcion} onChange={e=>setNuevoFijo({...nuevoFijo, descripcion: e.target.value})} error={errors.descripcion} className="sm:col-span-4" />
                  <Select label="Categoría Fija" options={categoriasMaestras.map(c=>({value:c, label:c}))} value={nuevoFijo.categoria} onChange={e=>setNuevoFijo({...nuevoFijo, categoria: e.target.value})} error={errors.categoria} className="sm:col-span-3" />
                  <Input type="number" label="Monto Estimado ($)" value={nuevoFijo.monto} onChange={e=>setNuevoFijo({...nuevoFijo, monto: e.target.value})} error={errors.monto} className="sm:col-span-2" />
                  <Input type="number" label="Día (1-31)" value={nuevoFijo.diaPago} onChange={e=>setNuevoFijo({...nuevoFijo, diaPago: e.target.value})} min="1" max="31" error={errors.diaPago} className="sm:col-span-1" />
                  <div className="sm:col-span-2 flex gap-2">
                     <button type="submit" className={`w-full ${editId ? 'bg-amber-600 hover:bg-amber-700' : 'bg-indigo-600 hover:bg-indigo-700'} text-white font-medium py-2.5 md:py-2 rounded-lg transition-colors`}>{editId ? 'Actualizar' : 'Añadir Fijo'}</button>
                  </div>
                </>
              )}
            </form>
          </Card>

          {/* Selector de Filtro */}
          <div className="flex bg-slate-950 p-1.5 rounded-xl border border-slate-800 text-sm font-medium w-full md:w-max">
            <button onClick={()=>setFiltroLista('Todos')} className={`flex-1 md:flex-none px-6 py-2 rounded-lg transition-colors ${filtroLista === 'Todos' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-slate-200'}`}>Todos</button>
            <button onClick={()=>setFiltroLista('Fijos')} className={`flex-1 md:flex-none px-6 py-2 rounded-lg transition-colors ${filtroLista === 'Fijos' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-slate-200'}`}>Fijos</button>
            <button onClick={()=>setFiltroLista('Variables')} className={`flex-1 md:flex-none px-6 py-2 rounded-lg transition-colors ${filtroLista === 'Variables' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-slate-200'}`}>Variables</button>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
            {items.map(p => {
              const porcentaje = Math.min((p.gastado / p.limite) * 100, 100);
              const isDanger = porcentaje > 90;
              const isWarning = porcentaje > 75 && !isDanger;
              const bgBar = p.tipo === 'Fijo' ? 'bg-amber-500' : (isDanger ? 'bg-rose-500' : isWarning ? 'bg-amber-500' : 'bg-emerald-500');

              return (
                <Card key={p.id + p.tipo} className={`border-t-4 ${p.tipo === 'Fijo' ? 'border-t-amber-500/50' : (isDanger ? 'border-t-rose-500' : isWarning ? 'border-t-amber-500' : 'border-t-emerald-500')}`}>
                  <div className="flex justify-between items-start mb-2">
                    <div>
                      <h3 className="font-bold text-white text-base leading-tight pr-2">{p.nombre}</h3>
                      <span className={`text-[9px] uppercase font-bold tracking-wider px-2 py-0.5 rounded mt-1 inline-block ${p.tipo === 'Fijo' ? 'bg-amber-500/20 text-amber-400' : 'bg-indigo-500/20 text-indigo-400'}`}>{p.tipo}</span>
                    </div>
                    <div className="flex gap-2">
                      <button onClick={() => cargarParaEditar(p)} className="text-slate-600 hover:text-indigo-400 p-1"><Edit3 size={14}/></button>
                      <button onClick={() => {
                        if (p.tipo === 'Variable') {
                          deleteItem(setPresupuestos, p.id);
                          showToast("Presupuesto eliminado");
                        } else {
                          deleteItem(setPagosFijos, p.id);
                          showToast("Gasto Fijo eliminado de esta vista y de la pestaña Egresos.");
                        }
                      }} className="text-slate-600 hover:text-rose-400 p-1"><Trash2 size={14}/></button>
                    </div>
                  </div>
                  <div className="flex justify-between text-xs text-slate-400 mb-3 mt-4">
                    <span>Gastado: <strong className="text-white">{formatCOP(p.gastado)}</strong></span>
                    <span>{p.tipo === 'Fijo' ? 'Estimado' : 'Límite'}: {formatCOP(p.limite)}</span>
                  </div>
                  <div className="w-full bg-slate-950 rounded-full h-3 mb-2 border border-slate-800">
                    <div className={`h-full rounded-full transition-all duration-1000 ${bgBar}`} style={{ width: `${porcentaje}%` }}></div>
                  </div>
                  <p className={`text-xs text-right font-bold ${p.tipo === 'Fijo' ? 'text-amber-400' : (isDanger ? 'text-rose-400' : isWarning ? 'text-amber-400' : 'text-emerald-400')}`}>
                    {porcentaje.toFixed(1)}% consumido
                  </p>
                </Card>
              );
            })}
            {items.length === 0 && <p className="col-span-1 md:col-span-2 lg:col-span-3 text-center text-slate-500 py-10 border border-dashed border-slate-800 rounded-xl">No hay elementos para mostrar en esta vista.</p>}
          </div>
        </div>
      );
    };

    const DeudasTab = ({ cuentas, setCuentas, showToast }) => {
      const [cardForm, setCardForm] = useState(null);
      const [loanForm, setLoanForm] = useState(null);
      const [errors, setErrors] = useState({});

      const deudasAnalizadas = cuentas
        .filter(c => ['credit', 'loan'].includes(c.type))
        .map(d => {
          const tasaMes = getTasaMensual(d.tasaEA);
          const interesMes = d.currentDebt * tasaMes;
          return { ...d, tasaMes, interesMes };
        })
        .sort((a, b) => b.tasaEA - a.tasaEA);

      const guardarTarjeta = (e) => {
        e.preventDefault();
        let errs = {};
        if(!cardForm.name) errs.name = "Obligatorio";
        if(Object.keys(errs).length > 0) { setErrors(errs); return; }

        let baseData = {
          name: cardForm.name,
          type: 'credit',
          initialBalance: 0,
          initialDebt: Number(cardForm.initialDebt) || 0,
          limit: Number(cardForm.limit) || 0,
          cuotaMinima: Number(cardForm.cuotaMinima) || 0,
          tasaEA: Number(cardForm.tasaEA) || 0
        };

        if (cardForm.id) {
          setCuentas(prev => prev.map(c => c.id === cardForm.id ? { ...c, ...baseData } : c));
          showToast("Tarjeta actualizada correctamente.");
        } else {
          setCuentas(prev => [...prev, { id: generateId(), ...baseData }]);
          showToast("Tarjeta creada correctamente.");
        }
        setCardForm(null);
        setErrors({});
      };

      const guardarPrestamo = (e) => {
        e.preventDefault();
        let errs = {};
        if(!loanForm.name) errs.name = "Obligatorio";
        if(Object.keys(errs).length > 0) { setErrors(errs); return; }

        let baseData = {
          name: loanForm.name,
          type: 'loan',
          initialBalance: 0,
          montoPrestado: Number(loanForm.montoPrestado) || 0,
          initialDebt: Number(loanForm.initialDebt) || 0,
          totalPagadoPrevio: Number(loanForm.totalPagadoPrevio) || 0,
          tasaEA: Number(loanForm.tasaEA) || 0,
          cuotaMinima: Number(loanForm.cuotaMinima) || 0,
          cuotasTotales: Number(loanForm.cuotasTotales) || 0,
          cuotasPagadas: Number(loanForm.cuotasPagadas) || 0,
          hasIBR: loanForm.hasIBR || false,
          ibrValue: Number(loanForm.ibrValue) || 0,
          ibrPuntos: Number(loanForm.ibrPuntos) || 0
        };

        if(loanForm.hasIBR) {
            const namv = baseData.ibrValue + baseData.ibrPuntos;
            baseData.tasaEA = (Math.pow(1 + (namv/100)/12, 12) - 1) * 100;
        }

        if (loanForm.id) {
          setCuentas(prev => prev.map(c => c.id === loanForm.id ? { ...c, ...baseData } : c));
          showToast("Préstamo actualizado.");
        } else {
          setCuentas(prev => [...prev, { id: generateId(), ...baseData }]);
          showToast("Préstamo creado.");
        }
        setLoanForm(null);
        setErrors({});
      };

      const cargarParaEditar = (c) => {
        if(c.type === 'credit') {
           setCardForm({
             id: c.id, name: c.name, initialDebt: c.initialDebt, limit: c.limit, tasaEA: c.tasaEA, cuotaMinima: c.cuotaMinima
           });
        } else {
           setLoanForm({
             id: c.id, name: c.name, 
             montoPrestado: c.montoPrestado || c.initialDebt, initialDebt: c.initialDebt, 
             totalPagadoPrevio: c.totalPagadoPrevio || 0, tasaEA: c.tasaEA, cuotaMinima: c.cuotaMinima,
             cuotasTotales: c.cuotasTotales || 0, cuotasPagadas: c.cuotasPagadas || 0,
             hasIBR: c.hasIBR || false, ibrValue: c.ibrValue || 0, ibrPuntos: c.ibrPuntos || 0
           });
        }
        setErrors({});
      };

      const actualizarCampo = (id, field, val) => {
        setCuentas(prev => prev.map(c => c.id === id ? {...c, [field]: Number(val)} : c));
      }

      const actualizarIBR = (id, ibrValue, ibrPuntos) => {
        const val = Number(ibrValue);
        const pts = Number(ibrPuntos);
        const namv = val + pts;
        const nuevaEA = (Math.pow(1 + (namv/100)/12, 12) - 1) * 100;
        setCuentas(prev => prev.map(c => c.id === id ? {...c, ibrValue: val, tasaEA: nuevaEA} : c));
      }

      return (
        <div className="space-y-6 animate-in fade-in duration-500 pb-20 md:pb-0">
          <header>
            <h1 className="text-2xl md:text-3xl font-bold text-white tracking-tight flex items-center gap-2 md:gap-3"><ShieldAlert className="text-rose-500 w-6 h-6 md:w-8 md:h-8"/> Tarjetas y Créditos</h1>
            <p className="text-sm md:text-base text-slate-400 mt-1">Estrategia Avalancha y detalle de tus deudas y préstamos.</p>
          </header>

          <div className="flex gap-2">
            <button onClick={() => {setCardForm({id: null, name: '', initialDebt: '', limit: '', tasaEA: '', cuotaMinima: ''}); setLoanForm(null);}} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-colors">
              <Plus size={16}/> Agregar Tarjeta
            </button>
            <button onClick={() => {setLoanForm({id: null, name: '', montoPrestado: '', initialDebt: '', totalPagadoPrevio: '', tasaEA: '', cuotaMinima: '', cuotasTotales: '', cuotasPagadas: '', hasIBR: false, ibrValue: '', ibrPuntos: ''}); setCardForm(null);}} className="bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-colors">
              <Plus size={16}/> Agregar Préstamo
            </button>
          </div>

          {cardForm && (
            <div className="bg-slate-950 border border-indigo-500/50 p-4 rounded-xl mb-4 animate-in slide-in-from-top-2">
              <div className="flex justify-between items-center mb-3">
                <h3 className="text-sm font-bold text-indigo-400">{cardForm.id ? 'Editar Tarjeta' : 'Nueva Tarjeta'}</h3>
                <button onClick={() => setCardForm(null)} className="text-xs text-slate-400 hover:text-slate-200">Cancelar</button>
              </div>
              <form onSubmit={guardarTarjeta} className="grid grid-cols-2 md:grid-cols-6 gap-3 items-end">
                <Input label="Nombre de Tarjeta" value={cardForm.name} onChange={e=>setCardForm({...cardForm, name: e.target.value})} error={errors.name} className="col-span-2" />
                <Input type="number" label="Cupo Total ($)" value={cardForm.limit} onChange={e=>setCardForm({...cardForm, limit: e.target.value})} className="col-span-1" />
                <Input type="number" label="Deuda Actual ($)" value={cardForm.initialDebt} onChange={e=>setCardForm({...cardForm, initialDebt: e.target.value})} className="col-span-1" />
                <Input type="number" label="Tasa E.A. (%)" value={cardForm.tasaEA} onChange={e=>setCardForm({...cardForm, tasaEA: e.target.value})} step="0.01" className="col-span-1" />
                <Input type="number" label="Cuota Mínima ($)" value={cardForm.cuotaMinima} onChange={e=>setCardForm({...cardForm, cuotaMinima: e.target.value})} className="col-span-1" />
                <div className="col-span-2 md:col-span-6 mt-1 flex justify-end">
                  <button type="submit" className="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold px-4 py-2 rounded transition-colors">
                    {cardForm.id ? 'Guardar Cambios' : 'Crear Tarjeta'}
                  </button>
                </div>
              </form>
            </div>
          )}

          {loanForm && (
            <div className="bg-slate-950 border border-rose-500/50 p-4 md:p-6 rounded-xl mb-4 animate-in slide-in-from-top-2">
              <div className="flex justify-between items-center mb-4 border-b border-slate-800 pb-3">
                <h3 className="text-base font-bold text-rose-400">{loanForm.id ? 'Editar Préstamo / Crédito' : 'Nuevo Préstamo'}</h3>
                <button onClick={() => setLoanForm(null)} className="text-xs text-slate-400 hover:text-slate-200">Cancelar</button>
              </div>
              <form onSubmit={guardarPrestamo} className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 items-end">
                <Input label="Banco / Entidad (Nombre)" value={loanForm.name} onChange={e=>setLoanForm({...loanForm, name: e.target.value})} error={errors.name} className="sm:col-span-2" />
                <Input type="number" label="Monto Inicial Prestado ($)" value={loanForm.montoPrestado} onChange={e=>setLoanForm({...loanForm, montoPrestado: e.target.value})} className="sm:col-span-1" />
                <Input type="number" label="Deuda Restante Actual ($)" value={loanForm.initialDebt} onChange={e=>setLoanForm({...loanForm, initialDebt: e.target.value})} className="sm:col-span-1" />
                
                <Input type="number" label="Total Pagado Previo ($)" placeholder="Dinero abonado antes de usar la app" value={loanForm.totalPagadoPrevio} onChange={e=>setLoanForm({...loanForm, totalPagadoPrevio: e.target.value})} className="sm:col-span-1" />
                <Input type="number" label="Valor Cuota Fija ($)" value={loanForm.cuotaMinima} onChange={e=>setLoanForm({...loanForm, cuotaMinima: e.target.value})} className="sm:col-span-1" />
                <div className="sm:col-span-2 flex gap-4 bg-slate-900/50 p-2 rounded-lg border border-slate-800">
                   <Input type="number" label="Cuotas Pagadas" value={loanForm.cuotasPagadas} onChange={e=>setLoanForm({...loanForm, cuotasPagadas: e.target.value})} className="w-full" />
                   <Input type="number" label="Cuotas Totales" value={loanForm.cuotasTotales} onChange={e=>setLoanForm({...loanForm, cuotasTotales: e.target.value})} className="w-full" />
                </div>

                <div className="sm:col-span-4 bg-indigo-950/20 p-4 rounded-lg border border-indigo-500/30 flex flex-col md:flex-row gap-4 items-center">
                  <label className="flex items-center gap-2 cursor-pointer text-sm font-medium text-indigo-300 w-full md:w-auto">
                    <input type="checkbox" checked={loanForm.hasIBR} onChange={(e) => setLoanForm({...loanForm, hasIBR: e.target.checked})} className="form-checkbox text-indigo-500 rounded border-slate-700 bg-slate-900" />
                    ¿Tiene Tasa Variable (IBR)?
                  </label>
                  {loanForm.hasIBR ? (
                    <div className="flex w-full gap-3">
                      <Input type="number" step="0.01" label="IBR Actual (%)" value={loanForm.ibrValue} onChange={e=>setLoanForm({...loanForm, ibrValue: e.target.value})} className="flex-1" />
                      <Input type="number" step="0.01" label="Puntos Adicionales" value={loanForm.ibrPuntos} onChange={e=>setLoanForm({...loanForm, ibrPuntos: e.target.value})} className="flex-1" />
                    </div>
                  ) : (
                    <Input type="number" step="0.01" label="Tasa de Interés (E.A. %)" value={loanForm.tasaEA} onChange={e=>setLoanForm({...loanForm, tasaEA: e.target.value})} className="w-full md:w-1/3" />
                  )}
                </div>

                <div className="sm:col-span-4 mt-2 flex justify-end">
                  <button type="submit" className="bg-rose-600 hover:bg-rose-500 text-white font-bold px-8 py-3 rounded-lg transition-colors w-full md:w-auto">
                    {loanForm.id ? 'Guardar Cambios del Préstamo' : 'Crear Préstamo'}
                  </button>
                </div>
              </form>
            </div>
          )}

          {/* TABLA DE TARJETAS DE CRÉDITO */}
          <Card className="border-t-4 border-t-indigo-500">
            <h2 className="text-lg font-bold text-white mb-4">Tarjetas de Crédito</h2>
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left min-w-[800px]">
                <thead className="text-[10px] text-slate-400 uppercase bg-slate-900/50">
                  <tr>
                    <th className="px-3 py-3 rounded-tl-lg">Tarjeta</th>
                    <th className="px-3 py-3 text-right">Cupo Total</th>
                    <th className="px-3 py-3 text-right">Cupo Disp.</th>
                    <th className="px-3 py-3 text-right">Deuda Actual</th>
                    <th className="px-3 py-3 text-center">Tasa M.V.</th>
                    <th className="px-3 py-3 text-center">Tasa E.A.</th>
                    <th className="px-3 py-3 text-center">Cuota Mín.</th>
                    <th className="px-3 py-3 text-center rounded-tr-lg">Acciones</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-800/50">
                  {deudasAnalizadas.filter(d=>d.type==='credit').map(d => {
                    const tasaMV = getTasaMensual(d.tasaEA) * 100;
                    return (
                      <tr key={d.id} className="hover:bg-slate-800/20 transition-colors">
                        <td className="px-3 py-3 font-medium text-slate-200">{d.name}</td>
                        <td className="px-3 py-3 text-right text-slate-300">{formatCOP(d.limit)}</td>
                        <td className="px-3 py-3 text-right font-bold text-emerald-400">{formatCOP(Math.max(0, d.limit - d.currentDebt))}</td>
                        <td className="px-3 py-3 text-right font-bold text-rose-400">{formatCOP(d.currentDebt)}</td>
                        <td className="px-3 py-3 text-center text-amber-400">{tasaMV.toFixed(2)}%</td>
                        <td className="px-3 py-3 text-center text-slate-300">{d.tasaEA}%</td>
                        <td className="px-3 py-3 text-center text-slate-300">{formatCOP(d.cuotaMinima)}</td>
                        <td className="px-3 py-3 text-center flex justify-center gap-2">
                          <button onClick={() => cargarParaEditar(d)} className="text-slate-400 hover:text-indigo-400 p-1.5 bg-slate-900 rounded border border-slate-800 hover:border-indigo-500/50 transition-colors"><Edit3 size={14}/></button>
                          <button onClick={() => {deleteItem(setCuentas, d.id); showToast("Tarjeta eliminada");}} className="text-slate-400 hover:text-rose-400 p-1.5 bg-slate-900 rounded border border-slate-800 hover:border-rose-500/50 transition-colors"><Trash2 size={14}/></button>
                        </td>
                      </tr>
                    )
                  })}
                  {deudasAnalizadas.filter(d=>d.type==='credit').length === 0 && (
                    <tr><td colSpan="8" className="px-3 py-6 text-center text-slate-500">No hay tarjetas de crédito registradas.</td></tr>
                  )}
                </tbody>
              </table>
            </div>
          </Card>

          <Card className="border-t-4 border-t-rose-500">
            <h2 className="text-lg font-bold text-white mb-6">Créditos y Préstamos Detallados</h2>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              {deudasAnalizadas.filter(d=>d.type==='loan').map(d => {
                const capitalPagado = (d.montoPrestado || 0) - d.currentDebt;
                const totalIntereses = (d.totalPagado || 0) - capitalPagado;

                return (
                  <div key={d.id} className="bg-slate-950 p-5 rounded-xl border border-slate-800 shadow-md flex flex-col gap-4">
                    <div className="flex justify-between items-start border-b border-slate-800 pb-3">
                      <div>
                        <p className="font-bold text-slate-200 text-lg md:text-xl">{d.name}</p>
                        <p className="text-xs text-slate-500 uppercase font-medium">Banco / Entidad</p>
                        {d.hasIBR && <span className="mt-2 inline-block text-[9px] text-indigo-400 font-bold uppercase tracking-wider bg-indigo-400/10 px-2 py-1 rounded border border-indigo-500/20">Tasa Variable (IBR)</span>}
                      </div>
                      <div className="flex gap-2">
                        <button onClick={() => cargarParaEditar(d)} className="text-slate-400 hover:text-indigo-400 p-1.5 bg-slate-900 rounded border border-slate-800 hover:border-indigo-500/50 transition-colors"><Edit3 size={16}/></button>
                        <button onClick={() => {deleteItem(setCuentas, d.id); showToast("Préstamo eliminado");}} className="text-slate-400 hover:text-rose-400 p-1.5 bg-slate-900 rounded border border-slate-800 hover:border-rose-500/50 transition-colors"><Trash2 size={16}/></button>
                      </div>
                    </div>
                    
                    <div className="grid grid-cols-2 gap-4 pt-1">
                      <div>
                        <p className="text-[10px] text-slate-500 uppercase font-bold mb-1">Deuda Restante</p>
                        <p className="text-xl font-black text-rose-400">{formatCOP(d.currentDebt)}</p>
                      </div>
                      <div className="text-right">
                        <p className="text-[10px] text-slate-500 uppercase font-bold mb-1">Valor Cuota</p>
                        <p className="text-xl font-bold text-slate-200">{formatCOP(d.cuotaMinima)}</p>
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4 mt-2 bg-slate-900 p-4 rounded-lg border border-slate-800/50">
                      <div>
                        <p className="text-[10px] text-emerald-500/80 uppercase font-bold mb-1" title="Monto Original - Deuda Restante">Capital Pago (Abono)</p>
                        <p className="text-base font-bold text-emerald-400">{formatCOP(Math.max(0, capitalPagado))}</p>
                      </div>
                      <div className="text-right">
                        <p className="text-[10px] text-amber-500/80 uppercase font-bold mb-1" title="Total Histórico Pagado - Capital Pago">Total Intereses Pagados</p>
                        <p className="text-base font-bold text-amber-400">{formatCOP(Math.max(0, totalIntereses))}</p>
                      </div>
                    </div>

                    <div className="flex justify-between items-center mt-3 pt-4 border-t border-slate-800">
                       <div className="flex flex-col gap-1 w-1/2">
                         <span className="text-[10px] text-slate-500 uppercase font-bold">Progreso Cuotas</span>
                         <div className="flex items-center gap-1.5 bg-slate-950 px-3 py-2 rounded-lg border border-slate-700 w-max">
                           <input type="number" value={d.cuotasPagadas || 0} onChange={(e)=>actualizarCampo(d.id, 'cuotasPagadas', e.target.value)} className="w-10 bg-transparent text-emerald-400 text-sm font-bold outline-none text-right" />
                           <span className="text-slate-500 text-[10px]">/</span>
                           <input type="number" value={d.cuotasTotales || 0} onChange={(e)=>actualizarCampo(d.id, 'cuotasTotales', e.target.value)} className="w-10 bg-transparent text-slate-300 text-sm font-bold outline-none" />
                         </div>
                       </div>
                       
                       <div className="text-right w-1/2">
                          {d.hasIBR ? (
                             <div className="flex flex-col items-end">
                               <span className="text-[10px] text-slate-500 uppercase font-bold">IBR Actual (%) + Puntos</span>
                               <div className="flex items-center gap-1 mt-1">
                                 <input type="number" step="0.01" value={d.ibrValue} onChange={(e)=>actualizarIBR(d.id, e.target.value, d.ibrPuntos)} className="w-16 bg-slate-950 border border-slate-700 text-white text-sm font-bold px-2 py-1.5 rounded outline-none text-center focus:border-indigo-500" />
                                 <span className="text-sm text-slate-400 font-bold">+{d.ibrPuntos}</span>
                               </div>
                               <span className="text-[10px] text-indigo-400 mt-2 block font-medium">Tasa E.A: {d.tasaEA.toFixed(2)}%</span>
                             </div>
                          ) : (
                             <div className="flex flex-col items-end">
                               <span className="text-[10px] text-slate-500 uppercase font-bold">Tasa Interés (E.A.)</span>
                               <div className="flex items-center gap-1 mt-1">
                                  <input type="number" step="0.1" value={d.tasaEA.toFixed(2)} onChange={(e)=>actualizarCampo(d.id, 'tasaEA', e.target.value)} className="w-20 bg-slate-950 border border-slate-700 text-white text-sm font-bold px-2 py-1.5 rounded outline-none text-center focus:border-indigo-500" />
                                  <span className="text-slate-400 font-bold">%</span>
                               </div>
                             </div>
                          )}
                       </div>
                    </div>
                  </div>
                )
              })}
            </div>
          </Card>

          <Card>
            <h2 className="text-lg font-bold text-white mb-4">Estrategia Avalancha Global (Resumen)</h2>
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left min-w-[600px]">
                <thead className="text-xs text-slate-400 uppercase bg-slate-950">
                  <tr>
                    <th className="px-4 py-3 rounded-tl-lg">Prio</th>
                    <th className="px-4 py-3">Obligación</th>
                    <th className="px-4 py-3 text-right">Deuda Real</th>
                    <th className="px-4 py-3 text-center">Tasa E.A.</th>
                    <th className="px-4 py-3 text-right rounded-tr-lg">Cuota Mínima</th>
                  </tr>
                </thead>
                <tbody>
                  {deudasAnalizadas.filter(c => c.currentDebt > 0).map((d, i) => (
                    <tr key={d.id} className={`border-b border-slate-800/50 hover:bg-slate-800/20 ${i===0 ? 'bg-indigo-950/20' : ''}`}>
                      <td className="px-4 py-3"><div className={`w-6 h-6 rounded flex items-center justify-center text-xs font-bold ${i===0 ? 'bg-indigo-500 text-white' : 'bg-slate-800 text-slate-400'}`}>{i+1}</div></td>
                      <td className="px-4 py-3 text-slate-200 font-medium">{d.name} {i===0 && <span className="text-[9px] md:text-[10px] uppercase tracking-wider text-indigo-400 font-bold mt-1 block">Objetivo Avalancha (Abonar extra aquí)</span>}</td>
                      <td className="px-4 py-3 text-right text-slate-300 font-bold">{formatCOP(d.currentDebt)}</td>
                      <td className="px-4 py-3 text-center font-bold text-rose-400">{d.tasaEA.toFixed(2)}%</td>
                      <td className="px-4 py-3 text-right text-slate-300">{formatCOP(d.cuotaMinima)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      );
    };

    const SimuladorTab = ({ cuentas, addPagoFijo, showToast }) => {
      const [activeSim, setActiveSim] = useState('acelerado'); 

      // --- Simulador 1: Pago Acelerado Deudas ---
      const [s1, setS1] = useState({ deudaId: '', extra: 200000 });
      const dSeleccionada = cuentas.find(c => c.id === s1.deudaId);
      const s1Saldo = dSeleccionada ? dSeleccionada.currentDebt : 0;
      const s1Tasa = dSeleccionada ? dSeleccionada.tasaEA : 0;
      const s1Cuota = dSeleccionada ? dSeleccionada.cuotaMinima : 0;

      const calcSim1 = () => {
        if (s1Saldo <= 0) return { error: "Selecciona una obligación con deuda actual para simular." };
        const tm = getTasaMensual(s1Tasa); const intMesActual = s1Saldo * tm;
        if (s1Cuota <= intMesActual) return { error: "La cuota actual no cubre ni los intereses mensuales. Incrementa la cuota base en la pestaña Deudas." };
        
        const simular = (pagoMensual) => { 
          let saldoRemanente = s1Saldo; let meses = 0; let intTotal = 0; 
          while(saldoRemanente > 0 && meses < 600) { 
            const int = saldoRemanente * tm; 
            intTotal += int; 
            saldoRemanente = saldoRemanente + int - pagoMensual; 
            meses++; 
          } 
          return { meses, intTotal }; 
        };
        const escenarioNormal = simular(s1Cuota); 
        const escenarioAcelerado = simular(s1Cuota + s1.extra);
        
        return { 
          mesesNormal: escenarioNormal.meses, intNormal: Math.round(escenarioNormal.intTotal), 
          mesesAcelerado: escenarioAcelerado.meses, intAcelerado: Math.round(escenarioAcelerado.intTotal), 
          ahorroInt: Math.round(escenarioNormal.intTotal - escenarioAcelerado.intTotal), 
          ahorroMeses: escenarioNormal.meses - escenarioAcelerado.meses 
        };
      };
      const resS1 = s1Saldo > 0 ? calcSim1() : null;

      const asumirAcelerado = () => {
        if (!dSeleccionada) { showToast("Selecciona una deuda primero", "error"); return; }
        addPagoFijo({ descripcion: `Abono Acelerado: ${dSeleccionada.name}`, categoria: 'Deudas', monto: s1Cuota + s1.extra, diaPago: 1 });
        showToast(`Simulación guardada! Abono de ${formatCOP(s1Cuota + s1.extra)} en Pagos Fijos.`);
      };


      // --- Simulador 2: Plan de Ahorro ---
      const [s2, setS2] = useState({ nombre: '', objetivo: 5000000, ahorrado: 0, meses: 12, tasaEA: 5 });
      
      const calcSim2 = () => {
        if (s2.objetivo <= 0 || s2.meses <= 0) return null;
        const tm = getTasaMensual(s2.tasaEA);
        let reqMensual = 0;
        
        if (tm === 0) {
          reqMensual = (s2.objetivo - s2.ahorrado) / s2.meses;
        } else {
          const factor = Math.pow(1 + tm, s2.meses);
          const futuroAhorrado = s2.ahorrado * factor;
          const restante = s2.objetivo - futuroAhorrado;
          if (restante > 0) reqMensual = (restante * tm) / (factor - 1);
        }
        
        reqMensual = Math.max(0, reqMensual);
        const totalAportado = s2.ahorrado + (reqMensual * s2.meses);
        const rendimientos = s2.objetivo - totalAportado;
        
        return { aporteMensual: Math.round(reqMensual), totalAportado: Math.round(totalAportado), rendimientos: Math.round(rendimientos) };
      };
      const resS2 = calcSim2();

      const asumirAhorro = () => {
        if (!s2.nombre) { showToast("Escribe un nombre para tu Plan de Ahorro.", "error"); return; }
        addPagoFijo({ descripcion: `Ahorro: ${s2.nombre}`, categoria: 'Inversión', monto: resS2.aporteMensual, diaPago: 1 });
        showToast(`Plan activado. Cuota de ${formatCOP(resS2.aporteMensual)} en Pagos Fijos.`);
      };


      // --- Simulador 3: Interés Compuesto / Inversiones ---
      const [s3, setS3] = useState({ invId: 'otra', capital: 0, tasa: 10, anos: 5, aporte: 200000 });
      
      const handleInvChange = (e) => {
        const val = e.target.value;
        if (val === 'otra' || val === '') {
          setS3({...s3, invId: val, capital: 0, tasa: 10});
        } else {
          const inv = cuentas.find(c => c.id === val);
          if (inv) setS3({...s3, invId: val, capital: inv.currentBalance, tasa: inv.tasaEA});
        }
      }

      const calcSim3 = () => {
        const tm = getTasaMensual(s3.tasa); const meses = s3.anos * 12; let vf = s3.capital * Math.pow(1 + tm, meses);
        if (s3.aporte > 0) vf += s3.aporte * ((Math.pow(1 + tm, meses) - 1) / tm);
        const capitalInvertido = s3.capital + (s3.aporte * meses); return { vf, capitalInvertido, rendimientos: vf - capitalInvertido };
      };
      const resS3 = calcSim3();

      const asumirInversion = () => {
        const iSeleccionada = cuentas.find(c => c.id === s3.invId);
        const nombreDesc = iSeleccionada ? iSeleccionada.name : 'Nueva Inversión';
        addPagoFijo({ descripcion: `Aporte a Inversión: ${nombreDesc}`, categoria: 'Inversión', monto: s3.aporte, diaPago: 1 });
        showToast(`Aporte programado de ${formatCOP(s3.aporte)} en Pagos Fijos.`);
      };

      return (
        <div className="space-y-6 animate-in fade-in duration-500 pb-20 md:pb-0 max-w-4xl mx-auto">
          <header>
            <h1 className="text-2xl md:text-3xl font-bold text-white tracking-tight">Simuladores y Proyecciones</h1>
            <p className="text-sm md:text-base text-slate-400 mt-1">Conecta con tus datos reales y "Asume el gasto" para integrarlo a tus pagos mensuales.</p>
          </header>

          {/* Selector de Simulación */}
          <div className="flex bg-slate-950 p-1.5 rounded-xl border border-slate-800 text-sm font-medium">
            <button onClick={()=>setActiveSim('acelerado')} className={`flex-1 py-2.5 rounded-lg transition-colors ${activeSim === 'acelerado' ? 'bg-rose-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'}`}>Pago Acelerado</button>
            <button onClick={()=>setActiveSim('ahorro')} className={`flex-1 py-2.5 rounded-lg transition-colors ${activeSim === 'ahorro' ? 'bg-emerald-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'}`}>Plan de Ahorro</button>
            <button onClick={()=>setActiveSim('inversion')} className={`flex-1 py-2.5 rounded-lg transition-colors ${activeSim === 'inversion' ? 'bg-amber-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'}`}>Int. Compuesto</button>
          </div>

          {activeSim === 'acelerado' && (
            <Card className="border-t-4 border-t-rose-500 animate-in slide-in-from-bottom-4">
              <h2 className="text-lg md:text-xl font-bold text-white mb-2 flex items-center gap-2"><TrendingUp size={20} className="text-rose-400"/> Pago Acelerado (Deudas)</h2>
              <p className="text-sm text-slate-400 mb-6">Proyecta cuánto tiempo y dinero ahorras si aumentas la cuota de tus obligaciones actuales.</p>
              
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                <Select label="Elige tu crédito o tarjeta" options={cuentas.filter(c=>['credit','loan'].includes(c.type)).map(c=>({value:c.id,label:`${c.name} (Deuda: ${formatCOP(c.currentDebt)})`}))} value={s1.deudaId} onChange={e=>setS1({...s1, deudaId: e.target.value})} className="sm:col-span-2" />
                <Input type="number" label="Abono EXTRA mensual ($)" value={s1.extra} onChange={e=>setS1({...s1, extra: Number(e.target.value)})} className="bg-slate-900 sm:col-span-2" />
              </div>

              {resS1 && resS1.error ? (
                <div className="p-4 bg-rose-500/20 text-rose-400 rounded-lg text-sm font-medium">{resS1.error}</div>
              ) : resS1 ? (
                <div className="bg-slate-950 p-4 md:p-6 rounded-xl border border-slate-800 space-y-6">
                  <div className="flex justify-between items-center pb-4 border-b border-slate-800">
                    <div className="text-center w-1/2 border-r border-slate-800 pr-2">
                      <p className="text-xs text-slate-500 mb-1 uppercase tracking-wider">Pagando lo actual</p>
                      <p className="text-lg md:text-xl font-bold text-slate-300">{resS1.mesesNormal} meses</p>
                      <p className="text-xs text-rose-400 mt-1">{formatCOP(resS1.intNormal)} intereses</p>
                    </div>
                    <div className="text-center w-1/2 pl-2">
                      <p className="text-xs text-slate-500 mb-1 uppercase tracking-wider">Abonando el Extra</p>
                      <p className="text-lg md:text-xl font-bold text-indigo-400">{resS1.mesesAcelerado} meses</p>
                      <p className="text-xs text-amber-400 mt-1">{formatCOP(resS1.intAcelerado)} intereses</p>
                    </div>
                  </div>
                  <div className="bg-emerald-500/10 p-4 rounded-lg border border-emerald-500/20 text-center">
                    <p className="text-sm text-emerald-400 font-medium">✨ Con este abono, te ahorras <span className="font-bold text-lg">{formatCOP(resS1.ahorroInt)}</span> y terminas {resS1.ahorroMeses} meses antes.</p>
                  </div>
                  <button onClick={asumirAcelerado} className="w-full bg-rose-600 hover:bg-rose-500 text-white font-bold py-3 rounded-lg transition-colors flex justify-center items-center gap-2">
                    <CheckCircle2 size={18}/> Asumir Gasto Fijo: {formatCOP(s1Cuota + s1.extra)} / mes
                  </button>
                </div>
              ) : null}
            </Card>
          )}

          {activeSim === 'ahorro' && (
            <Card className="border-t-4 border-t-emerald-500 animate-in slide-in-from-bottom-4">
              <h2 className="text-lg md:text-xl font-bold text-white mb-2 flex items-center gap-2"><Target size={20} className="text-emerald-400"/> Plan de Ahorro</h2>
              <p className="text-sm text-slate-400 mb-6">Define un objetivo de dinero y tiempo. El sistema calculará la cuota mensual exacta requerida.</p>

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                <Input label="Nombre del Plan (Ej: Viaje, Carro)" placeholder="Escribe tu meta..." value={s2.nombre} onChange={e=>setS2({...s2, nombre: e.target.value})} className="sm:col-span-2" />
                <Input type="number" label="¿Cuánto dinero necesitas? ($)" value={s2.objetivo} onChange={e=>setS2({...s2, objetivo: Number(e.target.value)})} />
                <Input type="number" label="¿En cuántos meses? (Ej: 12)" value={s2.meses} onChange={e=>setS2({...s2, meses: Number(e.target.value)})} />
                <Input type="number" label="Rendimiento del banco E.A. (%)" value={s2.tasaEA} onChange={e=>setS2({...s2, tasaEA: Number(e.target.value)})} />
                <Input type="number" label="Dinero ya ahorrado ($)" value={s2.ahorrado} onChange={e=>setS2({...s2, ahorrado: Number(e.target.value)})} />
              </div>

              {resS2 && (
                <div className="bg-slate-950 p-4 md:p-6 rounded-xl border border-slate-800 space-y-6">
                  <div className="text-center pb-4 border-b border-slate-800">
                     <p className="text-sm text-slate-400 uppercase tracking-wider mb-2">Debes ahorrar mensualmente:</p>
                     <p className="text-4xl font-black text-emerald-400">{formatCOP(resS2.aporteMensual)}</p>
                  </div>
                  <div className="flex justify-between items-center text-sm">
                    <span className="text-slate-400">Dinero aportado por ti:</span>
                    <span className="font-bold text-white">{formatCOP(resS2.totalAportado)}</span>
                  </div>
                  <div className="flex justify-between items-center text-sm">
                    <span className="text-slate-400">Intereses ganados:</span>
                    <span className="font-bold text-emerald-400">+{formatCOP(resS2.rendimientos)}</span>
                  </div>
                  <button onClick={asumirAhorro} className="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-lg transition-colors flex justify-center items-center gap-2">
                    <CheckCircle2 size={18}/> Asumir Gasto Fijo: {formatCOP(resS2.aporteMensual)} / mes
                  </button>
                </div>
              )}
            </Card>
          )}

          {activeSim === 'inversion' && (
            <Card className="border-t-4 border-t-amber-500 animate-in slide-in-from-bottom-4">
              <h2 className="text-lg md:text-xl font-bold text-white mb-2 flex items-center gap-2"><PiggyBank size={20} className="text-amber-400"/> Proyección de Interés Compuesto</h2>
              <p className="text-sm text-slate-400 mb-6">Observa cómo crece el dinero de un bolsillo real o simula una inversión externa.</p>

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                <Select label="Seleccionar Inversión" className="sm:col-span-2" 
                  options={[{value: 'otra', label: 'Otra (Ingreso manual)'}, ...cuentas.filter(c=>c.type === 'pocket').map(c=>({value:c.id,label:`${c.name} (${formatCOP(c.currentBalance)})`}))]} 
                  value={s3.invId} onChange={handleInvChange} />
                <Input type="number" label="Capital Inicial ($)" value={s3.capital} onChange={e=>setS3({...s3, capital: Number(e.target.value)})} disabled={s3.invId !== 'otra'} />
                <Input type="number" label="Tasa E.A. (%)" value={s3.tasa} onChange={e=>setS3({...s3, tasa: Number(e.target.value)})} disabled={s3.invId !== 'otra'} />
                <Input type="number" label="Tiempo (Años)" value={s3.anos} onChange={e=>setS3({...s3, anos: Number(e.target.value)})} />
                <Input type="number" label="Aporte Adicional Mensual ($)" value={s3.aporte} onChange={e=>setS3({...s3, aporte: Number(e.target.value)})} className="bg-amber-950/20" />
              </div>

              <div className="bg-slate-950 p-4 md:p-6 rounded-xl border border-slate-800 space-y-6">
                <div className="flex justify-between items-end pb-4 border-b border-slate-800">
                  <div><p className="text-xs text-slate-500 uppercase tracking-wider mb-1">Capital aportado</p><p className="text-lg md:text-xl font-medium text-slate-300">{formatCOP(resS3.capitalInvertido)}</p></div>
                  <div className="text-right"><p className="text-xs text-slate-500 uppercase tracking-wider mb-1">Rendimientos</p><p className="text-lg md:text-xl font-bold text-amber-400">+{formatCOP(resS3.rendimientos)}</p></div>
                </div>
                <div className="text-center">
                  <p className="text-sm text-slate-400 uppercase tracking-wider mb-2">Valor Final Proyectado</p>
                  <p className="text-3xl md:text-4xl font-black text-white bg-clip-text text-transparent bg-gradient-to-r from-amber-400 to-emerald-400">{formatCOP(resS3.vf)}</p>
                </div>
                {s3.aporte > 0 && 
                  <button onClick={asumirInversion} className="w-full bg-amber-600 hover:bg-amber-500 text-white font-bold py-3 rounded-lg transition-colors flex justify-center items-center gap-2">
                    <CheckCircle2 size={18}/> Asumir Aporte: {formatCOP(s3.aporte)} / mes
                  </button>
                }
              </div>
            </Card>
          )}
        </div>
      );
    };

    // --- Ajustes: Export/Import Excel y JSON ---
    const SettingsTab = ({ stateData, setAllState, selectedMonth, showToast }) => {
      const fileInputRef = useRef(null);
      const fileExcelInputRef = useRef(null);

      const handleExportJSON = () => { const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(stateData)); const downloadAnchorNode = document.createElement('a'); downloadAnchorNode.setAttribute("href", dataStr); downloadAnchorNode.setAttribute("download", `respaldo_finanzas_${new Date().toISOString().split('T')[0]}.json`); document.body.appendChild(downloadAnchorNode); downloadAnchorNode.click(); downloadAnchorNode.remove(); };
      const handleImportJSON = (e) => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (event) => { try { const parsed = JSON.parse(event.target.result); setAllState(parsed); showToast("¡Respaldo JSON restaurado con éxito!"); } catch (err) { showToast("Error al leer JSON.", "error"); } }; reader.readAsText(file); e.target.value = ''; };

      const handleExportExcel = async (onlyCurrentMonth = false) => {
        try {
          const xlsx = await loadSheetJS();
          const wb = xlsx.utils.book_new();

          const isCurrentMonth = (fecha) => fecha && fecha.startsWith(selectedMonth);
          const filterData = (data) => onlyCurrentMonth ? data.filter(i => isCurrentMonth(i.fecha)) : data;

          const ingresosData = filterData(stateData.ingresos).map(i => ({ Fecha: i.fecha, Descripcion: i.descripcion, Persona: i.persona, Tipo: i.tipo, Cuenta: stateData.cuentas.find(c=>c.id===i.cuentaId)?.name, Monto: i.monto }));
          const egresosData = filterData(stateData.egresos).map(e => ({ Fecha: e.fecha, Descripcion: e.descripcion, Categoria: e.categoria, Tipo: e.tipo, Cuenta: stateData.cuentas.find(c=>c.id===e.cuentaId)?.name, Monto: e.monto }));
          const deudasData = stateData.cuentas.filter(c=>['credit','loan'].includes(c.type)).map(c => ({ Nombre: c.name, DeudaActual: c.currentDebt, TasaEA: c.tasaEA, CuotaMinima: c.cuotaMinima }));

          xlsx.utils.book_append_sheet(wb, xlsx.utils.json_to_sheet(ingresosData), "Ingresos");
          xlsx.utils.book_append_sheet(wb, xlsx.utils.json_to_sheet(egresosData), "Egresos");
          xlsx.utils.book_append_sheet(wb, xlsx.utils.json_to_sheet(deudasData), "Deudas");

          const fileName = onlyCurrentMonth ? `FinanzasFamilia_${selectedMonth}.xlsx` : `FinanzasFamilia_Total_${new Date().toISOString().split('T')[0]}.xlsx`;
          xlsx.writeFile(wb, fileName);
        } catch (e) { showToast("Hubo un error al generar Excel.", "error"); }
      };

      const handleImportExcel = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        try {
          const xlsx = await loadSheetJS();
          const reader = new FileReader();
          reader.onload = (evt) => {
            try {
              const wb = xlsx.read(evt.target.result, { type: 'binary' });
              let newIngresos = [...stateData.ingresos];
              let newEgresos = [...stateData.egresos];

              if (wb.Sheets["Ingresos"]) {
                const importIngresos = xlsx.utils.sheet_to_json(wb.Sheets["Ingresos"]);
                const mappedIng = importIngresos.filter(i=>i.Monto).map(i => ({
                  id: generateId(), fecha: i.Fecha || new Date().toISOString().split('T')[0], 
                  descripcion: i.Descripcion || 'Importado', persona: i.Persona || '', 
                  tipo: i.Tipo || 'Variable', monto: Number(i.Monto) || 0, cuentaId: stateData.cuentas[0]?.id
                }));
                newIngresos = [...newIngresos, ...mappedIng];
              }
              if (wb.Sheets["Egresos"]) {

                }));

            } catch(err) { showToast("Error procesando el archivo de Excel.", "error"); }
          };

        egresos.forEach(e => { if (e.categoria && e.categoria !== 'Otros') cats.add(String(e.categoria)); });
        return Array.from(cats).sort();
      }, [presupuestos, egresos]);

      const calculatedAccounts = useMemo(() => {
        const accMap = {};
        cuentas.forEach(c => { 
            accMap[c.id] = { 
                ...c, 
                currentBalance: Number(c.initialBalance) || 0, 
                currentDebt: Number(c.initialDebt) || 0,
                montoPrestado: Number(c.montoPrestado) || Number(c.initialDebt) || 0,
                totalPagado: Number(c.totalPagadoPrevio) || 0
            }; 
        });
        
        ingresos.forEach(i => { if(accMap[i.cuentaId]) accMap[i.cuentaId].currentBalance += Number(i.monto); });
        
        const sortedEgresos = [...egresos].sort((a,b) => new Date(a.fecha) - new Date(b.fecha));
        
        sortedEgresos.forEach(e => {
           if(accMap[e.cuentaId]) {
              if (['credit', 'loan'].includes(accMap[e.cuentaId].type)) accMap[e.cuentaId].currentDebt += Number(e.monto);
              else accMap[e.cuentaId].currentBalance -= Number(e.monto);
           }
           if (e.deudaId && accMap[e.deudaId]) {
               let account = accMap[e.deudaId];
               account.totalPagado += Number(e.monto);

               if (account.type === 'loan') {
                   // Solo aplicamos la resta a capital = pago - interes
                   let tasaMensual = getTasaMensual(account.tasaEA);
                   let interes = account.currentDebt * tasaMensual;
                   let capital = Number(e.monto) - interes;
                   account.currentDebt -= capital;
               } else {
                   account.currentDebt -= Number(e.monto);
               }
               
               if(account.currentDebt < 0) account.currentDebt = 0;
           }
        });
        
        transferencias.forEach(t => {
           if(accMap[t.fromId]) {

           }
           if(accMap[t.toId]) {

      }), [transferencias, cuentas, filtroPersona]);

      const isThisMonth = (fecha) => fecha && fecha.startsWith(selectedMonth);
