            setEgresos(prev => [...prev, nuevoEgreso]);

            if (isCreditCard) {
                const nuevaCuota = { 
                    id: generateId(), 
                    tarjetaId: gastoForm.cuentaId, 
                    descripcion: gastoForm.descripcion, 
                    montoTotal: Number(gastoForm.monto), 
                    cuotasTotales: Number(gastoForm.cuotas), 
                    valorMensual: Math.round(cuotaMensual), 
                    cuotasPagadas: 0 
                };
                setComprasCuotas(prev => [...prev, nuevaCuota]);
                showToast('Gasto y Compra a cuotas registrados.');
            } else {
                showToast("Gasto registrado exitosamente.");
            }
        }
        cancelarEdicion();
      };

      const cargarParaEditarVariable = (egreso) => {
        const cuenta = cuentas.find(c => c.id === egreso.cuentaId);
        const metodo = cuenta ? (cuenta.type === 'credit' ? 'credit' : cuenta.type === 'cash' ? 'cash' : 'bank') : '';
        setGastoForm({ 
            id: egreso.id, editSource: 'historial', fecha: egreso.fecha, descripcion: egreso.descripcion, 
            categoria: egreso.categoria, metodoPago: metodo, cuentaId: egreso.cuentaId, monto: egreso.monto.toString(), 
            cuotas: '', tasaEA: '', esPagoDeuda: !!egreso.deudaId, deudaDestinoId: egreso.deudaId || '' 
        });
        setErrorsVar({});
        varRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      const cargarParaEditarCuota = (c) => {
        const card = cuentas.find(acc => acc.id === c.tarjetaId);
        setGastoForm({ id: c.id, editSource: 'cuotas', fecha: todayStr, descripcion: c.descripcion, categoria: categoriasMaestras[0] || 'Otros', metodoPago: 'credit', cuentaId: c.tarjetaId, monto: c.montoTotal.toString(), cuotas: c.cuotasTotales.toString(), tasaEA: card ? card.tasaEA : 0, esPagoDeuda: false, deudaDestinoId: '' });
        setErrorsVar({});
        varRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      };

      const cancelarEdicion = () => {
        setGastoForm({ id: null, editSource: null, fecha: todayStr, descripcion: '', categoria: categoriasMaestras[0] || 'Otros', metodoPago: '', cuentaId: '', monto: '', cuotas: '', tasaEA: '', esPagoDeuda: false, deudaDestinoId: '' });
        setErrorsVar({});
      }

      const procesarPagoFijo = (pagoFijoId, cuentaId, montoFinal) => {
        if(!cuentaId) { showToast("Selecciona de dónde vas a pagar.", "error"); return; }
        const pf = pagosFijos.find(p => p.id === pagoFijoId);
        const fechaActual = new Date();
        const isCurrentMonth = selectedMonth === fechaActual.toISOString().slice(0, 7);
        const diaStr = isCurrentMonth ? fechaActual.getDate().toString().padStart(2, '0') : '01';
        const fechaPago = `${selectedMonth}-${diaStr}`; 
        
        let deudaIdDetectada = null;
        const posiblesDeudas = cuentas.filter(c => ['credit', 'loan'].includes(c.type));
        for (const pd of posiblesDeudas) {
            if (pf.descripcion.toLowerCase().includes(pd.name.toLowerCase()) || pf.categoria.toLowerCase().includes(pd.name.toLowerCase())) {
                deudaIdDetectada = pd.id; break;
            }
        }

        const nuevoEgreso = { 
          id: generateId(), fecha: fechaPago, descripcion: pf.descripcion, 
          categoria: pf.categoria, monto: Number(montoFinal) || pf.monto, 
          cuentaId: cuentaId, pagoFijoId: pf.id, tipo: 'Fijo',
          deudaId: deudaIdDetectada
        };
        setEgresos(prev => [...prev, nuevoEgreso]);
        showToast(`Pago de ${pf.descripcion} registrado.`);
      };

      const avanzarCuota = (c) => {
        setComprasCuotas(prev => prev.map(item => {
          if(item.id === c.id && item.cuotasPagadas < item.cuotasTotales) return {...item, cuotasPagadas: item.cuotasPagadas + 1};
          return item;
        }));
        setEgresos(prev => [...prev, {
            id: generateId(),
            fecha: getLocalToday(),
            descripcion: `Cuota ${c.cuotasPagadas + 1}/${c.cuotasTotales}: ${c.descripcion}`,
            categoria: 'Tarjeta de crédito',
            monto: c.valorMensual,
            cuentaId: c.tarjetaId,
            tipo: 'Variable',
            deudaId: c.tarjetaId
        }]);
        showToast("Cuota sumada y gasto registrado en el historial.");
      };

      const egresosMes = egresos.filter(d => d.fecha.startsWith(selectedMonth));
      
      const pagosPendientes = pagosFijos.map(pf => {
        const egresoEsteMes = egresosMes.find(e => e.pagoFijoId === pf.id);
        return { ...pf, pagado: !!egresoEsteMes, egresoInfo: egresoEsteMes };
      }).sort((a, b) => a.pagado - b.pagado);

      const totalCompromisoCuotas = comprasCuotas.filter(c => c.cuotasPagadas < c.cuotasTotales).reduce((s, c) => s + c.valorMensual, 0);
      const cuentasPermitidasPago = cuentas.filter(c => ['bank', 'cash', 'credit'].includes(c.type)).map(c => ({value: c.id, label: c.name}));

      const cuentasFiltradas = useMemo(() => {
        if(gastoForm.metodoPago === 'cash') return cuentas.filter(c => c.type === 'cash');
        if(gastoForm.metodoPago === 'bank') return cuentas.filter(c => c.type === 'bank');
        if(gastoForm.metodoPago === 'credit') return cuentas.filter(c => c.type === 'credit');
        return [];
      }, [cuentas, gastoForm.metodoPago]);

      // --- IMPORTAR / EXPORTAR INDIVIDUAL DE EGRESOS ---
      const handleExport = async () => {
        try {
          const xlsx = await loadSheetJS();
          const wb = xlsx.utils.book_new();
          const headers = ["ID", "Fecha", "Descripcion", "Categoria", "Tipo", "Cuenta", "Monto", "DeudaPagada"];
          const data = egresos.map(e => ({ ID: e.id, Fecha: e.fecha, Descripcion: e.descripcion, Categoria: e.categoria, Tipo: e.tipo, Cuenta: cuentas.find(c=>c.id===e.cuentaId)?.name || e.cuentaId, Monto: e.monto, DeudaPagada: e.deudaId ? cuentas.find(c=>c.id===e.deudaId)?.name : '' }));
          
          const ws = xlsx.utils.json_to_sheet(data.length > 0 ? data : [{}], { header: headers });
          xlsx.utils.book_append_sheet(wb, ws, "Egresos");
          xlsx.writeFile(wb, `Egresos_Historial_${new Date().toISOString().split('T')[0]}.xlsx`);
          showToast("Historial de Egresos exportado con éxito.");
        } catch(e) { showToast("Error al exportar a Excel.", "error"); }
      };

      const handleImport = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        try {
          const xlsx = await loadSheetJS();
          const reader = new FileReader();
          reader.onload = (evt) => {
            try {
              const wb = xlsx.read(evt.target.result, { type: 'binary' });
              const sheetName = wb.Sheets["Egresos"] ? "Egresos" : wb.SheetNames[0];
              const importedData = xlsx.utils.sheet_to_json(wb.Sheets[sheetName]);
              let importados = 0;

              setEgresos(prev => {
                  let nuevos = [...prev];
                  importedData.filter(i=>i.Monto).forEach(i => {
                      const fecha = i.Fecha || new Date().toISOString().split('T')[0];
                      const desc = i.Descripcion || 'Egreso Importado';
                      const monto = Number(i.Monto) || 0;
                      const exists = nuevos.some(existing => existing.fecha === fecha && existing.descripcion === desc && existing.monto === monto);
                      
                      if(!exists) {
                          const cuentaEncontrada = cuentas.find(c => c.name === i.Cuenta)?.id || cuentas[0]?.id;
                          const deudaEncontrada = cuentas.find(c => c.name === i.DeudaPagada)?.id || null;
                          nuevos.push({
                              id: i.ID || generateId(), fecha, descripcion: desc, categoria: i.Categoria || 'Otros',
                              tipo: i.Tipo || 'Variable', monto, cuentaId: cuentaEncontrada, deudaId: deudaEncontrada
                          });
                          importados++;
                      }
                  });
                  return nuevos;
              });
              showToast(importados > 0 ? `Se importaron ${importados} egresos nuevos.` : "No hay egresos nuevos.");
            } catch(err) { showToast("Error procesando los datos del archivo.", "error"); }
          };
          reader.readAsBinaryString(file);
        } catch(err) { showToast("Error al abrir herramienta de Excel.", "error"); }
        e.target.value = '';
      };

      return (
        <div className="space-y-6 animate-in fade-in duration-500 pb-20 md:pb-0">
          <header className="flex flex-col md:flex-row md:justify-between md:items-end gap-4">
            <div>
              <h1 className="text-2xl md:text-3xl font-bold text-white tracking-tight flex items-center gap-2 md:gap-3"><Receipt className="text-rose-500 w-6 h-6 md:w-8 md:h-8" /> Egresos</h1>
              <p className="text-sm md:text-base text-slate-400 mt-1">Tus gastos fijos y variables unificados.</p>
            </div>
            <div className="flex flex-wrap gap-2">
              <input type="file" accept=".xlsx, .xls" ref={fileInputRef} onChange={handleImport} className="hidden" />
              <button onClick={() => fileInputRef.current.click()} className="bg-slate-800 hover:bg-slate-700 text-rose-400 px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-colors border border-rose-500/30"><Upload size={14}/> Importar Egresos</button>
              <button onClick={handleExport} className="bg-rose-600/20 hover:bg-rose-600/30 text-rose-400 px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-colors border border-rose-500/30"><Download size={14}/> Exportar Egresos</button>
            </div>
          </header>

          <Card className={`border-t-4 ${gastoForm.id ? 'border-t-amber-500 bg-amber-950/10' : 'border-t-rose-500 bg-slate-900/80'}`}>
            <div className="flex justify-between items-center mb-4" ref={varRef}>
              <h2 className="text-lg font-semibold text-white">
                {gastoForm.id 
                  ? (gastoForm.editSource === 'cuotas' ? '✏️ Editar Compra a Cuotas' : '✏️ Editar Gasto Variable') 
                  : '1. Registrar Gasto o Compra a Cuotas'}
              </h2>
              {gastoForm.id && <button onClick={cancelarEdicion} className="text-xs text-amber-400 hover:underline">Cancelar Edición</button>}
            </div>
            <form onSubmit={guardarGasto} className="grid grid-cols-2 md:grid-cols-12 gap-3 items-end">
              
              {gastoForm.editSource !== 'cuotas' && (
                <React.Fragment>
                  <Input type="date" label="Fecha" value={gastoForm.fecha} onChange={e=>setGastoForm({...gastoForm, fecha: e.target.value})} error={errorsVar.fecha} className="col-span-1 md:col-span-2"/>
                  <Select label="Categoría" options={categoriasMaestras.map(c=>({value:c, label:c}))} value={gastoForm.categoria} onChange={e=>setGastoForm({...gastoForm, categoria: e.target.value})} required className="col-span-1 md:col-span-2" />
                </React.Fragment>
              )}
              
              <Input label="Descripción del Gasto / Compra" placeholder="Ej: Supermercado o Televisor" value={gastoForm.descripcion} onChange={e=>setGastoForm({...gastoForm, descripcion: e.target.value})} error={errorsVar.descripcion} className={`col-span-2 ${gastoForm.editSource === 'cuotas' ? 'md:col-span-4' : 'md:col-span-3'}`} />
              
              <Select label="Método de pago" options={[{value: 'cash', label: 'Efectivo'}, {value: 'bank', label: 'Débito'}, {value: 'credit', label: 'Crédito'}]} value={gastoForm.metodoPago} onChange={handleMetodoChange} error={errorsVar.metodoPago} required className={`col-span-1 ${gastoForm.editSource === 'cuotas' ? 'md:col-span-3' : 'md:col-span-2'}`} />
              
              <Select label={gastoForm.metodoPago === 'credit' ? 'Tarjeta' : 'Cuenta / Bolsillo'} options={cuentasFiltradas.map(c=>({value:c.id, label:c.name}))} value={gastoForm.cuentaId} onChange={handleCuentaChange} error={errorsVar.cuentaId} disabled={!gastoForm.metodoPago} className={`col-span-1 ${gastoForm.editSource === 'cuotas' ? 'md:col-span-3' : 'md:col-span-2'}`} />
              
              <Input type="number" label="Monto ($)" value={gastoForm.monto} onChange={e=>setGastoForm({...gastoForm, monto: e.target.value})} error={errorsVar.monto} className={`col-span-2 ${gastoForm.editSource === 'cuotas' ? 'md:col-span-2' : 'md:col-span-1'}`} />

              {!isCreditCard && gastoForm.editSource !== 'cuotas' && (
                 <div className="col-span-2 md:col-span-12 flex items-center gap-4 bg-slate-950 p-3 rounded-lg border border-slate-800">
                    <label className="flex items-center gap-2 cursor-pointer text-sm font-medium text-slate-300">
                      <input type="checkbox" checked={gastoForm.esPagoDeuda} onChange={(e) => setGastoForm({...gastoForm, esPagoDeuda: e.target.checked})} className="form-checkbox text-indigo-500 rounded border-slate-700 bg-slate-900" />
                      ¿Este gasto es el pago de un préstamo/tarjeta?
                    </label>
                    {gastoForm.esPagoDeuda && (
                        <Select label="¿Qué deuda estás pagando?" options={cuentas.filter(c=>['credit','loan'].includes(c.type)).map(c=>({value:c.id, label:c.name}))} value={gastoForm.deudaDestinoId} onChange={e=>setGastoForm({...gastoForm, deudaDestinoId: e.target.value})} error={errorsVar.deudaDestinoId} className="flex-1" />
                    )}
                 </div>
              )}

              {isCreditCard && (
                <div className="col-span-2 md:col-span-12 grid grid-cols-2 md:grid-cols-4 gap-3 mt-2 p-3 bg-indigo-950/20 border border-indigo-500/20 rounded-lg">
                  <Input type="number" label="Nº Cuotas" value={gastoForm.cuotas} onChange={e=>setGastoForm({...gastoForm, cuotas: e.target.value})} error={errorsVar.cuotas} className="col-span-1" />
                  <Input type="number" label="Tasa E.A. (%)" value={gastoForm.tasaEA} onChange={e=>setGastoForm({...gastoForm, tasaEA: e.target.value})} step="0.01" className="col-span-1 bg-slate-900" />
                  <div className="flex flex-col gap-1.5 col-span-2 md:col-span-2">
                    <label className="text-xs font-medium text-slate-400">Valor Mensual</label>
                    <div className="bg-slate-950 border border-indigo-500 rounded-lg px-3 py-2.5 md:py-2 text-sm text-indigo-400 font-bold h-full flex items-center">
                      {formatCOP(Math.round(cuotaMensual))}
                    </div>
                  </div>
                </div>
              )}

              <div className="col-span-2 md:col-span-12 mt-2 flex gap-2">
                <button type="submit" className={`flex-1 ${gastoForm.id ? 'bg-amber-600 hover:bg-amber-700' : (isCreditCard ? 'bg-indigo-600 hover:bg-indigo-700' : 'bg-rose-600 hover:bg-rose-700')} text-white font-bold py-3 rounded-lg flex items-center justify-center gap-2 transition-colors`}>
                  {gastoForm.id ? 'Actualizar Registro' : <><Plus size={18} /> Registrar {isCreditCard ? 'Compra a Cuotas' : 'Gasto'}</>}
                </button>
                {gastoForm.id && <button type="button" onClick={cancelarEdicion} className="bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-6 rounded-lg transition-colors">Cancelar</button>}
              </div>
            </form>
          </Card>

          {/* SECCIÓN 2: LISTA DE COMPRAS A CUOTAS */}
          <Card className="border-t-4 border-t-indigo-500 bg-slate-900/80">
            <div className="flex justify-between items-center mb-4">
              <h2 className="text-base md:text-lg font-bold text-white flex items-center gap-2">
                <ShoppingCart size={20} className="text-indigo-400"/> 
                2. Compras a Cuotas Activas
              </h2>
              <div className="flex gap-2 items-center">
                <p className="hidden md:block text-xs font-bold text-indigo-400 bg-indigo-900/30 px-3 py-1 rounded-full border border-indigo-500/20">Compromiso Mensual Cuotas: {formatCOP(totalCompromisoCuotas)}</p>
              </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              {comprasCuotas.filter(c => c.cuotasPagadas < c.cuotasTotales).map(c => {
                const progreso = (c.cuotasPagadas / c.cuotasTotales) * 100;
                return (
                  <div key={c.id} className={`bg-slate-950 border rounded-lg p-4 relative group transition-colors ${gastoForm.id === c.id && gastoForm.editSource === 'cuotas' ? 'border-amber-500/50 bg-amber-950/20' : 'border-slate-800'}`}>
                    <div className="absolute top-2 right-2 flex gap-1 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity">
                      <button onClick={() => cargarParaEditarCuota(c)} className="text-slate-600 hover:text-indigo-400 p-1"><Edit3 size={14}/></button>
                      <button onClick={() => {deleteItem(setComprasCuotas, c.id); showToast("Compra a cuotas eliminada");}} className="text-slate-600 hover:text-rose-400 p-1"><Trash2 size={14}/></button>
                    </div>
                    <p className="font-bold text-slate-200">{c.descripcion}</p>
                    <p className="text-[10px] text-indigo-400 mb-2">{cuentas.find(acc=>acc.id===c.tarjetaId)?.name}</p>
                    
                    <div className="flex justify-between text-xs text-slate-400 mb-1">
                      <span>Pagadas: {c.cuotasPagadas}</span>
                      <span>Faltan: {c.cuotasTotales - c.cuotasPagadas}</span>
                    </div>
                    <div className="w-full bg-slate-800 rounded-full h-1.5 mb-3">
                      <div className="bg-indigo-500 h-1.5 rounded-full transition-all" style={{width: `${progreso}%`}}></div>
                    </div>
                    <div className="flex justify-between items-center">
                      <span className="text-sm font-bold text-slate-300">{formatCOP(c.valorMensual)}/mes</span>
                      <button onClick={() => avanzarCuota(c)} className="text-[10px] bg-emerald-600/20 text-emerald-400 hover:bg-emerald-600/30 px-2 py-1 rounded font-bold">+1 Pagada</button>
                    </div>
                  </div>
                )
              })}
              {comprasCuotas.filter(c => c.cuotasPagadas < c.cuotasTotales).length === 0 && <p className="text-slate-500 text-sm">No hay compras a cuotas activas.</p>}
            </div>
          </Card>

          {/* SECCIÓN 3: PAGOS FIJOS */}
          <div className="flex justify-between items-end mt-8">
            <h2 className="text-lg md:text-xl font-bold text-white flex items-center gap-2"><CheckSquare size={20} className="text-amber-400"/> 3. Pagos Fijos (Checklist de {selectedMonth})</h2>
          </div>

          {pagosFijos.length > 0 ? (
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              {pagosPendientes.map(pf => {
                if (pf.pagado) {
                  return (
                    <div key={pf.id} className="bg-emerald-900/10 border border-emerald-500/20 rounded-lg p-3 flex justify-between items-center opacity-70">
                      <div><p className="font-bold text-emerald-400 line-through">{pf.descripcion}</p><p className="text-[10px] text-emerald-500/70">Pagado con {cuentas.find(c=>c.id===pf.egresoInfo.cuentaId)?.name}</p></div>
                      <CheckCircle2 size={24} className="text-emerald-500" />
                    </div>
                  );
                }
                return <PagoFijoCard key={pf.id} pf={pf} cuentasPermitidas={cuentasPermitidasPago} onPay={(cuentaId, monto) => procesarPagoFijo(pf.id, cuentaId, monto)} />;
              })}
            </div>
          ) : (
            <p className="text-sm text-slate-500 py-4">No has configurado pagos fijos. Abre "Editar Plantillas Fijas" en la pestaña Presupuestos.</p>
          )}

          {/* SECCIÓN 4: TABLA DE HISTORIAL */}
          <div className="mt-8 pt-8 border-t border-slate-800">
            <div className="flex justify-between items-end mb-4">
              <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider">Historial Completo de Egresos (Fijos y Variables)</h3>
            </div>
            <div className="overflow-x-auto bg-slate-900 rounded-xl border border-slate-800">
              <table className="w-full text-sm text-left min-w-[600px]">
                <thead className="text-xs text-slate-400 uppercase bg-slate-950">
                  <tr><th className="px-4 py-4 rounded-tl-lg">Fecha</th><th className="px-4 py-4">Descripción</th><th className="px-4 py-4">Categoría/Cuenta</th><th className="px-4 py-4 text-right">Monto</th><th className="px-4 py-4 rounded-tr-lg"></th></tr>
                </thead>
                <tbody className="divide-y divide-slate-800/50">
                  {egresosMes.map(g => (
                    <tr key={g.id} className={`transition-colors ${gastoForm.id === g.id && gastoForm.editSource === 'historial' ? 'bg-amber-900/20' : 'hover:bg-slate-800/20'}`}>
                      <td className="px-4 py-3 text-slate-300 whitespace-nowrap">{g.fecha}</td>
                      <td className="px-4 py-3 text-slate-300 font-medium">
                        {g.descripcion}
                        {g.tipo === 'Fijo' && <span className="ml-2 text-[9px] bg-amber-500/20 text-amber-400 px-1.5 py-0.5 rounded uppercase tracking-wider">Fijo</span>}
                      </td>
                      <td className="px-4 py-3 text-slate-400">
                        <span className="bg-slate-800 px-2 py-1 rounded-md text-xs block w-max mb-1">{g.categoria}</span>
                        <span className="text-[10px] text-indigo-400/80">Pagado con: {cuentas.find(c => c.id === g.cuentaId)?.name || '?'}</span>
                      </td>
                      <td className="px-4 py-3 text-right font-bold text-rose-400">{formatCOP(g.monto)}</td>
                      <td className="px-4 py-3 text-right flex items-center justify-end gap-2">
                        <button onClick={() => cargarParaEditarVariable(g)} className="text-slate-500 hover:text-indigo-400 p-1.5" title="Editar Gasto"><Edit3 size={16} /></button>
                        <button onClick={() => {deleteItem(setEgresos, g.id); showToast("Gasto eliminado");}} className="text-slate-500 hover:text-rose-400 p-1.5" title="Eliminar"><Trash2 size={16} /></button>
                      </td>
                    </tr>
                  ))}
                  {egresosMes.length === 0 && <tr><td colSpan="5" className="text-center py-8 text-slate-500">No hay egresos registrados este mes.</td></tr>}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    };

    const InversionesTab = ({ cuentas, setCuentas, ingresos, setIngresos, egresos, transferencias, selectedMonth, showToast, getOwner }) => {
      const [showForm, setShowForm] = useState(false);
      const [editId, setEditId] = useState(null);
      const [editData, setEditData] = useState({});
      const [gananciaId, setGananciaId] = useState(null);
      const [gananciaMonto, setGananciaMonto] = useState('');
      const fileInputRef = useRef(null);
      
      const [nuevo, setNuevo] = useState({ name: '', initialBalance: '', tasaEA: '' });

      const handleAdd = (e) => {
        e.preventDefault();
        if(!nuevo.name) return showToast("El nombre es obligatorio", "error");
        setCuentas(prev => [...prev, {
          id: generateId(), name: nuevo.name, type: 'pocket',
          initialBalance: Number(nuevo.initialBalance) || 0,
          currentDebt: 0, limit: 0, tasaEA: Number(nuevo.tasaEA) || 0, cuotaMinima: 0
        }]);
        showToast("Cuenta de Inversión/Ahorro creada.");
        setShowForm(false);
        setNuevo({ name: '', initialBalance: '', tasaEA: '' });
      };

      const startEdit = (c) => {
        setEditId(c.id);
        setEditData({ name: c.name, initialBalance: c.initialBalance, tasaEA: c.tasaEA });
        setGananciaId(null);
      };

      const saveEdit = () => {
        if (!editData.name) return showToast("El nombre es obligatorio", "error");
        setCuentas(prev => prev.map(c => c.id === editId ? {
          ...c, name: editData.name,
          initialBalance: Number(editData.initialBalance) || 0,
          tasaEA: Number(editData.tasaEA) || 0
        } : c));
        setEditId(null);
        showToast("Cuenta actualizada.");
      };

      const guardarGanancia = (c) => {
        if (!gananciaMonto || Number(gananciaMonto) <= 0) return;
        const fechaActual = new Date();
        const isCurrentMonth = selectedMonth === fechaActual.toISOString().slice(0, 7);
        const diaStr = isCurrentMonth ? fechaActual.getDate().toString().padStart(2, '0') : '28';
        const fechaIngreso = `${selectedMonth}-${diaStr}`; 

        setIngresos(prev => [...prev, {
          id: generateId(),
          fecha: fechaIngreso,
          descripcion: `Rendimientos ${c.name}`,
          persona: getOwner(c.name) === 'Shared' ? '' : (getOwner(c.name) === 'Leo' ? 'L' : 'A'),
          tipo: 'Rendimiento',
          monto: Number(gananciaMonto),
          cuentaId: c.id
        }]);
        showToast(`Ganancia registrada en ${c.name}.`);
        setGananciaId(null);
        setGananciaMonto('');
      };

      // --- IMPORTAR / EXPORTAR INDIVIDUAL DE INVERSIONES ---
      const handleExport = async () => {
        try {
          const xlsx = await loadSheetJS();
          const wb = xlsx.utils.book_new();
          const headers = ["ID", "Nombre", "SaldoBase", "TasaEA"];
          const invCts = cuentas.filter(c => c.type === 'pocket' || (!['credit', 'loan'].includes(c.type) && c.tasaEA > 0));
          const data = invCts.map(c => ({ ID: c.id, Nombre: c.name, SaldoBase: c.initialBalance, TasaEA: c.tasaEA }));
          
          const ws = xlsx.utils.json_to_sheet(data.length > 0 ? data : [{}], { header: headers });
          xlsx.utils.book_append_sheet(wb, ws, "Inversiones");
          xlsx.writeFile(wb, `Inversiones_${new Date().toISOString().split('T')[0]}.xlsx`);
          showToast("Inversiones exportadas con éxito.");
        } catch(e) { showToast("Error al exportar a Excel.", "error"); }
      };

      const handleImport = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        try {
          const xlsx = await loadSheetJS();
          const reader = new FileReader();
          reader.onload = (evt) => {
            try {
              const wb = xlsx.read(evt.target.result, { type: 'binary' });
              const sheetName = wb.Sheets["Inversiones"] ? "Inversiones" : wb.SheetNames[0];
              const importedData = xlsx.utils.sheet_to_json(wb.Sheets[sheetName]);
              let importados = 0;

              setCuentas(prev => {
                  let nuevos = [...prev];
                  importedData.forEach(i => {
                      if(i.Nombre) {
                          const exists = nuevos.some(c => c.name === i.Nombre && c.type === 'pocket');
                          if(!exists) {
                              nuevos.push({
                                  id: i.ID || generateId(), name: i.Nombre, type: 'pocket',
                                  initialBalance: Number(i.SaldoBase) || 0, currentDebt: 0, limit: 0,
                                  tasaEA: Number(i.TasaEA) || 0, cuotaMinima: 0
                              });
                              importados++;
                          }
                      }
                  });
                  return nuevos;
              });
              showToast(importados > 0 ? `Se importaron ${importados} inversiones.` : "No hay inversiones nuevas.");
            } catch(err) { showToast("Error procesando los datos del archivo.", "error"); }
          };
          reader.readAsBinaryString(file);
        } catch(err) { showToast("Error al abrir herramienta de Excel.", "error"); }
        e.target.value = '';
      };

      const invCuentas = cuentas.filter(c => !['credit', 'loan'].includes(c.type) && (c.type === 'pocket' || c.tasaEA > 0));

      const tablaData = invCuentas.map(c => {
         let sInicial = Number(c.initialBalance) || 0;
         ingresos.filter(i => i.cuentaId === c.id && i.fecha < `${selectedMonth}-01`).forEach(i => sInicial += i.monto);
         egresos.filter(e => e.cuentaId === c.id && e.fecha < `${selectedMonth}-01`).forEach(e => sInicial -= e.monto);
         transferencias.filter(t => t.fecha < `${selectedMonth}-01`).forEach(t => {
            if (t.toId === c.id) sInicial += t.monto;
            if (t.fromId === c.id) sInicial -= t.monto;
         });

         const ganancia = ingresos.filter(i => i.cuentaId === c.id && i.tipo === 'Rendimiento' && i.fecha.startsWith(selectedMonth)).reduce((sum, i) => sum + i.monto, 0);

         let variacionMes = 0;
         ingresos.filter(i => i.cuentaId === c.id && i.fecha.startsWith(selectedMonth)).forEach(i => variacionMes += i.monto);
         egresos.filter(e => e.cuentaId === c.id && e.fecha.startsWith(selectedMonth)).forEach(e => variacionMes -= e.monto);
         transferencias.filter(t => t.fecha.startsWith(selectedMonth)).forEach(t => {
            if (t.toId === c.id) variacionMes += t.monto;
            if (t.fromId === c.id) variacionMes -= t.monto;
         });

         const saldoTotal = sInicial + variacionMes;

         return { ...c, sInicial, ganancia, saldoTotal };
      });

      const totalSInicial = tablaData.reduce((s, c) => s + c.sInicial, 0);
      const totalGanancia = tablaData.reduce((s, c) => s + c.ganancia, 0);
      const totalSaldoTotal = tablaData.reduce((s, c) => s + c.saldoTotal, 0);

      return (
        <div className="space-y-6 animate-in fade-in duration-500 pb-20 md:pb-0">
          <header className="flex flex-col md:flex-row md:justify-between md:items-end gap-4">
            <div>
              <h1 className="text-2xl md:text-3xl font-bold text-white tracking-tight flex items-center gap-2 md:gap-3"><PiggyBank className="text-emerald-400 w-6 h-6 md:w-8 md:h-8"/> Inversión y ahorro</h1>
              <p className="text-sm md:text-base text-slate-400 mt-1">Sigue el crecimiento de tus cuentas de ahorro e inversiones.</p>
            </div>
            <div className="flex flex-wrap gap-2">
              <button onClick={() => { setShowForm(!showForm); setEditId(null); setGananciaId(null); }} className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-colors">
                <Plus size={16}/> {showForm ? 'Ocultar' : 'Agregar'}
              </button>
              <input type="file" accept=".xlsx, .xls" ref={fileInputRef} onChange={handleImport} className="hidden" />
              <button onClick={() => fileInputRef.current.click()} className="bg-slate-800 hover:bg-slate-700 text-emerald-400 px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-colors border border-emerald-500/30"><Upload size={14}/> Importar</button>
              <button onClick={handleExport} className="bg-emerald-600/20 hover:bg-emerald-600/30 text-emerald-400 px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-colors border border-emerald-500/30"><Download size={14}/> Exportar</button>
            </div>
          </header>

          {showForm && (
            <Card className="border-t-4 border-t-emerald-500 bg-emerald-950/10">
              <div className="flex justify-between items-center mb-4">
                <h2 className="text-base font-semibold text-white">✨ Nueva Inversión o Ahorro</h2>
                <button onClick={() => setShowForm(false)} className="text-xs text-emerald-400 hover:underline">Cancelar</button>
              </div>
              <form onSubmit={handleAdd} className="grid grid-cols-2 md:grid-cols-4 gap-3 items-end">
                <Input label="Nombre de la Cuenta" value={nuevo.name} onChange={e=>setNuevo({...nuevo, name: e.target.value})} className="col-span-2 md:col-span-2" />
                <Input type="number" label="Saldo Base/Inicial ($)" value={nuevo.initialBalance} onChange={e=>setNuevo({...nuevo, initialBalance: e.target.value})} className="col-span-1 md:col-span-1" />
                <Input type="number" step="0.01" label="Tasa E.A. (%)" value={nuevo.tasaEA} onChange={e=>setNuevo({...nuevo, tasaEA: e.target.value})} className="col-span-1 md:col-span-1" />
                <button type="submit" className="col-span-2 md:col-span-4 w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 rounded-lg text-sm transition-colors mt-2">Guardar Nueva Cuenta</button>
              </form>
            </Card>
          )}

          <Card className="border-t-4 border-t-emerald-500">
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left min-w-[800px]">
                <thead className="text-[10px] text-slate-400 uppercase bg-slate-900/50">
                  <tr>
                    <th className="px-3 py-3 rounded-tl-lg">CUENTA</th>
                    <th className="px-3 py-3 text-right">Saldo inicial mes</th>
                    <th className="px-3 py-3 text-right">Ganancia mes</th>
                    <th className="px-3 py-3 text-right">Saldo Total mes</th>
                    <th className="px-3 py-3 text-center">% E.A</th>
                    <th className="px-3 py-3 text-center rounded-tr-lg">Acciones</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-800/50">
                  {tablaData.map(c => {
                    const isEditing = editId === c.id;
                    const isAddingGanancia = gananciaId === c.id;
                    const owner = getOwner(c.name);

                    if (isEditing) {
                       return (
                         <tr key={c.id} className="bg-emerald-950/40">
                           <td className="px-2 py-2"><input type="text" value={editData.name} onChange={e=>setEditData({...editData, name: e.target.value})} className="w-full bg-slate-900 border border-emerald-500 rounded px-2 py-1 text-xs text-white outline-none" placeholder="Nombre" /></td>
                           <td className="px-2 py-2"><input type="number" value={editData.initialBalance} onChange={e=>setEditData({...editData, initialBalance: e.target.value})} className="w-full bg-slate-900 border border-emerald-500 rounded px-2 py-1 text-xs text-white outline-none text-right" placeholder="Saldo Inicial Fijo" title="Ajusta el saldo base original" /></td>
                           <td className="px-2 py-2 text-right text-slate-500">-</td>
                           <td className="px-2 py-2 text-right text-slate-500">-</td>
                           <td className="px-2 py-2">
                              <input type="number" value={editData.tasaEA} onChange={e=>setEditData({...editData, tasaEA: e.target.value})} step="0.01" className="w-16 bg-slate-900 border border-emerald-500 rounded px-2 py-1 text-xs text-white outline-none text-center mx-auto block" title="Tasa E.A." />
                           </td>
                           <td className="px-2 py-2 text-center flex justify-center gap-1">
                             <button onClick={saveEdit} className="text-emerald-400 p-1.5 bg-slate-900 rounded border border-slate-700 hover:border-emerald-500/50" title="Guardar Cambios"><Check size={14}/></button>
                             <button onClick={() => setEditId(null)} className="text-rose-400 p-1.5 bg-slate-900 rounded border border-slate-700 hover:border-rose-500/50" title="Cancelar"><Minus size={14}/></button>
                           </td>
                         </tr>
                       )
                    }

                    return (
                      <tr key={c.id} className="hover:bg-slate-800/20 transition-colors">
                        <td className="px-3 py-3 font-medium text-slate-200">
                           {c.name}
                           {owner !== 'Shared' && <span className="ml-2 text-[9px] bg-slate-800 text-slate-400 px-1.5 py-0.5 rounded">{owner}</span>}
                        </td>
                        <td className="px-3 py-3 text-right text-slate-300">{formatCOP(c.sInicial)}</td>
                        <td className="px-3 py-3 text-right font-bold text-emerald-400">
                           {isAddingGanancia ? (
                             <div className="flex justify-end gap-1 items-center">
                               <input type="number" value={gananciaMonto} onChange={e=>setGananciaMonto(e.target.value)} className="w-20 bg-slate-900 border border-emerald-500 rounded px-1 py-0.5 text-xs text-white outline-none text-right" autoFocus placeholder="Monto"/>
                               <button onClick={() => guardarGanancia(c)} className="text-emerald-400 hover:text-emerald-300 p-0.5 bg-slate-800 rounded"><Check size={14}/></button>
                               <button onClick={() => setGananciaId(null)} className="text-rose-400 hover:text-rose-300 p-0.5 bg-slate-800 rounded"><Minus size={14}/></button>
                             </div>
                           ) : (
                             <span className="cursor-pointer hover:underline flex items-center justify-end gap-1" onClick={()=>{setGananciaId(c.id); setEditId(null);}} title="Registrar Ganancia">
                               {c.ganancia > 0 ? `+ ${formatCOP(c.ganancia)}` : '$ -'}
                             </span>
                           )}
                        </td>
                        <td className="px-3 py-3 text-right font-bold text-slate-200">{formatCOP(c.saldoTotal)}</td>
                        <td className="px-3 py-3 text-center text-indigo-400 font-bold">{c.tasaEA}%</td>
                        <td className="px-3 py-3 text-center flex justify-center gap-2">
                          <button onClick={() => startEdit(c)} className="text-slate-400 hover:text-indigo-400 p-1 bg-slate-900 rounded transition-colors" title="Editar"><Edit3 size={14}/></button>
                          <button onClick={() => {deleteItem(setCuentas, c.id); showToast("Cuenta eliminada");}} className="text-slate-400 hover:text-rose-400 p-1 bg-slate-900 rounded transition-colors" title="Eliminar"><Trash2 size={14}/></button>
                        </td>
                      </tr>
                    );
                  })}
                  <tr className="bg-slate-950 font-bold text-white border-t-2 border-slate-800">
                    <td className="px-3 py-4">TOTAL</td>
                    <td className="px-3 py-4 text-right">{formatCOP(totalSInicial)}</td>
                    <td className="px-3 py-4 text-right text-emerald-400">+ {formatCOP(totalGanancia)}</td>
                    <td className="px-3 py-4 text-right">{formatCOP(totalSaldoTotal)}</td>
                    <td className="px-3 py-4 text-center">-</td>
                    <td className="px-3 py-4 text-center"></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      );
    };

    const PresupuestosTab = ({ presupuestos, setPresupuestos, pagosFijos, setPagosFijos, egresos, selectedMonth, showToast, categoriasMaestras }) => {
      const [tipoForm, setTipoForm] = useState('variable'); 
      const [nuevoVar, setNuevoVar] = useState({ categoria: '', limite: '' });
      const [nuevoFijo, setNuevoFijo] = useState({ descripcion: '', monto: '', categoria: categoriasMaestras[0] || 'Otros', diaPago: '' });
      const [editId, setEditId] = useState(null);
      const [errors, setErrors] = useState({});
      const [filtroLista, setFiltroLista] = useState('Todos'); 
      const [showForm, setShowForm] = useState(false);
      const formRef = useRef(null);
      const fileInputRef = useRef(null);

      // --- IMPORTAR / EXPORTAR INDIVIDUAL DE PRESUPUESTOS ---
      const handleExport = async () => {
        try {
          const xlsx = await loadSheetJS();
          const wb = xlsx.utils.book_new();
          
          const headersFijos = ["ID", "Descripcion", "Categoria", "Monto", "DiaPago"];
          const dataFijos = pagosFijos.map(f => ({ ID: f.id, Descripcion: f.descripcion, Categoria: f.categoria, Monto: f.monto, DiaPago: f.diaPago }));
          const wsFijos = xlsx.utils.json_to_sheet(dataFijos.length > 0 ? dataFijos : [{}], { header: headersFijos });
          xlsx.utils.book_append_sheet(wb, wsFijos, "Pagos_Fijos");
          
          const headersVar = ["ID", "Categoria", "Limite"];
          const dataVar = presupuestos.map(p => ({ ID: p.id, Categoria: p.categoria, Limite: p.limite }));
          const wsVar = xlsx.utils.json_to_sheet(dataVar.length > 0 ? dataVar : [{}], { header: headersVar });
          xlsx.utils.book_append_sheet(wb, wsVar, "Presupuestos_Variables");
          
          xlsx.writeFile(wb, `Presupuestos_y_Fijos_${new Date().toISOString().split('T')[0]}.xlsx`);
          showToast("Presupuestos exportados con éxito.");
        } catch(e) { showToast("Error al exportar a Excel.", "error"); }
      };

      const handleImport = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        try {
          const xlsx = await loadSheetJS();
          const reader = new FileReader();
          reader.onload = (evt) => {
            try {
              const wb = xlsx.read(evt.target.result, { type: 'binary' });
              let importadosFijos = 0;
              let importadosVar = 0;

              if (wb.Sheets["Pagos_Fijos"]) {
                const dataFijos = xlsx.utils.sheet_to_json(wb.Sheets["Pagos_Fijos"]);
                setPagosFijos(prev => {
                    let nuevos = [...prev];
                    dataFijos.filter(i=>i.Monto).forEach(i => {
                        const exists = nuevos.some(pf => pf.descripcion === i.Descripcion && pf.categoria === i.Categoria && pf.monto === Number(i.Monto));
                        if(!exists) {
                            nuevos.push({
                                id: i.ID || generateId(), descripcion: i.Descripcion || 'Fijo Importado', 
                                categoria: i.Categoria || 'Otros', monto: Number(i.Monto) || 0, diaPago: Number(i.DiaPago) || 1
                            });
                            importadosFijos++;
                        }
                    });
                    return nuevos;
                });
              }
              if (wb.Sheets["Presupuestos_Variables"]) {
                const dataVar = xlsx.utils.sheet_to_json(wb.Sheets["Presupuestos_Variables"]);
                setPresupuestos(prev => {
                    let nuevos = [...prev];
                    dataVar.filter(i=>i.Limite).forEach(i => {
                        const exists = nuevos.some(p => p.categoria === i.Categoria);
                        if(!exists) {
                            nuevos.push({
                                id: i.ID || generateId(), categoria: i.Categoria || 'Otros', limite: Number(i.Limite) || 0
                            });
                            importadosVar++;
                        }
                    });
                    return nuevos;
                });
              }
              showToast(`Se importaron ${importadosFijos} fijos y ${importadosVar} variables.`);
            } catch(err) { showToast("Error procesando los datos del archivo.", "error"); }
          };
          reader.readAsBinaryString(file);
        } catch(err) { showToast("Error al abrir herramienta de Excel.", "error"); }
        e.target.value = '';
      };

      const guardar = (e) => {
        e.preventDefault();
        let errs = {};
        
        if (tipoForm === 'variable') {
          if(!nuevoVar.categoria) errs.categoria = "Requerido";
          if(!nuevoVar.limite) errs.limite = "Requerido";
          if(Object.keys(errs).length > 0) { setErrors(errs); return; }
          
          if (editId) {
            setPresupuestos(prev => prev.map(p => p.id === editId ? { ...p, categoria: nuevoVar.categoria, limite: Number(nuevoVar.limite) } : p));
            setEditId(null);
            showToast("Límite actualizado.");
          } else {
            setPresupuestos(prev => [...prev, { id: generateId(), categoria: nuevoVar.categoria, limite: Number(nuevoVar.limite) }]);
            showToast("Presupuesto agregado.");
          }
          setNuevoVar({ categoria: '', limite: '' });
        } else {
          if(!nuevoFijo.descripcion) errs.descripcion = "Requerido";
          if(!nuevoFijo.categoria) errs.categoria = "Requerido";
          if(!nuevoFijo.monto) errs.monto = "Requerido";
          if(!nuevoFijo.diaPago) errs.diaPago = "Requerido";
          if(Object.keys(errs).length > 0) { setErrors(errs); return; }

          if (editId) {
            setPagosFijos(prev => prev.map(pf => pf.id === editId ? { ...pf, descripcion: nuevoFijo.descripcion, categoria: nuevoFijo.categoria, monto: Number(nuevoFijo.monto), diaPago: Number(nuevoFijo.diaPago) } : pf));
            setEditId(null);
            showToast("Gasto Fijo actualizado.");
          } else {
            setPagosFijos(prev => [...prev, { id: generateId(), descripcion: nuevoFijo.descripcion, categoria: nuevoFijo.categoria, monto: Number(nuevoFijo.monto), diaPago: Number(nuevoFijo.diaPago) }]);
            showToast("Gasto Fijo agregado.");
          }
          setNuevoFijo({ descripcion: '', monto: '', categoria: categoriasMaestras[0] || 'Otros', diaPago: '' });
        }
        setErrors({});
      };

      const cargarParaEditar = (p) => {
        setEditId(p.id);
        setErrors({});
        if (p.tipo === 'Fijo') {
          setTipoForm('fijo');
          setNuevoFijo({ descripcion: p.nombre, monto: p.limite.toString(), categoria: p.categoria, diaPago: (p.diaPago || 1).toString() });
        } else {
          setTipoForm('variable');
          setNuevoVar({ categoria: p.categoria, limite: p.limite.toString() });
        }
        setShowForm(true);
        setTimeout(() => formRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
      }

      const cancelarEdicion = () => {
        setEditId(null);
        setNuevoVar({ categoria: '', limite: '' });
        setNuevoFijo({ descripcion: '', monto: '', categoria: categoriasMaestras[0] || 'Otros', diaPago: '' });
        setErrors({});
        setShowForm(false);
      }

      const egresosMes = egresos.filter(g => g.fecha.startsWith(selectedMonth));

      const totalFijo = pagosFijos.reduce((s, p) => s + p.monto, 0);
      const totalVar = presupuestos.reduce((s, p) => s + p.limite, 0);
      const gastadoFijo = egresosMes.filter(e => e.tipo === 'Fijo').reduce((s, e) => s + e.monto, 0);
      const gastadoVar = egresosMes.filter(e => e.tipo !== 'Fijo').reduce((s, e) => s + e.monto, 0);

      const items = useMemo(() => {
        const list = [];
        if (filtroLista === 'Todos' || filtroLista === 'Fijos') {
          pagosFijos.forEach(pf => {
            const gastado = egresosMes.filter(e => e.pagoFijoId === pf.id).reduce((s, e) => s + e.monto, 0);
            list.push({ id: pf.id, tipo: 'Fijo', nombre: pf.descripcion, categoria: pf.categoria, limite: pf.monto, gastado, diaPago: pf.diaPago });
          });
        }
        if (filtroLista === 'Todos' || filtroLista === 'Variables') {
          presupuestos.forEach(p => {
            const gastado = egresosMes.filter(e => e.categoria.toLowerCase() === p.categoria.toLowerCase() && e.tipo !== 'Fijo').reduce((s, e) => s + e.monto, 0);
            list.push({ id: p.id, tipo: 'Variable', nombre: p.categoria, categoria: p.categoria, limite: p.limite, gastado });
          });
        }
        return list.sort((a, b) => b.limite - a.limite);
      }, [pagosFijos, presupuestos, egresosMes, filtroLista]);

      return (
        <div className="space-y-6 animate-in fade-in duration-500 pb-20 md:pb-0">
          <header className="flex flex-col md:flex-row md:justify-between md:items-end gap-4">
            <div>
              <h1 className="text-2xl md:text-3xl font-bold text-white tracking-tight flex items-center gap-2"><PieChart className="text-indigo-400 w-8 h-8"/> Presupuestos y Ejecución</h1>
              <p className="text-sm md:text-base text-slate-400 mt-1">Controla cómo se está gastando el dinero vs lo que tenías planificado.</p>
            </div>
            <div className="flex flex-wrap gap-2">
              <button onClick={() => { cancelarEdicion(); setShowForm(!showForm); }} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-colors">
                <Plus size={16}/> {showForm ? 'Ocultar' : 'Añadir presupuesto'}
              </button>
              <input type="file" accept=".xlsx, .xls" ref={fileInputRef} onChange={handleImport} className="hidden" />
              <button onClick={() => fileInputRef.current.click()} className="bg-slate-800 hover:bg-slate-700 text-emerald-400 px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-colors border border-emerald-500/30"><Upload size={14}/> Importar</button>
              <button onClick={handleExport} className="bg-emerald-600/20 hover:bg-emerald-600/30 text-emerald-400 px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-colors border border-emerald-500/30"><Download size={14}/> Exportar</button>
            </div>
          </header>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
            <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
              <p className="text-[10px] text-slate-500 uppercase font-bold mb-1">Presupuesto Gasto Fijo</p>
              <p className="text-lg font-bold text-slate-200">{formatCOP(totalFijo)}</p>
            </div>
            <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
              <p className="text-[10px] text-slate-500 uppercase font-bold mb-1">Presupuesto Gasto Variable</p>
              <p className="text-lg font-bold text-slate-200">{formatCOP(totalVar)}</p>
            </div>
            <div className="bg-indigo-500/10 p-4 rounded-xl border border-indigo-500/20">
              <p className="text-[10px] text-indigo-400 uppercase font-bold mb-1">Total Presupuesto Egreso</p>
              <p className="text-lg font-bold text-indigo-400">{formatCOP(totalFijo + totalVar)}</p>
            </div>
          </div>

          {showForm && (
            <Card className={editId ? "border-t-4 border-t-amber-500 bg-amber-950/10" : "border-t-4 border-t-indigo-500 bg-slate-900/80"}>
              <div className="flex justify-between items-center mb-4" ref={formRef}>
                <div className="flex gap-4">
                  <button 
                    onClick={() => { if(!editId) setTipoForm('variable') }} 
                    type="button"
                    className={`text-sm md:text-lg font-semibold transition-colors ${tipoForm === 'variable' ? 'text-white' : 'text-slate-500 hover:text-slate-300'} ${editId && tipoForm !== 'variable' ? 'hidden' : ''}`}
                  >
                    {editId && tipoForm === 'variable' ? '✏️ Editar Límite Variable' : 'Añadir Límite Variable'}
                  </button>
                  {!editId && <span className="text-slate-700">|</span>}
                  <button 
                    onClick={() => { if(!editId) setTipoForm('fijo') }} 
                    type="button"
                    className={`text-sm md:text-lg font-semibold transition-colors ${tipoForm === 'fijo' ? 'text-white' : 'text-slate-500 hover:text-slate-300'} ${editId && tipoForm !== 'fijo' ? 'hidden' : ''}`}
                  >
                    {editId && tipoForm === 'fijo' ? '✏️ Editar Gasto Fijo' : 'Añadir Gasto Fijo'}
                  </button>
                </div>
                {editId && <button onClick={cancelarEdicion} className="text-xs text-amber-400 hover:underline">Cancelar Edición</button>}
              </div>
              <form onSubmit={guardar} className="grid grid-cols-1 sm:grid-cols-12 gap-3 items-end">
                {tipoForm === 'variable' ? (
                  <React.Fragment>
                    <Input label="Categoría Variable (Libre texto)" placeholder="Ej: Gasolina, Mercado..." value={nuevoVar.categoria} onChange={e=>setNuevoVar({...nuevoVar, categoria: e.target.value})} error={errors.categoria} disabled={!!editId} className="sm:col-span-5" />
                    <Input type="number" label="Límite Mensual ($)" value={nuevoVar.limite} onChange={e=>setNuevoVar({...nuevoVar, limite: e.target.value})} error={errors.limite} className="sm:col-span-4" />
                    <div className="sm:col-span-3 flex gap-2">
                       <button type="submit" className={`w-full ${editId ? 'bg-amber-600 hover:bg-amber-700' : 'bg-indigo-600 hover:bg-indigo-700'} text-white font-medium py-2.5 md:py-2 rounded-lg transition-colors`}>{editId ? 'Actualizar' : 'Añadir Límite'}</button>
                    </div>
                  </React.Fragment>
                ) : (
                  <React.Fragment>
                    <Input label="Descripción (Gasto Fijo)" placeholder="Ej: Internet" value={nuevoFijo.descripcion} onChange={e=>setNuevoFijo({...nuevoFijo, descripcion: e.target.value})} error={errors.descripcion} className="sm:col-span-4" />
                    <Select label="Categoría Fija" options={categoriasMaestras.map(c=>({value:c, label:c}))} value={nuevoFijo.categoria} onChange={e=>setNuevoFijo({...nuevoFijo, categoria: e.target.value})} error={errors.categoria} className="sm:col-span-3" />
                    <Input type="number" label="Monto Estimado ($)" value={nuevoFijo.monto} onChange={e=>setNuevoFijo({...nuevoFijo, monto: e.target.value})} error={errors.monto} className="sm:col-span-2" />
                    <Input type="number" label="Día (1-31)" value={nuevoFijo.diaPago} onChange={e=>setNuevoFijo({...nuevoFijo, diaPago: e.target.value})} min="1" max="31" error={errors.diaPago} className="sm:col-span-1" />
                    <div className="sm:col-span-2 flex gap-2">
                       <button type="submit" className={`w-full ${editId ? 'bg-amber-600 hover:bg-amber-700' : 'bg-indigo-600 hover:bg-indigo-700'} text-white font-medium py-2.5 md:py-2 rounded-lg transition-colors`}>{editId ? 'Actualizar' : 'Añadir Fijo'}</button>
                    </div>
                  </React.Fragment>
                )}
              </form>
            </Card>
          )}

          <div className="flex bg-slate-950 p-1.5 rounded-xl border border-slate-800 text-sm font-medium w-full md:w-max">
            <button onClick={()=>setFiltroLista('Todos')} className={`flex-1 md:flex-none px-6 py-2 rounded-lg transition-colors ${filtroLista === 'Todos' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-slate-200'}`}>Todos</button>
            <button onClick={()=>setFiltroLista('Fijos')} className={`flex-1 md:flex-none px-6 py-2 rounded-lg transition-colors ${filtroLista === 'Fijos' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-slate-200'}`}>Fijos</button>
            <button onClick={()=>setFiltroLista('Variables')} className={`flex-1 md:flex-none px-6 py-2 rounded-lg transition-colors ${filtroLista === 'Variables' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-slate-200'}`}>Variables</button>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
            {items.map(p => {
              const porcentaje = Math.min((p.gastado / p.limite) * 100, 100);
              const isDanger = porcentaje > 90;
              const isWarning = porcentaje > 75 && !isDanger;
              const bgBar = p.tipo === 'Fijo' ? 'bg-amber-500' : (isDanger ? 'bg-rose-500' : isWarning ? 'bg-amber-500' : 'bg-emerald-500');

              return (
                <Card key={p.id + p.tipo} className={`border-t-4 ${p.tipo === 'Fijo' ? 'border-t-amber-500/50' : (isDanger ? 'border-t-rose-500' : isWarning ? 'border-t-amber-500' : 'border-t-emerald-500')}`}>
                  <div className="flex justify-between items-start mb-2">
                    <div>
                      <h3 className="font-bold text-white text-base leading-tight pr-2">{p.nombre}</h3>
                      <span className={`text-[9px] uppercase font-bold tracking-wider px-2 py-0.5 rounded mt-1 inline-block ${p.tipo === 'Fijo' ? 'bg-amber-500/20 text-amber-400' : 'bg-indigo-500/20 text-indigo-400'}`}>{p.tipo}</span>
                    </div>
                    <div className="flex gap-2">
                      <button onClick={() => cargarParaEditar(p)} className="text-slate-600 hover:text-indigo-400 p-1"><Edit3 size={14}/></button>
                      <button onClick={() => {
                        if (p.tipo === 'Variable') {
                          deleteItem(setPresupuestos, p.id);
                          showToast("Presupuesto eliminado");
                        } else {
                          deleteItem(setPagosFijos, p.id);
                          showToast("Gasto Fijo eliminado de esta vista y de la pestaña Egresos.");
                        }
                      }} className="text-slate-600 hover:text-rose-400 p-1"><Trash2 size={14}/></button>
                    </div>
                  </div>
                  <div className="flex justify-between text-xs text-slate-400 mb-3 mt-4">
                    <span>Gastado: <strong className="text-white">{formatCOP(p.gastado)}</strong></span>
                    <span>{p.tipo === 'Fijo' ? 'Estimado' : 'Límite'}: {formatCOP(p.limite)}</span>
                  </div>
                  <div className="w-full bg-slate-950 rounded-full h-3 mb-2 border border-slate-800">
                    <div className={`h-full rounded-full transition-all duration-1000 ${bgBar}`} style={{ width: `${porcentaje}%` }}></div>
                  </div>
                  <p className={`text-xs text-right font-bold ${p.tipo === 'Fijo' ? 'text-amber-400' : (isDanger ? 'text-rose-400' : isWarning ? 'text-amber-400' : 'text-emerald-400')}`}>
                    {porcentaje.toFixed(1)}% consumido
                  </p>
                </Card>
              );
            })}
            {items.length === 0 && <p className="col-span-1 md:col-span-2 lg:col-span-3 text-center text-slate-500 py-10 border border-dashed border-slate-800 rounded-xl">No hay elementos para mostrar en esta vista.</p>}
          </div>
        </div>
      );
    };

    const DeudasTab = ({ cuentas, setCuentas, showToast }) => {
      const [showNewCard, setShowNewCard] = useState(false);
      const [showNewLoan, setShowNewLoan] = useState(false);
      
      const [newCardData, setNewCardData] = useState({ name: '', limit: '', initialDebt: '', tasaEA: '', cuotaMinima: '' });
      const [newLoanData, setNewLoanData] = useState({ name: '', montoPrestado: '', initialDebt: '', totalPagadoPrevio: '', tasaEA: '', cuotaMinima: '', cuotasTotales: '', cuotasPagadas: '', hasIBR: false, ibrValue: '', ibrPuntos: '' });
      
      const [editId, setEditId] = useState(null);
      const [editData, setEditData] = useState({});
      const fileInputRef = useRef(null);

      const deudasAnalizadas = cuentas
        .filter(c => ['credit', 'loan'].includes(c.type))
        .map(d => {
          const tasaMes = getTasaMensual(d.tasaEA);
          const interesMes = d.currentDebt * tasaMes;
          return { ...d, tasaMes, interesMes };
        })
        .sort((a, b) => b.tasaEA - a.tasaEA);

      const tcDeudas = deudasAnalizadas.filter(c => c.type === 'credit' && c.currentDebt > 0);
      const loanDeudas = deudasAnalizadas.filter(c => c.type === 'loan' && c.currentDebt > 0);

      const handleAddCard = (e) => {
        e.preventDefault();
        if(!newCardData.name) return showToast("El nombre es obligatorio", "error");

        setCuentas(prev => [...prev, {
          id: generateId(),
          name: newCardData.name,
          type: 'credit',
          initialBalance: 0,
          initialDebt: Number(newCardData.initialDebt) || 0,
          limit: Number(newCardData.limit) || 0,
          cuotaMinima: Number(newCardData.cuotaMinima) || 0,
          tasaEA: Number(newCardData.tasaEA) || 0
        }]);
        showToast("Tarjeta creada correctamente.");
        setShowNewCard(false);
        setNewCardData({ name: '', limit: '', initialDebt: '', tasaEA: '', cuotaMinima: '' });
      };

      const handleAddLoan = (e) => {
        e.preventDefault();
        if(!newLoanData.name) return showToast("El nombre es obligatorio", "error");

        let tasaFinal = Number(newLoanData.tasaEA) || 0;
        if(newLoanData.hasIBR) {
            const namv = Number(newLoanData.ibrValue) + Number(newLoanData.ibrPuntos);
            tasaFinal = (Math.pow(1 + (namv/100)/12, 12) - 1) * 100;
        }

        setCuentas(prev => [...prev, {
          id: generateId(),
          name: newLoanData.name,
          type: 'loan',
          initialBalance: 0,
          montoPrestado: Number(newLoanData.montoPrestado) || 0,
          initialDebt: Number(newLoanData.initialDebt) || 0,
          totalPagadoPrevio: Number(newLoanData.totalPagadoPrevio) || 0,
          tasaEA: tasaFinal,
          cuotaMinima: Number(newLoanData.cuotaMinima) || 0,
          cuotasTotales: Number(newLoanData.cuotasTotales) || 0,
          cuotasPagadas: Number(newLoanData.cuotasPagadas) || 0,
          hasIBR: newLoanData.hasIBR,
          ibrValue: Number(newLoanData.ibrValue) || 0,
          ibrPuntos: Number(newLoanData.ibrPuntos) || 0
        }]);
        showToast("Préstamo creado.");
        setShowNewLoan(false);
        setNewLoanData({ name: '', montoPrestado: '', initialDebt: '', totalPagadoPrevio: '', tasaEA: '', cuotaMinima: '', cuotasTotales: '', cuotasPagadas: '', hasIBR: false, ibrValue: '', ibrPuntos: '' });
      };

      const startEdit = (c) => {
        setEditId(c.id);
        setEditData({
          ...c,
          montoPrestado: c.montoPrestado || c.initialDebt || 0,
          totalPagadoPrevio: c.totalPagadoPrevio || 0,
          ibrValue: c.ibrValue || 0,
          ibrPuntos: c.ibrPuntos || 0
        });
      };

      const saveInlineEdit = () => {
        if (!editData.name) return showToast("El nombre es obligatorio", "error");
        
        let dataToSave = { ...editData };
        if (dataToSave.type === 'loan' && dataToSave.hasIBR) {
            const namv = Number(dataToSave.ibrValue) + Number(dataToSave.ibrPuntos);
            dataToSave.tasaEA = (Math.pow(1 + (namv/100)/12, 12) - 1) * 100;
        }

        setCuentas(prev => prev.map(c => c.id === editId ? {
            ...c,
            name: dataToSave.name,
            limit: Number(dataToSave.limit) || 0,
            initialDebt: Number(dataToSave.initialDebt) || 0,
            montoPrestado: Number(dataToSave.montoPrestado) || 0,
            totalPagadoPrevio: Number(dataToSave.totalPagadoPrevio) || 0,
            tasaEA: Number(dataToSave.tasaEA) || 0,
            cuotaMinima: Number(dataToSave.cuotaMinima) || 0,
            cuotasTotales: Number(dataToSave.cuotasTotales) || 0,
            cuotasPagadas: Number(dataToSave.cuotasPagadas) || 0,
            hasIBR: dataToSave.hasIBR || false,
            ibrValue: Number(dataToSave.ibrValue) || 0,
            ibrPuntos: Number(dataToSave.ibrPuntos) || 0
        } : c));
        setEditId(null);
        showToast("Registro actualizado correctamente.");
      };

      const actualizarCampo = (id, field, val) => {
        setCuentas(prev => prev.map(c => c.id === id ? {...c, [field]: Number(val)} : c));
      };

      const actualizarIBR = (id, ibrValue, ibrPuntos) => {
        const val = Number(ibrValue);
        const pts = Number(ibrPuntos);
        const namv = val + pts;
        const nuevaEA = (Math.pow(1 + (namv/100)/12, 12) - 1) * 100;
        setCuentas(prev => prev.map(c => c.id === id ? {...c, ibrValue: val, tasaEA: nuevaEA} : c));
      };

      // --- IMPORTAR / EXPORTAR INDIVIDUAL DE DEUDAS ---
      const handleExport = async () => {
        try {
          const xlsx = await loadSheetJS();
          const wb = xlsx.utils.book_new();
          const headers = ["ID", "Nombre", "Tipo", "DeudaInicial", "Limite", "MontoPrestado", "TasaEA", "CuotaMinima", "CuotasTotales", "CuotasPagadas"];
          const deudasAnalizadas = cuentas.filter(c => ['credit', 'loan'].includes(c.type));
          const data = deudasAnalizadas.map(c => ({
              ID: c.id, Nombre: c.name, Tipo: c.type, DeudaInicial: c.initialDebt, Limite: c.limit, 
              MontoPrestado: c.montoPrestado || '', TasaEA: c.tasaEA, CuotaMinima: c.cuotaMinima, 
              CuotasTotales: c.cuotasTotales || '', CuotasPagadas: c.cuotasPagadas || ''
          }));
          
          const ws = xlsx.utils.json_to_sheet(data.length > 0 ? data : [{}], { header: headers });
          xlsx.utils.book_append_sheet(wb, ws, "Deudas");
          xlsx.writeFile(wb, `Deudas_y_Prestamos_${new Date().toISOString().split('T')[0]}.xlsx`);
          showToast("Deudas exportadas con éxito.");
        } catch(e) { showToast("Error al exportar a Excel.", "error"); }
      };

      const handleImport = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        try {
          const xlsx = await loadSheetJS();
          const reader = new FileReader();
          reader.onload = (evt) => {
            try {
              const wb = xlsx.read(evt.target.result, { type: 'binary' });
              const sheetName = wb.Sheets["Deudas"] ? "Deudas" : wb.SheetNames[0];
              const importedData = xlsx.utils.sheet_to_json(wb.Sheets[sheetName]);
              let importados = 0;

              setCuentas(prev => {
                  let nuevos = [...prev];
                  importedData.forEach(i => {
                      if(i.Nombre && (i.Tipo === 'credit' || i.Tipo === 'loan')) {
                          const exists = nuevos.some(c => c.name === i.Nombre && c.type === i.Tipo);
                          if(!exists) {
                              nuevos.push({
                                  id: i.ID || generateId(), name: i.Nombre, type: i.Tipo,
                                  initialBalance: 0, currentDebt: Number(i.DeudaInicial) || 0, initialDebt: Number(i.DeudaInicial) || 0,
                                  limit: Number(i.Limite) || 0, montoPrestado: Number(i.MontoPrestado) || 0,
                                  tasaEA: Number(i.TasaEA) || 0, cuotaMinima: Number(i.CuotaMinima) || 0,
                                  cuotasTotales: Number(i.CuotasTotales) || 0, cuotasPagadas: Number(i.CuotasPagadas) || 0
                              });
                              importados++;
                          }
                      }
                  });
                  return nuevos;
              });
              showToast(importados > 0 ? `Se importaron ${importados} deudas.` : "No hay deudas nuevas.");
            } catch(err) { showToast("Error procesando los datos del archivo.", "error"); }
          };
          reader.readAsBinaryString(file);
        } catch(err) { showToast("Error al abrir herramienta de Excel.", "error"); }
        e.target.value = '';
      };

      return (
        <div className="space-y-6 animate-in fade-in duration-500 pb-20 md:pb-0">
          <header className="flex flex-col md:flex-row md:justify-between md:items-end gap-4">
            <div>
              <h1 className="text-2xl md:text-3xl font-bold text-white tracking-tight flex items-center gap-2 md:gap-3"><ShieldAlert className="text-rose-500 w-6 h-6 md:w-8 md:h-8"/> Tarjetas y Créditos</h1>
              <p className="text-sm md:text-base text-slate-400 mt-1">Estrategia Avalancha y detalle de tus deudas y préstamos.</p>
            </div>
            <div className="flex flex-wrap gap-2">
              <button onClick={() => {setShowNewCard(!showNewCard); setShowNewLoan(false);}} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-colors">
                <Plus size={16}/> {showNewCard ? 'Ocultar' : 'Tarjeta'}
              </button>
              <button onClick={() => {setShowNewLoan(!showNewLoan); setShowNewCard(false);}} className="bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-colors">
                <Plus size={16}/> {showNewLoan ? 'Ocultar' : 'Préstamo'}
              </button>
              <input type="file" accept=".xlsx, .xls" ref={fileInputRef} onChange={handleImport} className="hidden" />
              <button onClick={() => fileInputRef.current.click()} className="bg-slate-800 hover:bg-slate-700 text-rose-400 px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-colors border border-rose-500/30"><Upload size={14}/> Importar</button>
              <button onClick={handleExport} className="bg-rose-600/20 hover:bg-rose-600/30 text-rose-400 px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-colors border border-rose-500/30"><Download size={14}/> Exportar</button>
            </div>
          </header>

          {showNewCard && (
            <div className="bg-slate-950 border border-indigo-500/50 p-4 rounded-xl mb-4 animate-in slide-in-from-top-2">
              <div className="flex justify-between items-center mb-3">
                <h3 className="text-sm font-bold text-indigo-400">Nueva Tarjeta de Crédito</h3>
                <button onClick={() => setShowNewCard(false)} className="text-xs text-slate-400 hover:text-slate-200">Cerrar</button>
              </div>
              <form onSubmit={handleAddCard} className="grid grid-cols-2 md:grid-cols-6 gap-3 items-end">
                <Input label="Nombre de Tarjeta" value={newCardData.name} onChange={e=>setNewCardData({...newCardData, name: e.target.value})} className="col-span-2" />
                <Input type="number" label="Cupo Total ($)" value={newCardData.limit} onChange={e=>setNewCardData({...newCardData, limit: e.target.value})} className="col-span-1" />
                <Input type="number" label="Deuda Actual ($)" value={newCardData.initialDebt} onChange={e=>setNewCardData({...newCardData, initialDebt: e.target.value})} className="col-span-1" />
                <Input type="number" label="Tasa E.A. (%)" value={newCardData.tasaEA} onChange={e=>setNewCardData({...newCardData, tasaEA: e.target.value})} step="0.01" className="col-span-1" />
                <Input type="number" label="Cuota Mín. Estimada" value={newCardData.cuotaMinima} onChange={e=>setNewCardData({...newCardData, cuotaMinima: e.target.value})} className="col-span-1" />
                <div className="col-span-2 md:col-span-6 mt-1 flex justify-end">
                  <button type="submit" className="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold px-4 py-2 rounded transition-colors">Crear Tarjeta</button>
                </div>
              </form>
            </div>
          )}

          {showNewLoan && (
            <div className="bg-slate-950 border border-rose-500/50 p-4 md:p-6 rounded-xl mb-4 animate-in slide-in-from-top-2">
              <div className="flex justify-between items-center mb-4 border-b border-slate-800 pb-3">
                <h3 className="text-base font-bold text-rose-400">Nuevo Préstamo / Crédito</h3>
                <button onClick={() => setShowNewLoan(false)} className="text-xs text-slate-400 hover:text-slate-200">Cerrar</button>
              </div>
              <form onSubmit={handleAddLoan} className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 items-end">
                <Input label="Banco / Entidad (Nombre)" value={newLoanData.name} onChange={e=>setNewLoanData({...newLoanData, name: e.target.value})} className="sm:col-span-2" />
                <Input type="number" label="Monto Inicial Prestado ($)" value={newLoanData.montoPrestado} onChange={e=>setNewLoanData({...newLoanData, montoPrestado: e.target.value})} className="sm:col-span-1" />
                <Input type="number" label="Deuda Restante Actual ($)" value={newLoanData.initialDebt} onChange={e=>setNewLoanData({...newLoanData, initialDebt: e.target.value})} className="sm:col-span-1" />
                
                <Input type="number" label="Total Pagado Previo ($)" placeholder="Dinero abonado antes de usar la app" value={newLoanData.totalPagadoPrevio} onChange={e=>setNewLoanData({...newLoanData, totalPagadoPrevio: e.target.value})} className="sm:col-span-1" />
                <Input type="number" label="Valor Cuota Fija ($)" value={newLoanData.cuotaMinima} onChange={e=>setNewLoanData({...newLoanData, cuotaMinima: e.target.value})} className="sm:col-span-1" />
                <div className="sm:col-span-2 flex gap-4 bg-slate-900/50 p-2 rounded-lg border border-slate-800">
                   <Input type="number" label="Cuotas Pagadas" value={newLoanData.cuotasPagadas} onChange={e=>setNewLoanData({...newLoanData, cuotasPagadas: e.target.value})} className="w-full" />
                   <Input type="number" label="Cuotas Totales" value={newLoanData.cuotasTotales} onChange={e=>setNewLoanData({...newLoanData, cuotasTotales: e.target.value})} className="w-full" />
                </div>

                <div className="sm:col-span-4 bg-indigo-950/20 p-4 rounded-lg border border-indigo-500/30 flex flex-col md:flex-row gap-4 items-center">
                  <label className="flex items-center gap-2 cursor-pointer text-sm font-medium text-indigo-300 w-full md:w-auto">
                    <input type="checkbox" checked={newLoanData.hasIBR} onChange={(e) => setNewLoanData({...newLoanData, hasIBR: e.target.checked})} className="form-checkbox text-indigo-500 rounded border-slate-700 bg-slate-900" />
                    ¿Tiene Tasa Variable (IBR)?
                  </label>
                  {newLoanData.hasIBR ? (
                    <div className="flex w-full gap-3">
                      <Input type="number" step="0.01" label="IBR Actual (%)" value={newLoanData.ibrValue} onChange={e=>setNewLoanData({...newLoanData, ibrValue: e.target.value})} className="flex-1" />
                      <Input type="number" step="0.01" label="Puntos Adicionales" value={newLoanData.ibrPuntos} onChange={e=>setNewLoanData({...newLoanData, ibrPuntos: e.target.value})} className="flex-1" />
                    </div>
                  ) : (
                    <Input type="number" step="0.01" label="Tasa de Interés (E.A. %)" value={newLoanData.tasaEA} onChange={e=>setNewLoanData({...newLoanData, tasaEA: e.target.value})} className="w-full md:w-1/3" />
                  )}
                </div>

                <div className="sm:col-span-4 mt-2 flex justify-end">
                  <button type="submit" className="bg-rose-600 hover:bg-rose-500 text-white font-bold px-8 py-3 rounded-lg transition-colors w-full md:w-auto">Crear Préstamo</button>
                </div>
              </form>
            </div>
          )}

          <Card className="border-t-4 border-t-indigo-500">
            <h2 className="text-lg font-bold text-white mb-4">Tarjetas de Crédito Registradas</h2>
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left min-w-[700px]">
                <thead className="text-[10px] text-slate-400 uppercase bg-slate-900/50">
                  <tr>
                    <th className="px-3 py-3 rounded-tl-lg">Tarjeta</th>
                    <th className="px-3 py-3 text-right">Cupo Total</th>
                    <th className="px-3 py-3 text-right">Cupo Disp.</th>
                    <th className="px-3 py-3 text-right">Deuda Base Actual</th>
                    <th className="px-3 py-3 text-center">Tasa M.V.</th>
                    <th className="px-3 py-3 text-center">Tasa E.A.</th>
                    <th className="px-3 py-3 text-center rounded-tr-lg">Acciones</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-800/50">
                  {deudasAnalizadas.filter(d=>d.type==='credit').map(d => {
                    const isEditing = editId === d.id;
                    const tasaMV = getTasaMensual(d.tasaEA) * 100;
                    
                    if (isEditing) {
                       return (
                         <tr key={d.id} className="bg-indigo-950/40">
                           <td className="px-2 py-2"><input type="text" value={editData.name} onChange={e=>setEditData({...editData, name: e.target.value})} className="w-full bg-slate-900 border border-indigo-500 rounded px-2 py-1 text-xs text-white outline-none" placeholder="Nombre" /></td>
                           <td className="px-2 py-2"><input type="number" value={editData.limit} onChange={e=>setEditData({...editData, limit: e.target.value})} className="w-full bg-slate-900 border border-indigo-500 rounded px-2 py-1 text-xs text-white outline-none text-right" placeholder="Cupo" /></td>
                           <td className="px-2 py-2 text-right text-slate-500">-</td>
                           <td className="px-2 py-2"><input type="number" value={editData.initialDebt} onChange={e=>setEditData({...editData, initialDebt: e.target.value})} className="w-full bg-slate-900 border border-rose-500 rounded px-2 py-1 text-xs text-white outline-none text-right" placeholder="Deuda" title="Ajusta la deuda base" /></td>
                           <td className="px-2 py-2 text-center text-slate-500">-</td>
                           <td className="px-2 py-2">
                             <div className="flex gap-1 items-center">
                                <input type="number" value={editData.tasaEA} onChange={e=>setEditData({...editData, tasaEA: e.target.value})} step="0.01" className="w-16 bg-slate-900 border border-indigo-500 rounded px-2 py-1 text-xs text-white outline-none text-center" title="Tasa E.A." />
                                <input type="number" value={editData.cuotaMinima} onChange={e=>setEditData({...editData, cuotaMinima: e.target.value})} className="hidden" />
