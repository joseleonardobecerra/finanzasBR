                             </div>
                           </td>
                           <td className="px-2 py-2 text-center flex justify-center gap-1">
                             <button onClick={saveInlineEdit} className="text-emerald-400 p-1.5 bg-slate-900 rounded border border-slate-700 hover:border-emerald-500/50" title="Guardar Cambios"><Check size={14}/></button>
                             <button onClick={() => setEditId(null)} className="text-rose-400 p-1.5 bg-slate-900 rounded border border-slate-700 hover:border-rose-500/50" title="Cancelar"><Minus size={14}/></button>
                           </td>
                         </tr>
                       )
                    }

                    return (
                      <tr key={d.id} className="hover:bg-slate-800/20 transition-colors">
                        <td className="px-3 py-3 font-medium text-slate-200">{d.name}</td>
                        <td className="px-3 py-3 text-right text-slate-300">{formatCOP(d.limit)}</td>
                        <td className="px-3 py-3 text-right font-bold text-emerald-400">{formatCOP(Math.max(0, d.limit - d.currentDebt))}</td>
                        <td className="px-3 py-3 text-right font-bold text-rose-400">{formatCOP(d.currentDebt)}</td>
                        <td className="px-3 py-3 text-center text-amber-400">{tasaMV.toFixed(2)}%</td>
                        <td className="px-3 py-3 text-center text-slate-300">{d.tasaEA}%</td>
                        <td className="px-3 py-3 text-center flex justify-center gap-2">
                          <button onClick={() => startEdit(d)} className="text-slate-400 hover:text-indigo-400 p-1.5 bg-slate-900 rounded border border-slate-800 hover:border-indigo-500/50 transition-colors"><Edit3 size={14}/></button>
                          <button onClick={() => {deleteItem(setCuentas, d.id); showToast("Tarjeta eliminada");}} className="text-slate-400 hover:text-rose-400 p-1.5 bg-slate-900 rounded border border-slate-800 hover:border-rose-500/50 transition-colors"><Trash2 size={14}/></button>
                        </td>
                      </tr>
                    )
                  })}
                  {deudasAnalizadas.filter(d=>d.type==='credit').length === 0 && (
                    <tr><td colSpan="7" className="px-3 py-6 text-center text-slate-500">No hay tarjetas de crédito registradas.</td></tr>
                  )}
                </tbody>
              </table>
            </div>
          </Card>

          <Card className="border-t-4 border-t-rose-500">
            <h2 className="text-lg font-bold text-white mb-6">Créditos y Préstamos Detallados</h2>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              {deudasAnalizadas.filter(d=>d.type==='loan').map(d => {
                const isEditing = editId === d.id;

                if (isEditing) {
                   return (
                      <div key={d.id} className="bg-slate-950 p-5 rounded-xl border border-indigo-500 shadow-xl flex flex-col gap-4">
                         <div className="flex justify-between items-center mb-2 border-b border-indigo-500/30 pb-3">
                           <h3 className="font-bold text-indigo-400 flex items-center gap-2"><Edit3 size={16}/> Editando Préstamo</h3>
                           <div className="flex gap-2">
                             <button onClick={saveInlineEdit} className="bg-emerald-600 hover:bg-emerald-500 text-white px-3 py-1.5 rounded text-xs font-bold transition-colors">Guardar</button>
                             <button onClick={() => setEditId(null)} className="bg-slate-800 hover:bg-slate-700 text-white border border-slate-600 px-3 py-1.5 rounded text-xs font-bold transition-colors">Cancelar</button>
                           </div>
                         </div>
                         
                         <Input label="Banco / Entidad (Nombre)" value={editData.name} onChange={e=>setEditData({...editData, name: e.target.value})} />
                         
                         <div className="grid grid-cols-2 gap-4">
                           <Input type="number" label="Préstamo Inicial ($)" value={editData.montoPrestado} onChange={e=>setEditData({...editData, montoPrestado: e.target.value})} />
                           <Input type="number" label="Deuda Restante Base ($)" value={editData.initialDebt} onChange={e=>setEditData({...editData, initialDebt: e.target.value})} />
                         </div>
                         
                         <div className="grid grid-cols-2 gap-4">
                           <Input type="number" label="Total Pagado Previo ($)" value={editData.totalPagadoPrevio} onChange={e=>setEditData({...editData, totalPagadoPrevio: e.target.value})} />
                           <Input type="number" label="Valor Cuota Fija ($)" value={editData.cuotaMinima} onChange={e=>setEditData({...editData, cuotaMinima: e.target.value})} />
                         </div>

                         <div className="grid grid-cols-2 gap-4">
                            <Input type="number" label="Cuotas Pagadas" value={editData.cuotasPagadas} onChange={e=>setEditData({...editData, cuotasPagadas: e.target.value})} />
                            <Input type="number" label="Cuotas Totales" value={editData.cuotasTotales} onChange={e=>setEditData({...editData, cuotasTotales: e.target.value})} />
                         </div>

                         <div className="bg-indigo-950/30 p-3 rounded-lg border border-indigo-500/30 mt-2">
                           <label className="flex items-center gap-2 cursor-pointer text-sm font-medium text-indigo-300 mb-3">
                             <input type="checkbox" checked={editData.hasIBR} onChange={(e) => setEditData({...editData, hasIBR: e.target.checked})} className="form-checkbox text-indigo-500 rounded border-slate-700 bg-slate-900" />
                             ¿Tiene Tasa Variable (IBR)?
                           </label>
                           {editData.hasIBR ? (
                             <div className="flex w-full gap-3">
                               <Input type="number" step="0.01" label="IBR Actual (%)" value={editData.ibrValue} onChange={e=>setEditData({...editData, ibrValue: e.target.value})} className="flex-1" />
                               <Input type="number" step="0.01" label="Puntos Adicionales" value={editData.ibrPuntos} onChange={e=>setEditData({...editData, ibrPuntos: e.target.value})} className="flex-1" />
                             </div>
                           ) : (
                             <Input type="number" step="0.01" label="Tasa de Interés (E.A. %)" value={editData.tasaEA} onChange={e=>setEditData({...editData, tasaEA: e.target.value})} className="w-1/2" />
                           )}
                         </div>
                      </div>
                   )
                }

                const capitalPagado = (d.montoPrestado || 0) - d.currentDebt;
                const totalIntereses = (d.totalPagado || 0) - capitalPagado;

                return (
                  <div key={d.id} className="bg-slate-950 p-5 rounded-xl border border-slate-800 shadow-md flex flex-col gap-4">
                    <div className="flex justify-between items-start border-b border-slate-800 pb-3">
                      <div>
                        <p className="font-bold text-slate-200 text-lg md:text-xl">{d.name}</p>
                        <p className="text-xs text-slate-500 uppercase font-medium">Banco / Entidad</p>
                        {d.hasIBR && <span className="mt-2 inline-block text-[9px] text-indigo-400 font-bold uppercase tracking-wider bg-indigo-400/10 px-2 py-1 rounded border border-indigo-500/20">Tasa Variable (IBR)</span>}
                      </div>
                      <div className="flex gap-2">
                        <button onClick={() => startEdit(d)} className="text-slate-400 hover:text-indigo-400 p-1.5 bg-slate-900 rounded border border-slate-800 hover:border-indigo-500/50 transition-colors" title="Editar préstamo"><Edit3 size={16}/></button>
                        <button onClick={() => {deleteItem(setCuentas, d.id); showToast("Préstamo eliminado");}} className="text-slate-400 hover:text-rose-400 p-1.5 bg-slate-900 rounded border border-slate-800 hover:border-rose-500/50 transition-colors"><Trash2 size={16}/></button>
                      </div>
                    </div>
                    
                    <div className="grid grid-cols-3 gap-4 pt-1">
                      <div>
                        <p className="text-[10px] text-slate-500 uppercase font-bold mb-1">Préstamo Inicial</p>
                        <p className="text-base md:text-lg font-bold text-slate-300">{formatCOP(d.montoPrestado)}</p>
                      </div>
                      <div>
                        <p className="text-[10px] text-slate-500 uppercase font-bold mb-1">Deuda Restante</p>
                        <p className="text-lg md:text-xl font-black text-rose-400">{formatCOP(d.currentDebt)}</p>
                      </div>
                      <div className="text-right">
                        <p className="text-[10px] text-slate-500 uppercase font-bold mb-1">Valor Cuota</p>
                        <p className="text-base md:text-lg font-bold text-slate-200">{formatCOP(d.cuotaMinima)}</p>
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4 mt-2 bg-slate-900 p-4 rounded-lg border border-slate-800/50">
                      <div>
                        <p className="text-[10px] text-emerald-500/80 uppercase font-bold mb-1" title="Monto Original - Deuda Restante">Total Pago a Capital</p>
                        <p className="text-base font-bold text-emerald-400">{formatCOP(Math.max(0, capitalPagado))}</p>
                      </div>
                      <div className="text-right">
                        <p className="text-[10px] text-amber-500/80 uppercase font-bold mb-1" title="Total Histórico Pagado - Capital Pago">Total Pago Intereses y Otros</p>
                        <p className="text-base font-bold text-amber-400">{formatCOP(Math.max(0, totalIntereses))}</p>
                      </div>
                    </div>

                    <div className="flex justify-between items-center mt-3 pt-4 border-t border-slate-800">
                       <div className="flex flex-col gap-1 w-1/2">
                         <span className="text-[10px] text-slate-500 uppercase font-bold">Progreso Cuotas</span>
                         <div className="flex items-center gap-1.5 bg-slate-950 px-3 py-2 rounded-lg border border-slate-700 w-max">
                           <input type="number" value={d.cuotasPagadas || 0} onChange={(e)=>actualizarCampo(d.id, 'cuotasPagadas', e.target.value)} className="w-10 bg-transparent text-emerald-400 text-sm font-bold outline-none text-right" title="Edición rápida" />
                           <span className="text-slate-500 text-[10px]">/</span>
                           <input type="number" value={d.cuotasTotales || 0} onChange={(e)=>actualizarCampo(d.id, 'cuotasTotales', e.target.value)} className="w-10 bg-transparent text-slate-300 text-sm font-bold outline-none" title="Edición rápida" />
                         </div>
                       </div>
                       
                       <div className="text-right w-1/2">
                          {d.hasIBR ? (
                             <div className="flex flex-col items-end">
                               <span className="text-[10px] text-slate-500 uppercase font-bold">IBR Actual (%) + Puntos</span>
                               <div className="flex items-center gap-1 mt-1">
                                 <input type="number" step="0.01" value={d.ibrValue} onChange={(e)=>actualizarIBR(d.id, e.target.value, d.ibrPuntos)} className="w-16 bg-slate-950 border border-slate-700 text-white text-sm font-bold px-2 py-1.5 rounded outline-none text-center focus:border-indigo-500" title="Edición rápida" />
                                 <span className="text-sm text-slate-400 font-bold">+{d.ibrPuntos}</span>
                               </div>
                               <span className="text-[10px] text-indigo-400 mt-2 block font-medium">Tasa E.A: {d.tasaEA.toFixed(2)}%</span>
                             </div>
                          ) : (
                             <div className="flex flex-col items-end">
                               <span className="text-[10px] text-slate-500 uppercase font-bold">Tasa Interés (E.A.)</span>
                               <div className="flex items-center gap-1 mt-1">
                                  <input type="number" step="0.1" value={d.tasaEA.toFixed(2)} onChange={(e)=>actualizarCampo(d.id, 'tasaEA', e.target.value)} className="w-20 bg-slate-950 border border-slate-700 text-white text-sm font-bold px-2 py-1.5 rounded outline-none text-center focus:border-indigo-500" title="Edición rápida" />
                                  <span className="text-slate-400 font-bold">%</span>
                               </div>
                             </div>
                          )}
                       </div>
                    </div>
                  </div>
                )
              })}
              {loanDeudas.length === 0 && <p className="text-slate-500 text-sm col-span-1 lg:col-span-2 text-center py-6">No hay préstamos configurados.</p>}
            </div>
          </Card>

          <Card>
            <h2 className="text-lg font-bold text-white mb-4">Estrategia Avalancha: Tarjetas de Crédito</h2>
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left min-w-[700px]">
                <thead className="text-xs text-slate-400 uppercase bg-slate-950">
                  <tr>
                    <th className="px-4 py-3 rounded-tl-lg">Prio</th>
                    <th className="px-4 py-3">Tarjeta</th>
                    <th className="px-4 py-3 text-right">Deuda Real</th>
                    <th className="px-4 py-3 text-center">Tasa E.A.</th>
                    <th className="px-4 py-3 text-right">Int. Mensual Aprox</th>
                    <th className="px-4 py-3 rounded-tr-lg">Acción Sugerida</th>
                  </tr>
                </thead>
                <tbody>
                  {tcDeudas.map((d, i) => {
                    let estrategia = "Mantener al día";
                    let colorEst = "text-slate-400";
                    if (i === 0) { estrategia = "🔥 Foco Avalancha (Abonar extra)"; colorEst = "text-indigo-400 font-bold"; }
                    else if (d.tasaEA > 30) { estrategia = "⚠️ Tasa usura. Evitar uso."; colorEst = "text-rose-400 font-bold"; }

                    return (
                      <tr key={d.id} className={`border-b border-slate-800/50 hover:bg-slate-800/20 ${i===0 ? 'bg-indigo-950/20' : ''}`}>
                        <td className="px-4 py-3"><div className={`w-6 h-6 rounded flex items-center justify-center text-xs font-bold ${i===0 ? 'bg-indigo-500 text-white' : 'bg-slate-800 text-slate-400'}`}>{i+1}</div></td>
                        <td className="px-4 py-3 text-slate-200 font-medium">{d.name}</td>
                        <td className="px-4 py-3 text-right text-slate-300 font-bold">{formatCOP(d.currentDebt)}</td>
                        <td className="px-4 py-3 text-center font-bold text-rose-400">{d.tasaEA.toFixed(2)}%</td>
                        <td className="px-4 py-3 text-right text-amber-400">{formatCOP(d.interesMes)}</td>
                        <td className={`px-4 py-3 ${colorEst}`}>{estrategia}</td>
                      </tr>
                    );
                  })}
                  {tcDeudas.length === 0 && <tr><td colSpan="6" className="text-center py-4 text-slate-500">No hay deudas en tarjetas de crédito.</td></tr>}
                </tbody>
              </table>
            </div>
          </Card>

          <Card>
            <h2 className="text-lg font-bold text-white mb-4">Estrategia Avalancha: Créditos y Préstamos</h2>
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left min-w-[700px]">
                <thead className="text-xs text-slate-400 uppercase bg-slate-950">
                  <tr>
                    <th className="px-4 py-3 rounded-tl-lg">Prio</th>
                    <th className="px-4 py-3">Crédito</th>
                    <th className="px-4 py-3 text-right">Deuda Real</th>
                    <th className="px-4 py-3 text-center">Tasa E.A.</th>
                    <th className="px-4 py-3 text-right">Intereses Pagados (Histórico)</th>
                    <th className="px-4 py-3 rounded-tr-lg">Acción Sugerida</th>
                  </tr>
                </thead>
                <tbody>
                  {loanDeudas.map((d, i) => {
                    const capitalPagado = (d.montoPrestado || 0) - d.currentDebt;
                    const intHist = Math.max(0, (d.totalPagado || 0) - capitalPagado);
                    
                    let estrategia = "Mantener al día";
                    let colorEst = "text-slate-400";
                    if (i === 0) { estrategia = "🔥 Foco Avalancha (Abonar extra)"; colorEst = "text-indigo-400 font-bold"; }
                    else if (intHist > ((d.montoPrestado || 0) * 0.3)) { estrategia = "⚠️ Costo de intereses alto. Evaluar compra cartera."; colorEst = "text-amber-400 font-bold"; }

                    return (
                      <tr key={d.id} className={`border-b border-slate-800/50 hover:bg-slate-800/20 ${i===0 ? 'bg-indigo-950/20' : ''}`}>
                        <td className="px-4 py-3"><div className={`w-6 h-6 rounded flex items-center justify-center text-xs font-bold ${i===0 ? 'bg-indigo-500 text-white' : 'bg-slate-800 text-slate-400'}`}>{i+1}</div></td>
                        <td className="px-4 py-3 text-slate-200 font-medium">{d.name}</td>
                        <td className="px-4 py-3 text-right text-slate-300 font-bold">{formatCOP(d.currentDebt)}</td>
                        <td className="px-4 py-3 text-center font-bold text-rose-400">{d.tasaEA.toFixed(2)}%</td>
                        <td className="px-4 py-3 text-right text-amber-400">{formatCOP(intHist)}</td>
                        <td className={`px-4 py-3 ${colorEst}`}>{estrategia}</td>
                      </tr>
                    );
                  })}
                  {loanDeudas.length === 0 && <tr><td colSpan="6" className="text-center py-4 text-slate-500">No hay deudas en préstamos.</td></tr>}
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      );
    };
    const SimuladorTab = ({ cuentas, addPagoFijo, showToast }) => {
      const [activeSim, setActiveSim] = useState('acelerado'); 
      const [s1, setS1] = useState({ deudaId: '', extra: 200000 });
      const dSeleccionada = cuentas.find(c => c.id === s1.deudaId);
      const s1Saldo = dSeleccionada ? dSeleccionada.currentDebt : 0;
      const s1Tasa = dSeleccionada ? dSeleccionada.tasaEA : 0;
      const s1Cuota = dSeleccionada ? dSeleccionada.cuotaMinima : 0;

      const calcSim1 = () => {
        if (s1Saldo <= 0) return { error: "Selecciona una obligación con deuda actual para simular." };
        const tm = getTasaMensual(s1Tasa); const intMesActual = s1Saldo * tm;
        if (s1Cuota <= intMesActual) return { error: "La cuota actual no cubre ni los intereses mensuales. Incrementa la cuota base en la pestaña Deudas." };
        
        const simular = (pagoMensual) => { 
          let saldoRemanente = s1Saldo; let meses = 0; let intTotal = 0; 
          while(saldoRemanente > 0 && meses < 600) { 
            const int = saldoRemanente * tm; 
            intTotal += int; 
            saldoRemanente = saldoRemanente + int - pagoMensual; 
            meses++; 
          } 
          return { meses, intTotal }; 
        };
        const escenarioNormal = simular(s1Cuota); 
        const escenarioAcelerado = simular(s1Cuota + s1.extra);
        
        return { 
          mesesNormal: escenarioNormal.meses, intNormal: Math.round(escenarioNormal.intTotal), 
          mesesAcelerado: escenarioAcelerado.meses, intAcelerado: Math.round(escenarioAcelerado.intTotal), 
          ahorroInt: Math.round(escenarioNormal.intTotal - escenarioAcelerado.intTotal), 
          ahorroMeses: escenarioNormal.meses - escenarioAcelerado.meses 
        };
      };
      const resS1 = s1Saldo > 0 ? calcSim1() : null;

      const asumirAcelerado = () => {
        if (!dSeleccionada) { showToast("Selecciona una deuda primero", "error"); return; }
        addPagoFijo({ descripcion: `Abono Acelerado: ${dSeleccionada.name}`, categoria: 'Deudas', monto: s1Cuota + s1.extra, diaPago: 1 });
        showToast(`Simulación guardada! Abono de ${formatCOP(s1Cuota + s1.extra)} en Pagos Fijos.`);
      };

      const [s2, setS2] = useState({ nombre: '', objetivo: 5000000, ahorrado: 0, meses: 12, tasaEA: 5 });
      
      const calcSim2 = () => {
        if (s2.objetivo <= 0 || s2.meses <= 0) return null;
        const tm = getTasaMensual(s2.tasaEA);
        let reqMensual = 0;
        
        if (tm === 0) {
          reqMensual = (s2.objetivo - s2.ahorrado) / s2.meses;
        } else {
          const factor = Math.pow(1 + tm, s2.meses);
          const futuroAhorrado = s2.ahorrado * factor;
          const restante = s2.objetivo - futuroAhorrado;
          if (restante > 0) reqMensual = (restante * tm) / (factor - 1);
        }
        
        reqMensual = Math.max(0, reqMensual);
        const totalAportado = s2.ahorrado + (reqMensual * s2.meses);
        const rendimientos = s2.objetivo - totalAportado;
        
        return { aporteMensual: Math.round(reqMensual), totalAportado: Math.round(totalAportado), rendimientos: Math.round(rendimientos) };
      };
      const resS2 = calcSim2();

      const asumirAhorro = () => {
        if (!s2.nombre) { showToast("Escribe un nombre para tu Plan de Ahorro.", "error"); return; }
        addPagoFijo({ descripcion: `Ahorro: ${s2.nombre}`, categoria: 'Inversión', monto: resS2.aporteMensual, diaPago: 1 });
        showToast(`Plan activado. Cuota de ${formatCOP(resS2.aporteMensual)} en Pagos Fijos.`);
      };

      const [s3, setS3] = useState({ invId: 'otra', capital: 0, tasa: 10, anos: 5, aporte: 200000 });
      
      const handleInvChange = (e) => {
        const val = e.target.value;
        if (val === 'otra' || val === '') {
          setS3({...s3, invId: val, capital: 0, tasa: 10});
        } else {
          const inv = cuentas.find(c => c.id === val);
          if (inv) setS3({...s3, invId: val, capital: inv.currentBalance, tasa: inv.tasaEA});
        }
      }

      const calcSim3 = () => {
        const tm = getTasaMensual(s3.tasa); 
        const meses = s3.anos * 12; 
        let vf = s3.capital * Math.pow(1 + tm, meses);
        if (tm === 0) {
           vf = s3.capital + (s3.aporte * meses);
        } else if (s3.aporte > 0) {
           vf += s3.aporte * ((Math.pow(1 + tm, meses) - 1) / tm);
        }
        const capitalInvertido = s3.capital + (s3.aporte * meses); 
        return { vf, capitalInvertido, rendimientos: vf - capitalInvertido };
      };
      const resS3 = calcSim3();

      const asumirInversion = () => {
        const iSeleccionada = cuentas.find(c => c.id === s3.invId);
        const nombreDesc = iSeleccionada ? iSeleccionada.name : 'Nueva Inversión';
        addPagoFijo({ descripcion: `Aporte a Inversión: ${nombreDesc}`, categoria: 'Inversión', monto: s3.aporte, diaPago: 1 });
        showToast(`Aporte programado de ${formatCOP(s3.aporte)} en Pagos Fijos.`);
      };

      return (
        <div className="space-y-6 animate-in fade-in duration-500 pb-20 md:pb-0 max-w-4xl mx-auto">
          <header>
            <h1 className="text-2xl md:text-3xl font-bold text-white tracking-tight">Simuladores y Proyecciones</h1>
            <p className="text-sm md:text-base text-slate-400 mt-1">Conecta con tus datos reales y "Asume el gasto" para integrarlo a tus pagos mensuales.</p>
          </header>

          <div className="flex bg-slate-950 p-1.5 rounded-xl border border-slate-800 text-sm font-medium">
            <button onClick={()=>setActiveSim('acelerado')} className={`flex-1 py-2.5 rounded-lg transition-colors ${activeSim === 'acelerado' ? 'bg-rose-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'}`}>Pago Acelerado</button>
            <button onClick={()=>setActiveSim('ahorro')} className={`flex-1 py-2.5 rounded-lg transition-colors ${activeSim === 'ahorro' ? 'bg-emerald-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'}`}>Plan de Ahorro</button>
            <button onClick={()=>setActiveSim('inversion')} className={`flex-1 py-2.5 rounded-lg transition-colors ${activeSim === 'inversion' ? 'bg-amber-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'}`}>Int. Compuesto</button>
          </div>

          {activeSim === 'acelerado' && (
            <Card className="border-t-4 border-t-rose-500 animate-in slide-in-from-bottom-4">
              <h2 className="text-lg md:text-xl font-bold text-white mb-2 flex items-center gap-2"><TrendingUp size={20} className="text-rose-400"/> Pago Acelerado (Deudas)</h2>
              <p className="text-sm text-slate-400 mb-6">Proyecta cuánto tiempo y dinero ahorras si aumentas la cuota de tus obligaciones actuales.</p>
              
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                <Select label="Elige tu crédito o tarjeta" options={cuentas.filter(c=>['credit','loan'].includes(c.type)).map(c=>({value:c.id,label:`${c.name} (Deuda: ${formatCOP(c.currentDebt)})`}))} value={s1.deudaId} onChange={e=>setS1({...s1, deudaId: e.target.value})} className="sm:col-span-2" />
                <Input type="number" label="Abono EXTRA mensual ($)" value={s1.extra} onChange={e=>setS1({...s1, extra: Number(e.target.value)})} className="bg-slate-900 sm:col-span-2" />
              </div>

              {resS1 && resS1.error ? (
                <div className="p-4 bg-rose-500/20 text-rose-400 rounded-lg text-sm font-medium">{resS1.error}</div>
              ) : resS1 ? (
                <div className="bg-slate-950 p-4 md:p-6 rounded-xl border border-slate-800 space-y-6">
                  <div className="flex justify-between items-center pb-4 border-b border-slate-800">
                    <div className="text-center w-1/2 border-r border-slate-800 pr-2">
                      <p className="text-xs text-slate-500 mb-1 uppercase tracking-wider">Pagando lo actual</p>
                      <p className="text-lg md:text-xl font-bold text-slate-300">{resS1.mesesNormal} meses</p>
                      <p className="text-xs text-rose-400 mt-1">{formatCOP(resS1.intNormal)} intereses</p>
                    </div>
                    <div className="text-center w-1/2 pl-2">
                      <p className="text-xs text-slate-500 mb-1 uppercase tracking-wider">Abonando el Extra</p>
                      <p className="text-lg md:text-xl font-bold text-indigo-400">{resS1.mesesAcelerado} meses</p>
                      <p className="text-xs text-amber-400 mt-1">{formatCOP(resS1.intAcelerado)} intereses</p>
                    </div>
                  </div>
                  <div className="bg-emerald-500/10 p-4 rounded-lg border border-emerald-500/20 text-center">
                    <p className="text-sm text-emerald-400 font-medium">✨ Con este abono, te ahorras <span className="font-bold text-lg">{formatCOP(resS1.ahorroInt)}</span> y terminas {resS1.ahorroMeses} meses antes.</p>
                  </div>
                  <button onClick={asumirAcelerado} className="w-full bg-rose-600 hover:bg-rose-500 text-white font-bold py-3 rounded-lg transition-colors flex justify-center items-center gap-2">
                    <CheckCircle2 size={18}/> Asumir Gasto Fijo: {formatCOP(s1Cuota + s1.extra)} / mes
                  </button>
                </div>
              ) : null}
            </Card>
          )}

          {activeSim === 'ahorro' && (
            <Card className="border-t-4 border-t-emerald-500 animate-in slide-in-from-bottom-4">
              <h2 className="text-lg md:text-xl font-bold text-white mb-2 flex items-center gap-2"><Target size={20} className="text-emerald-400"/> Plan de Ahorro</h2>
              <p className="text-sm text-slate-400 mb-6">Define un objetivo de dinero y tiempo. El sistema calculará la cuota mensual exacta requerida.</p>

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                <Input label="Nombre del Plan (Ej: Viaje, Carro)" placeholder="Escribe tu meta..." value={s2.nombre} onChange={e=>setS2({...s2, nombre: e.target.value})} className="sm:col-span-2" />
                <Input type="number" label="¿Cuánto dinero necesitas? ($)" value={s2.objetivo} onChange={e=>setS2({...s2, objetivo: Number(e.target.value)})} />
                <Input type="number" label="¿En cuántos meses? (Ej: 12)" value={s2.meses} onChange={e=>setS2({...s2, meses: Number(e.target.value)})} />
                <Input type="number" label="Rendimiento del banco E.A. (%)" value={s2.tasaEA} onChange={e=>setS2({...s2, tasaEA: Number(e.target.value)})} />
                <Input type="number" label="Dinero ya ahorrado ($)" value={s2.ahorrado} onChange={e=>setS2({...s2, ahorrado: Number(e.target.value)})} />
              </div>

              {resS2 && (
                <div className="bg-slate-950 p-4 md:p-6 rounded-xl border border-slate-800 space-y-6">
                  <div className="text-center pb-4 border-b border-slate-800">
                     <p className="text-sm text-slate-400 uppercase tracking-wider mb-2">Debes ahorrar mensualmente:</p>
                     <p className="text-4xl font-black text-emerald-400">{formatCOP(resS2.aporteMensual)}</p>
                  </div>
                  <div className="flex justify-between items-center text-sm">
                    <span className="text-slate-400">Dinero aportado por ti:</span>
                    <span className="font-bold text-white">{formatCOP(resS2.totalAportado)}</span>
                  </div>
                  <div className="flex justify-between items-center text-sm">
                    <span className="text-slate-400">Intereses ganados:</span>
                    <span className="font-bold text-emerald-400">+{formatCOP(resS2.rendimientos)}</span>
                  </div>
                  <button onClick={asumirAhorro} className="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-lg transition-colors flex justify-center items-center gap-2">
                    <CheckCircle2 size={18}/> Asumir Gasto Fijo: {formatCOP(resS2.aporteMensual)} / mes
                  </button>
                </div>
              )}
            </Card>
          )}

          {activeSim === 'inversion' && (
            <Card className="border-t-4 border-t-amber-500 animate-in slide-in-from-bottom-4">
              <h2 className="text-lg md:text-xl font-bold text-white mb-2 flex items-center gap-2"><PiggyBank size={20} className="text-amber-400"/> Proyección de Interés Compuesto</h2>
              <p className="text-sm text-slate-400 mb-6">Observa cómo crece el dinero de un bolsillo real o simula una inversión externa.</p>

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                <Select label="Seleccionar Inversión" className="sm:col-span-2" 
                  options={[{value: 'otra', label: 'Otra (Ingreso manual)'}, ...cuentas.filter(c=>c.type === 'pocket').map(c=>({value:c.id,label:`${c.name} (${formatCOP(c.currentBalance)})`}))]} 
                  value={s3.invId} onChange={handleInvChange} />
                <Input type="number" label="Capital Inicial ($)" value={s3.capital} onChange={e=>setS3({...s3, capital: Number(e.target.value)})} disabled={s3.invId !== 'otra'} />
                <Input type="number" label="Tasa E.A. (%)" value={s3.tasa} onChange={e=>setS3({...s3, tasa: Number(e.target.value)})} disabled={s3.invId !== 'otra'} />
                <Input type="number" label="Tiempo (Años)" value={s3.anos} onChange={e=>setS3({...s3, anos: Number(e.target.value)})} />
                <Input type="number" label="Aporte Adicional Mensual ($)" value={s3.aporte} onChange={e=>setS3({...s3, aporte: Number(e.target.value)})} className="bg-amber-950/20" />
              </div>

              <div className="bg-slate-950 p-4 md:p-6 rounded-xl border border-slate-800 space-y-6">

    const SettingsTab = ({ stateData, setAllState, selectedMonth, showToast }) => {

      const fileExcelMasterRef = useRef(null);

      const handleExportJSON = () => { const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(stateData)); const downloadAnchorNode = document.createElement('a'); downloadAnchorNode.setAttribute("href", dataStr); downloadAnchorNode.setAttribute("download", `respaldo_finanzas_${new Date().toISOString().split('T')[0]}.json`); document.body.appendChild(downloadAnchorNode); downloadAnchorNode.click(); downloadAnchorNode.remove(); };
      const handleImportJSON = (e) => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (event) => { try { const parsed = JSON.parse(event.target.result); setAllState(parsed); showToast("¡Respaldo JSON restaurado con éxito!"); } catch (err) { showToast("Error al leer JSON.", "error"); } }; reader.readAsText(file); e.target.value = ''; };

      // --- EXPORTADOR MAESTRO DE TODA LA BASE DE DATOS (CON PLANTILLAS EN BLANCO) ---
      const handleExportExcelMaster = async () => {
        try {
          const xlsx = await loadSheetJS();
          const wb = xlsx.utils.book_new();

          // ✨ Función mágica para forzar encabezados siempre
          const crearHojaConEncabezados = (data, headers) => {
            const exportData = data.length > 0 ? data : [{}];

          };

          // 1. Ingresos
          const ingresosHeaders = ["ID", "Fecha", "Descripcion", "Persona", "Tipo", "Cuenta", "Monto"];
          const ingresosData = stateData.ingresos.map(i => ({ ID: i.id, Fecha: i.fecha, Descripcion: i.descripcion, Persona: i.persona, Tipo: i.tipo, Cuenta: stateData.cuentas.find(c=>c.id===i.cuentaId)?.name || i.cuentaId, Monto: i.monto }));
          xlsx.utils.book_append_sheet(wb, crearHojaConEncabezados(ingresosData, ingresosHeaders), "Ingresos");

          xlsx.utils.book_append_sheet(wb, crearHojaConEncabezados(egresosData, egresosHeaders), "Egresos");

      // --- IMPORTADOR MAESTRO DE TODA LA BASE DE DATOS ---
      const handleImportExcelMaster = async (e) => {

                });
              }

              if (wb.Sheets["Pagos_Fijos"]) {
                xlsx.utils.sheet_to_json(wb.Sheets["Pagos_Fijos"]).filter(i=>i.Monto).forEach(i => {
                    const exists = newPagosFijos.some(pf => pf.descripcion === i.Descripcion && pf.categoria === i.Categoria && pf.monto === Number(i.Monto));

                });

                    const exists = newPresupuestos.some(p => p.categoria === i.Categoria);
                    if(!exists) { newPresupuestos.push({ id: i.ID || generateId(), categoria: i.Categoria || 'Otros', limite: Number(i.Limite) || 0 }); totalImportados++; }
                });
              }

              if (wb.Sheets["Ingresos_Fijos"]) {
                xlsx.utils.sheet_to_json(wb.Sheets["Ingresos_Fijos"]).filter(i=>i.Monto).forEach(i => {
                    const exists = newIngresosFijos.some(inf => inf.descripcion === i.Descripcion && inf.monto === Number(i.Monto));
                    if(!exists) { newIngresosFijos.push({ id: i.ID || generateId(), descripcion: i.Descripcion || 'Ingreso Fijo', persona: i.Persona || '', tipo: i.Tipo || 'Fijo', cuentaName: i.CuentaName || '', monto: Number(i.Monto) || 0 }); totalImportados++; }
                });
              }

              setAllState({
                  ...stateData, 
                  ingresos: newIngresos, egresos: newEgresos, 
                  cuentas: newCuentas, transferencias: newTransferencias,
                  pagosFijos: newPagosFijos, presupuestos: newPresupuestos,
                  ingresosFijos: newIngresosFijos
              });
              
              showToast(totalImportados > 0 ? `Importación Maestra completada: ${totalImportados} registros nuevos agregados.` : "No se detectaron cambios/registros nuevos.");
            } catch(err) { showToast("Error procesando la Plantilla Maestra.", "error"); console.error(err); }
          };
          reader.readAsBinaryString(file);
        } catch (err) { showToast("No se pudo cargar la herramienta de Excel.", "error"); }
        e.target.value = '';
      };

      return (
        <div className="max-w-3xl mx-auto animate-in fade-in duration-500 space-y-6 pb-20 md:pb-0">
          <header><h1 className="text-2xl md:text-3xl font-bold text-white tracking-tight flex items-center gap-2 md:gap-3"><Settings2 className="h-6 w-6 md:h-8 md:w-8 text-slate-400" /> Sistema y Ajustes</h1><p className="text-sm md:text-base text-slate-400 mt-1">Exporta toda tu base de datos a Excel, o carga una plantilla completa con todas las pestañas.</p></header>
          
          <h2 className="text-lg font-bold text-white mt-8 mb-2">Plantilla Maestra (Excel)</h2>

// --- MAIN APP (CON FIREBASE, FILTROS Y SCORE CORREGIDO) ---
    function App() {
      const [appCargando, setAppCargando] = useState(true);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [selectedMonth, setSelectedMonth] = useState(() => new Date().toISOString().slice(0, 7));
      const [showMobileMore, setShowMobileMore] = useState(false);
      const [toast, setToast] = useState(null);
      const [filtroPersona, setFiltroPersona] = useState('Total'); 

      const showToast = (msg, type = 'success') => { setToast({ msg, type }); setTimeout(() => setToast(null), 3000); };
      const changeMonth = (offset) => { const [year, month] = selectedMonth.split('-'); const date = new Date(year, parseInt(month) - 1 + offset, 1); setSelectedMonth(date.toISOString().slice(0, 7)); };
      const getMonthName = (ym) => { const [year, month] = ym.split('-'); const date = new Date(year, parseInt(month) - 1, 1); return date.toLocaleString('es-ES', { month: 'long', year: 'numeric' }); };

      // ============================================================================
      // 🚀 MOTOR DE SINCRONIZACIÓN FIREBASE (Anti-colisiones)
      // ============================================================================
      const syncToFirestore = async (collectionName, prevArray, nextArray) => {
         const prevMap = new Map(prevArray.map(item => [item.id, item]));
         const nextMap = new Map(nextArray.map(item => [item.id, item]));
         const operations = [];

         prevArray.forEach(item => {
             if (!nextMap.has(item.id)) operations.push({ type: 'delete', id: item.id });
         });
         nextArray.forEach(item => {
             const prevItem = prevMap.get(item.id);
             if (!prevItem || JSON.stringify(prevItem) !== JSON.stringify(item)) {
                 operations.push({ type: 'set', id: item.id, data: item });
             }
         });

         for (let i = 0; i < operations.length; i += 450) {
             const batch = db.batch();
             const chunk = operations.slice(i, i + 450);
             chunk.forEach(op => {
                 const docRef = db.collection(collectionName).doc(op.id);
                 if (op.type === 'delete') batch.delete(docRef);
                 else batch.set(docRef, op.data);
             });
             await batch.commit().catch(err => console.error(`Error sincronizando ${collectionName}`, err));
         }
      };

      const useFirestoreState = (collectionName) => {
          const [state, _setState] = useState([]);
          const setState = (action) => {
              _setState(prev => {
                  const next = typeof action === 'function' ? action(prev) : action;
                  syncToFirestore(collectionName, prev, next);
                  return next;
              });
          };
          return [state, setState, _setState];
      };

      const [cuentas, setCuentas, _setCuentas] = useFirestoreState('cuentas');
      const [transferencias, setTransferencias, _setTransferencias] = useFirestoreState('transferencias');
      const [ingresos, setIngresos, _setIngresos] = useFirestoreState('ingresos');
      const [egresos, setEgresos, _setEgresos] = useFirestoreState('egresos');
      const [comprasCuotas, setComprasCuotas, _setComprasCuotas] = useFirestoreState('comprasCuotas');
      const [presupuestos, setPresupuestos, _setPresupuestos] = useFirestoreState('presupuestos');
      const [pagosFijos, setPagosFijos, _setPagosFijos] = useFirestoreState('pagosFijos');
      const [ingresosFijos, setIngresosFijos, _setIngresosFijos] = useFirestoreState('ingresosFijos');
      const [scoreHistory, setScoreHistory] = useState({});

      useEffect(() => {
        const unsubCuentas = db.collection('cuentas').onSnapshot(snap => _setCuentas(snap.docs.map(d => d.data())));
        const unsubTrans = db.collection('transferencias').onSnapshot(snap => _setTransferencias(snap.docs.map(d => d.data())));
        const unsubIngresos = db.collection('ingresos').onSnapshot(snap => _setIngresos(snap.docs.map(d => d.data())));
        const unsubEgresos = db.collection('egresos').onSnapshot(snap => _setEgresos(snap.docs.map(d => d.data())));
        const unsubCuotas = db.collection('comprasCuotas').onSnapshot(snap => _setComprasCuotas(snap.docs.map(d => d.data())));
        const unsubPres = db.collection('presupuestos').onSnapshot(snap => _setPresupuestos(snap.docs.map(d => d.data())));
        const unsubPagos = db.collection('pagosFijos').onSnapshot(snap => _setPagosFijos(snap.docs.map(d => d.data())));
        const unsubIngFijos = db.collection('ingresosFijos').onSnapshot(snap => _setIngresosFijos(snap.docs.map(d => d.data())));
        
        const unsubScore = db.collection('sistema').doc('scoreHistory').onSnapshot(snap => {
            if(snap.exists) setScoreHistory(snap.data());
        });

        setTimeout(() => setAppCargando(false), 1500); 

        return () => {
            unsubCuentas(); unsubTrans(); unsubIngresos(); unsubEgresos(); 
            unsubCuotas(); unsubPres(); unsubPagos(); unsubIngFijos(); unsubScore();
        };
      }, []);

      const setAllState = (parsed) => {
        if (parsed.cuentas) setCuentas(parsed.cuentas);
        if (parsed.transferencias) setTransferencias(parsed.transferencias);
        if (parsed.ingresos) setIngresos(parsed.ingresos);
        if (parsed.egresos) setEgresos(parsed.egresos);
        if (parsed.presupuestos) setPresupuestos(parsed.presupuestos);
        if (parsed.pagosFijos) setPagosFijos(parsed.pagosFijos);
        if (parsed.comprasCuotas) setComprasCuotas(parsed.comprasCuotas);
        if (parsed.ingresosFijos) setIngresosFijos(parsed.ingresosFijos);
      };

      const addPagoFijoToState = (pf) => {
        setPagosFijos(prev => [...prev, { ...pf, id: generateId(), diaPago: pf.diaPago || 1, categoria: pf.categoria || 'Otros' }]);
      };

      const categoriasMaestras = useMemo(() => {
        const cats = new Set(['Inversión', 'Gasolina', 'Mercado', 'Mercado Aseo', 'Aseo hogar', 'Botellón Agua']);
        presupuestos.forEach(p => cats.add(String(p.categoria)));
        pagosFijos.forEach(pf => { if (pf.categoria && pf.categoria !== 'Otros') cats.add(String(pf.categoria)); });
        egresos.forEach(e => { if (e.categoria && e.categoria !== 'Otros') cats.add(String(e.categoria)); });
        return Array.from(cats).sort();
      }, [presupuestos, pagosFijos, egresos]);

      const calculatedAccounts = useMemo(() => {
        const accMap = {};
        cuentas.forEach(c => { 
            accMap[c.id] = { 
                ...c, 
                currentBalance: Number(c.initialBalance) || 0, 
                currentDebt: Number(c.initialDebt) || 0,
                montoPrestado: Number(c.montoPrestado) || Number(c.initialDebt) || 0, 
                totalPagado: Number(c.totalPagadoPrevio) || 0,
                lastPaymentDate: c.lastPaymentDate || null
            }; 
        });
        
        ingresos.forEach(i => { if(accMap[i.cuentaId]) accMap[i.cuentaId].currentBalance += Number(i.monto); });
        
        const sortedEgresos = [...egresos].sort((a,b) => new Date(a.fecha) - new Date(b.fecha));
        
        sortedEgresos.forEach(e => {
           if(accMap[e.cuentaId]) {
              if (['credit', 'loan'].includes(accMap[e.cuentaId].type)) accMap[e.cuentaId].currentDebt += Number(e.monto);
              else accMap[e.cuentaId].currentBalance -= Number(e.monto);
           }
           
           if (e.deudaId && accMap[e.deudaId]) {
               let account = accMap[e.deudaId];
               account.totalPagado += Number(e.monto);
               
               if (account.type === 'loan') {
                   let capital = Number(e.monto);
                   if (account.lastPaymentDate) {
                       const diffTime = Math.abs(new Date(e.fecha) - new Date(account.lastPaymentDate));
                       const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));
                       const tasaDiaria = Math.pow(1 + account.tasaEA / 100, 1 / 360) - 1;
                       const interes = account.currentDebt * tasaDiaria * diffDays;
                       capital = Number(e.monto) - interes;
                   } else {
                       const tasaMensual = getTasaMensual(account.tasaEA);
                       const interes = account.currentDebt * tasaMensual;
                       capital = Number(e.monto) - interes;
                   }
                   account.lastPaymentDate = e.fecha; 
                   account.currentDebt -= capital;    
               } else {
                   account.currentDebt -= Number(e.monto);
               }
               if(account.currentDebt < 0) account.currentDebt = 0;
           }
        });
        
        transferencias.forEach(t => {
           if(accMap[t.fromId]) {
               if (['credit', 'loan'].includes(accMap[t.fromId].type)) accMap[t.fromId].currentDebt += Number(t.monto);
               else accMap[t.fromId].currentBalance -= Number(t.monto);
           }
           if(accMap[t.toId]) {
               if (['credit', 'loan'].includes(accMap[t.toId].type)) {
                   accMap[t.toId].currentDebt -= Number(t.monto);
                   if(accMap[t.toId].currentDebt < 0) accMap[t.toId].currentDebt = 0;
               }
               else accMap[t.toId].currentBalance += Number(t.monto);
           }
        });
        return Object.values(accMap);
      }, [cuentas, ingresos, egresos, transferencias]);

      const getOwnerFallback = (text) => {
         if (!text) return 'Shared';
         const t = text.toUpperCase();
         const hasL = t.includes('LEO') || t.endsWith(' L') || t.includes(' L ');
         const hasA = t.includes('ANDRE') || t.includes('ANDRÉ') || t.endsWith(' A') || t.includes(' A ');
         if (hasL && !hasA) return 'Leo';
         if (hasA && !hasL) return 'Andre';
         return 'Shared';
      };

      const belongsToFilter = (itemOwner) => filtroPersona === 'Total' || itemOwner === 'Shared' || itemOwner === filtroPersona;

      const activeCalculatedAccounts = useMemo(() => calculatedAccounts.filter(c => belongsToFilter(c.ownerId || getOwnerFallback(c.name))), [calculatedAccounts, filtroPersona]);

      const activeIngresos = useMemo(() => ingresos.filter(i => {
         const ownerAcc = cuentas.find(c => c.id === i.cuentaId);
         const accOwner = ownerAcc ? (ownerAcc.ownerId || getOwnerFallback(ownerAcc.name)) : 'Shared';
         const itemOwner = i.ownerId || getOwnerFallback(i.persona + ' ' + i.descripcion);
         return belongsToFilter(accOwner !== 'Shared' ? accOwner : itemOwner);
      }), [ingresos, cuentas, filtroPersona]);

      const activeEgresos = useMemo(() => egresos.filter(e => {
         const ownerAcc = cuentas.find(c => c.id === e.cuentaId);
         const accOwner = ownerAcc ? (ownerAcc.ownerId || getOwnerFallback(ownerAcc.name)) : 'Shared';
         const itemOwner = e.ownerId || getOwnerFallback(e.descripcion + ' ' + e.categoria);
         return belongsToFilter(accOwner !== 'Shared' ? accOwner : itemOwner);
      }), [egresos, cuentas, filtroPersona]);

      const activePagosFijos = useMemo(() => pagosFijos.filter(pf => belongsToFilter(pf.ownerId || getOwnerFallback(pf.descripcion + ' ' + pf.categoria))), [pagosFijos, filtroPersona]);
      
      const activeIngresosFijos = useMemo(() => {
        const currentMonthNum = selectedMonth.split('-')[1];
        return ingresosFijos.filter(inf => {
           const passFilter = belongsToFilter(inf.ownerId || getOwnerFallback(inf.descripcion + ' ' + inf.persona));
           const descLower = inf.descripcion.toLowerCase();
           const isPrima1 = descLower.includes('prima 1');
           const isPrima2 = descLower.includes('prima 2');
           
           let passMonth = true;
           if (isPrima1) passMonth = currentMonthNum === '07';
           else if (isPrima2) passMonth = currentMonthNum === '12';
           else if (descLower.includes('prima')) passMonth = currentMonthNum === '07' || currentMonthNum === '12';
           
           return passFilter && passMonth;
        });
      }, [ingresosFijos, filtroPersona, selectedMonth]);
      
      const activePresupuestos = useMemo(() => presupuestos.filter(p => belongsToFilter(p.ownerId || getOwnerFallback(p.categoria))), [presupuestos, filtroPersona]);

      const activeComprasCuotas = useMemo(() => comprasCuotas.filter(c => {
         const ownerAcc = cuentas.find(acc => acc.id === c.tarjetaId);
         const accOwner = ownerAcc ? (ownerAcc.ownerId || getOwnerFallback(ownerAcc.name)) : 'Shared';
         const itemOwner = c.ownerId || getOwnerFallback(c.descripcion);
         return belongsToFilter(accOwner !== 'Shared' ? accOwner : itemOwner);
      }), [comprasCuotas, cuentas, filtroPersona]);
      
      const activeTransferencias = useMemo(() => transferencias.filter(t => {
         const ownerFromAcc = cuentas.find(c => c.id === t.fromId);
         const ownerToAcc = cuentas.find(c => c.id === t.toId);
         const ownerFrom = ownerFromAcc ? (ownerFromAcc.ownerId || getOwnerFallback(ownerFromAcc.name)) : 'Shared';
         const ownerTo = ownerToAcc ? (ownerToAcc.ownerId || getOwnerFallback(ownerToAcc.name)) : 'Shared';
         return belongsToFilter(ownerFrom) || belongsToFilter(ownerTo);
      }), [transferencias, cuentas, filtroPersona]);

      const isThisMonth = (fecha) => fecha && fecha.startsWith(selectedMonth);
      const ingresosMesTotal = useMemo(() => activeIngresos.filter(i => isThisMonth(i.fecha)).reduce((s, i) => s + Number(i.monto), 0), [activeIngresos, selectedMonth]);
      const egresosMesTotal = useMemo(() => activeEgresos.filter(e => isThisMonth(e.fecha)).reduce((s, e) => s + Number(e.monto), 0), [activeEgresos, selectedMonth]);
      const egresosMes = activeEgresos.filter(e=>e.fecha.startsWith(selectedMonth));
      
      const cuotasMesTotal = useMemo(() => activeCalculatedAccounts.filter(c => ['credit', 'loan'].includes(c.type) && c.currentDebt > 0).reduce((s, c) => s + Number(c.cuotaMinima), 0), [activeCalculatedAccounts]);
      
      const pagosDeCuotasEsteMes = egresosMes.filter(e => e.tipo === 'Fijo' && (e.categoria.toLowerCase().includes('tarjeta') || e.categoria.toLowerCase().includes('crédito') || e.categoria.toLowerCase().includes('vehículo') || e.categoria.toLowerCase().includes('davibank'))).reduce((sum, e) => sum + e.monto, 0);
      const cuotasMesRestantes = Math.max(0, cuotasMesTotal - pagosDeCuotasEsteMes);

      const flujoNetoMes = ingresosMesTotal - egresosMesTotal - cuotasMesRestantes;
      
      const liquidezTotal = useMemo(() => activeCalculatedAccounts.filter(c => ['bank', 'cash', 'pocket'].includes(c.type)).reduce((s, c) => s + c.currentBalance, 0), [activeCalculatedAccounts]);
      const deudaTotal = useMemo(() => activeCalculatedAccounts.filter(c => ['credit', 'loan'].includes(c.type)).reduce((s, c) => s + c.currentDebt, 0), [activeCalculatedAccounts]);
      
      const tasaEndeudamiento = ingresosMesTotal > 0 ? (cuotasMesTotal / ingresosMesTotal) * 100 : 0;
      const tasaAhorro = ingresosMesTotal > 0 ? (flujoNetoMes > 0 ? (flujoNetoMes / ingresosMesTotal) * 100 : 0) : 0;

      // ✨ NUEVO ALGORITMO DE SCORE
      const scoreData = useMemo(() => {
        if (ingresosMesTotal === 0 && egresosMesTotal === 0 && cuotasMesTotal === 0 && liquidezTotal === 0) {
          return {
            score: 0,
            desglose: [{ text: 'Aún no hay datos registrados este mes.', pts: 0, type: 'neutral' }],
            recs: [{ico: '📝', title: 'Empieza tu registro', txt: 'Añade ingresos y gastos para que el sistema evalúe tu salud financiera.'}]
          };
        }

        let scr = 100;
        const desgloseArr = [{ text: 'Puntaje Base Ideal', pts: 100, type: 'success' }];
        const rr = [];

        if (flujoNetoMes < 0) {
          scr -= 40;
          desgloseArr.push({ text: 'Flujo de caja mensual negativo', pts: -40, type: 'danger' });
          rr.push({ico: '⚠️', title: 'Flujo Crítico', txt: 'Tus compromisos superan tus ingresos.'});
        }

        if (cuotasMesTotal > ingresosMesTotal * 0.4 && ingresosMesTotal > 0) {
          scr -= 25;
          desgloseArr.push({ text: 'Deudas superan el 40% del ingreso', pts: -25, type: 'danger' });
          rr.push({ico: '🛡️', title: 'Riesgo de Sobreendeudamiento', txt: 'Usa la estrategia Avalancha en la pestaña Deudas para liberar liquidez.'});
        }

        const tieneAhorroProgramado = activePagosFijos.some(pf => pf.categoria === 'Inversión' || pf.descripcion.toLowerCase().includes('ahorro'));
        if (!tieneAhorroProgramado && ingresosMesTotal > 0) {
          scr -= 10;
          desgloseArr.push({ text: 'No hay ahorros/inversión programados', pts: -10, type: 'warning' });
          rr.push({ico: '🎯', title: 'Falta de Dirección', txt: 'Usa el Simulador para definir un Plan de Ahorro y asúmelo como pago fijo.'});
        }

        if (tasaAhorro < 10 && ingresosMesTotal > 0 && tieneAhorroProgramado) {
          scr -= 15;
          desgloseArr.push({ text: 'Tasa de ahorro mensual muy baja (< 10%)', pts: -15, type: 'warning' });
        }

        if (scr === 100) {
           desgloseArr.push({ text: '¡Sin penalizaciones!', pts: 0, type: 'success' });
        }

        return { score: Math.max(0, scr), desglose: desgloseArr, recs: rr };
      }, [flujoNetoMes, cuotasMesTotal, ingresosMesTotal, tasaAhorro, activePagosFijos, liquidezTotal]);

      useEffect(() => {
        const currentMonthStr = new Date().toISOString().slice(0, 7);
        if (selectedMonth === currentMonthStr && !appCargando) {
          setScoreHistory(prev => {
            if (prev[selectedMonth] !== scoreData.score) {
              const next = { ...prev, [selectedMonth]: scoreData.score };
              db.collection('sistema').doc('scoreHistory').set(next, {merge: true});
              return next;
            }
            return prev;
          });
        }
      }, [scoreData.score, selectedMonth, appCargando]);

      if (appCargando) {
        return (
          <div className="flex flex-col items-center justify-center h-screen bg-[#0f0f11]">
             <div className="w-10 h-10 border-4 border-[#333] border-t-indigo-500 rounded-full animate-spin mb-4"></div>
             <p className="text-slate-400 font-medium">Sincronizando con la nube...</p>
          </div>
        );
      }

      const navItems = [
        { id: 'dashboard', label: 'Inicio', icon: LayoutDashboard },
        { id: 'ingresos', label: 'Ingresos', icon: Wallet },
        { id: 'egresos', label: 'Egresos', icon: Receipt }, 
        { id: 'inversiones', label: 'Inversión y ahorro', icon: PiggyBank }, 
        { id: 'score', label: 'Score Familia', icon: Activity },
        { id: 'cuentas', label: 'Cuentas', icon: Landmark },
        { id: 'presupuestos', label: 'Presupuestos', icon: PieChart },
        { id: 'deudas', label: 'Deudas', icon: ShieldAlert },
        { id: 'simulador', label: 'Simuladores', icon: Calculator },
        { id: 'settings', label: 'Ajustes', icon: Settings2 },
      ];

      return (
        <div className="min-h-screen bg-[#0f0f11] text-slate-200 flex flex-col md:flex-row font-sans">
          <Toast toast={toast} onClose={() => setToast(null)} />
          
          <aside className="hidden md:flex w-64 bg-[#17171a] border-r border-slate-800 flex-shrink-0 flex-col relative z-20">
            <div className="p-6 border-b border-slate-800">
              <h1 className="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                <div className="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center font-serif">F</div>
                FinanzasFamilia
              </h1>
            </div>
            <div className="px-4 pt-4 pb-2 border-b border-slate-800/50 bg-slate-900/30">
              <p className="text-[10px] text-slate-500 uppercase tracking-wider font-bold mb-1">Resumen del Mes</p>
              <p className={`text-xl font-black ${flujoNetoMes >= 0 ? 'text-indigo-400' : 'text-rose-500'}`}>{formatCOP(flujoNetoMes)}</p>
              <p className="text-[10px] text-slate-400">Flujo Libre {getMonthName(selectedMonth).split(' ')[0]}</p>
              <div className="mt-3 flex items-center justify-between text-[10px] mb-1">
                <span className="text-slate-400 font-medium">Score Salud</span>
                {/* ✨ CORRECCIÓN EN EL SIDEBAR */}
                <span className="font-bold text-emerald-400">{scoreData.score}/100</span>
              </div>
              <div className="w-full bg-slate-800 rounded-full h-1.5">
                <div className={`h-full rounded-full transition-all duration-1000 ${scoreData.score >= 80 ? 'bg-emerald-500' : scoreData.score >= 50 ? 'bg-amber-500' : 'bg-rose-500'}`} style={{width: `${scoreData.score}%`}}></div>
              </div>
            </div>
            <nav className="flex-1 p-4 space-y-1 overflow-y-auto [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none]">
              <div className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2 mt-2 px-4">Diario</div>
              {navItems.slice(0, 4).map(item => {
                const Icon = item.icon;
                return (
                  <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-all ${activeTab === item.id ? 'bg-indigo-600/10 text-indigo-400 border border-indigo-500/20' : 'text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 border border-transparent'}`}>
                    <Icon size={18} className={activeTab === item.id ? 'text-indigo-400' : 'text-slate-500'} /> {item.label}
                  </button>
                );
              })}
              <div className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2 mt-6 px-4">Futuro y Proyección</div>
              {navItems.slice(4, 9).map(item => {
                const Icon = item.icon;
                return (
                  <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-all ${activeTab === item.id ? 'bg-indigo-600/10 text-indigo-400 border border-indigo-500/20' : 'text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 border border-transparent'}`}>
                    <Icon size={18} className={activeTab === item.id ? 'text-indigo-400' : 'text-slate-500'} /> {item.label}
                  </button>
                );
              })}
              <div className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2 mt-6 px-4">Sistema</div>
              {navItems.slice(9).map(item => {
                const Icon = item.icon;
                return (
                  <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-all ${activeTab === item.id ? 'bg-indigo-600/10 text-indigo-400 border border-indigo-500/20' : 'text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 border border-transparent'}`}>
                    <Icon size={18} className={activeTab === item.id ? 'text-indigo-400' : 'text-slate-500'} /> {item.label}
                  </button>
                );
              })}
            </nav>
          </aside>

          <main className="flex-1 flex flex-col h-screen overflow-hidden relative z-10 pb-[72px] md:pb-0">
            <div className="bg-[#17171a] border-b border-slate-800 p-3 md:p-4 flex flex-col md:flex-row justify-between items-center shadow-md gap-4">
          <div className="flex items-center w-full md:w-auto justify-center md:justify-start">
                 {/* ✨ CONDICIÓN: Solo mostrar el filtro en estas 3 pestañas */}
                 {['ingresos', 'cuentas', 'deudas'].includes(activeTab) && (
                   <div className="flex bg-slate-900 rounded-lg p-1 border border-slate-700 text-xs font-bold w-full md:w-auto shadow-inner">
                     <button onClick={() => setFiltroPersona('Total')} className={`flex-1 md:px-6 py-2 rounded-md transition-all duration-200 ${filtroPersona === 'Total' ? 'bg-indigo-600 text-white shadow-md transform scale-105' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}>TOTAL</button>
                     <button onClick={() => setFiltroPersona('Andre')} className={`flex-1 md:px-6 py-2 rounded-md transition-all duration-200 ${filtroPersona === 'Andre' ? 'bg-rose-600 text-white shadow-md transform scale-105' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}>ANDRE</button>
                     <button onClick={() => setFiltroPersona('Leo')} className={`flex-1 md:px-6 py-2 rounded-md transition-all duration-200 ${filtroPersona === 'Leo' ? 'bg-emerald-600 text-white shadow-md transform scale-105' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}>LEO</button>
                   </div>
                 )}
               </div>

               <div className="flex-1 flex justify-center md:justify-end w-full md:w-auto">
                 <div className="flex items-center bg-slate-900 rounded-lg p-1 border border-slate-700 w-full md:max-w-[240px] justify-between shadow-inner">
                   <button onClick={() => changeMonth(-1)} className="p-2 text-slate-400 hover:text-indigo-400 hover:bg-slate-800 rounded transition-colors"><ChevronLeft size={18}/></button>
                   <span className="font-bold text-white capitalize px-2 text-sm text-center truncate">{getMonthName(selectedMonth)}</span>
                   <button onClick={() => changeMonth(1)} className="p-2 text-slate-400 hover:text-indigo-400 hover:bg-slate-800 rounded transition-colors"><ChevronRight size={18}/></button>
                 </div>
               </div>
            </div>

            <div className="p-4 md:p-8 overflow-y-auto flex-1 [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none]">
              <div className="max-w-6xl mx-auto">
                <ErrorBoundary>
                  {activeTab === 'dashboard' && <DashboardTab flujoNetoMes={flujoNetoMes} cuotasMesTotal={cuotasMesTotal} cuotasMesRestantes={cuotasMesRestantes} ingresosMesTotal={ingresosMesTotal} egresosMesTotal={egresosMesTotal} deudaTotal={deudaTotal} liquidezTotal={liquidezTotal} selectedMonth={selectedMonth} egresosMes={egresosMes} ingresos={activeIngresos} egresos={activeEgresos} presupuestos={activePresupuestos} pagosFijos={activePagosFijos} ingresosFijos={activeIngresosFijos} cuentas={activeCalculatedAccounts} />}
                  {/* ✨ CORRECCIÓN EN EL LLAMADO A SCORETAB */}
                  {activeTab === 'score' && <ScoreTab scoreData={scoreData} scoreHistory={scoreHistory} selectedMonth={selectedMonth} presupuestos={activePresupuestos} egresosMes={egresosMes} cuentas={activeCalculatedAccounts} ingresosMesTotal={ingresosMesTotal} egresosMesTotal={egresosMesTotal} cuotasMesTotal={cuotasMesTotal} />}
                  {activeTab === 'cuentas' && <CuentasTab cuentas={activeCalculatedAccounts} setCuentas={setCuentas} transferencias={activeTransferencias} setTransferencias={setTransferencias} egresos={egresos} setEgresos={setEgresos} showToast={showToast} />}
                  {activeTab === 'ingresos' && <IngresosTab ingresos={activeIngresos} setIngresos={setIngresos} ingresosFijos={activeIngresosFijos} cuentas={activeCalculatedAccounts} selectedMonth={selectedMonth} showToast={showToast} filtroPersona={filtroPersona} />}
                  {activeTab === 'egresos' && <EgresosTab egresos={activeEgresos} setEgresos={setEgresos} pagosFijos={activePagosFijos} setPagosFijos={setPagosFijos} cuentas={activeCalculatedAccounts} selectedMonth={selectedMonth} presupuestos={activePresupuestos} comprasCuotas={activeComprasCuotas} setComprasCuotas={setComprasCuotas} categoriasMaestras={categoriasMaestras} showToast={showToast} />}
                  {activeTab === 'presupuestos' && <PresupuestosTab presupuestos={activePresupuestos} setPresupuestos={setPresupuestos} pagosFijos={activePagosFijos} setPagosFijos={setPagosFijos} egresos={activeEgresos} selectedMonth={selectedMonth} showToast={showToast} categoriasMaestras={categoriasMaestras} />}
                  {activeTab === 'deudas' && <DeudasTab cuentas={activeCalculatedAccounts} setCuentas={setCuentas} showToast={showToast} />}
                  {activeTab === 'inversiones' && <InversionesTab cuentas={activeCalculatedAccounts} setCuentas={setCuentas} ingresos={ingresos} setIngresos={setIngresos} egresos={egresos} transferencias={transferencias} selectedMonth={selectedMonth} showToast={showToast} getOwner={getOwnerFallback} />}
                  {activeTab === 'simulador' && <SimuladorTab cuentas={activeCalculatedAccounts} addPagoFijo={addPagoFijoToState} showToast={showToast} />}
                  {activeTab === 'settings' && <SettingsTab stateData={{cuentas, transferencias, ingresos, egresos, presupuestos, pagosFijos, comprasCuotas, ingresosFijos}} setAllState={setAllState} selectedMonth={selectedMonth} showToast={showToast} />}
                </ErrorBoundary>
              </div>
            </div>
          </main>

          {/* ✨ NUEVA BARRA DE NAVEGACIÓN MÓVIL DESLIZABLE (Swipe) */}
          <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-[#17171a] border-t border-slate-800 z-50 flex overflow-x-auto [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none] h-[72px]">
            <div className="flex px-1 min-w-max w-full">
              {navItems.map(item => {
                const Icon = item.icon;
                const isActive = activeTab === item.id;
                return (
                  <button 
                    key={item.id} 
                    onClick={() => setActiveTab(item.id)} 
                    className={`w-[76px] flex flex-col items-center justify-center p-2 transition-colors flex-shrink-0 ${isActive ? 'text-indigo-400' : 'text-slate-500 hover:text-slate-300'}`}
                  >
                    <Icon size={24} className={isActive ? 'mb-1 text-indigo-400' : 'mb-1 opacity-70 text-slate-500'} />
                    <span className={`text-[10px] font-medium truncate w-full text-center ${isActive ? 'font-bold text-indigo-400' : 'text-slate-500'}`}>
                      {item.label}
                    </span>
                  </button>
                );
              })}
            </div>
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
