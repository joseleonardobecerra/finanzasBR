<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0f11">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135706.png">

  <title>Finanzas Familia - Master Excel & Cloud</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      document.getElementById('root').innerHTML = `
        <div style="padding: 20px; color: #ff8080; font-family: sans-serif; background-color: #0f0f11; height: 100vh;">
          <h2 style="font-weight: bold; margin-bottom: 10px;">Oops! Error al cargar:</h2>
          <p>${message}</p>
          <p style="font-size: 12px; margin-top: 10px; color: #a0a0a0;">Línea: ${lineno} — Archivo: ${source}</p>
        </div>
      `;
      return true;
    };
  </script>
</head>
<body class="bg-[#0f0f11] text-slate-200">

  <div id="root">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;">
      <div style="width:40px;height:40px;border:4px solid #333;border-top:4px solid #4f46e5;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px;"></div>
      <p style="color:#94a3b8;font-size:14px;font-weight:500;">Conectando FinanzasFamilia...</p>
      <style>@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(registration => {
          console.log('SW registrado para instalación de App');
        }).catch(err => {
          console.log('Fallo el registro del SW: ', err);
        });
      });
    }
  </script>

  <script type="text/babel" src="globals.js"></script>
  
  <script type="text/babel" src="Login.js"></script>
  
  <script type="text/babel" src="DashboardTab.js"></script>
  <script type="text/babel" src="AnaliticaTab.js"></script>
  <script type="text/babel" src="ScoreTab.js"></script>
  <script type="text/babel" src="CuentasTab.js"></script>
  <script type="text/babel" src="IngresosTab.js"></script>
  <script type="text/babel" src="EgresosTab.js"></script>
  <script type="text/babel" src="InversionesTab.js"></script>
  <script type="text/babel" src="PresupuestosTab.js"></script>
  <script type="text/babel" src="DeudasTab.js"></script>
  <script type="text/babel" src="SimuladorTab.js"></script>
  <script type="text/babel" src="SettingsTab.js"></script>
  <script type="text/babel" src="App.js"></script>

</body>
</html>
