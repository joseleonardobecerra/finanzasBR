<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0c16">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" href="logo.png" type="image/png">
  <link rel="apple-touch-icon" href="logo.png">

  <title>Finanzas Familia - Master Excel & Cloud</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          },
          colors: {
            appbg: '#0b0c16',      /* Fondo principal azul oscuro ultra profundo */
            appcard: '#111222',    /* Fondo de las tarjetas, levemente más claro para contraste */
            neoncyan: '#00E5FF',   /* Acento principal: Cyan brillante */
            neonmagenta: '#FF007A',/* Acento secundario: Magenta/Rosa brillante */
          },
          boxShadow: {
            /* Sombra hacia afuera para dar relieve (Neumorfismo) */
            'neumorph': '8px 8px 16px #05060b, -8px -8px 16px #111221',
            /* Sombra hacia adentro para inputs hundidos */
            'neumorph-inset': 'inset 4px 4px 8px #05060b, inset -4px -4px 8px #111221',
            /* Brillos de luz neón */
            'glow-cyan': '0 0 15px rgba(0, 229, 255, 0.4)',
            'glow-magenta': '0 0 15px rgba(255, 0, 122, 0.4)',
            'glow-amber': '0 0 15px rgba(251, 191, 36, 0.4)',
          }
        }
      }
    }
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

</head>
<body class="bg-appbg text-slate-200 font-sans antialiased selection:bg-neoncyan selection:text-appbg" style="background-color: #0b0c16;">
  
  <div id="root">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:'Outfit', sans-serif;">
      
      <img src="logo.png" alt="Logo" style="width:80px;height:80px;margin-bottom:16px;animation:pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;filter: drop-shadow(0 0 15px rgba(0,229,255,0.4));">
      
      <p style="color:#00E5FF;font-size:16px;font-weight:600;letter-spacing:1px;text-transform:uppercase;">Iniciando Sistema...</p>
      
      <style>
        @keyframes pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.6; transform: scale(0.95); }
        }
      </style>
      
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error: ', err));
      });
    }
  </script>

  <script type="text/babel" src="globals.js"></script>
  <script type="text/babel" src="Login.js"></script>
  <script type="text/babel" src="DashboardTab.js"></script>
  <script type="text/babel" src="AnaliticaTab.js"></script>
  <script type="text/babel" src="ScoreTab.js"></script>
  <script type="text/babel" src="CuentasTab.js"></script>
  <script type="text/babel" src="IngresosTab.js"></script>
  <script type="text/babel" src="EgresosTab.js"></script>
  <script type="text/babel" src="DeudasTab.js"></script>
  <script type="text/babel" src="InversionesTab.js"></script>
  <script type="text/babel" src="PresupuestosTab.js"></script>
  <script type="text/babel" src="SimuladorTab.js"></script>
  <script type="text/babel" src="SettingsTab.js"></script>
  <script type="text/babel" src="App.js"></script>
</body>
</html>
