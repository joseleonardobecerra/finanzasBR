<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas Familia - Egresos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-200">

    <aside class="w-64 border-r border-slate-800 flex flex-col p-4 bg-slate-950/50">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center font-bold text-white">F</div>
            <h1 class="font-bold text-lg tracking-tight">FinanzasFamilia</h1>
        </div>
        
        <nav class="flex-1 space-y-1">
            <a href="#" class="flex items-center gap-3 p-2 rounded-lg text-slate-400 hover:bg-slate-900 hover:text-white transition">
                <i data-lucide="layout-grid" class="w-4 h-4"></i> <span class="text-sm font-medium">Inicio</span>
            </a>
            <a href="#" class="flex items-center gap-3 p-2 rounded-lg bg-indigo-600/10 text-indigo-400">
                <i data-lucide="arrow-down-circle" class="w-4 h-4"></i> <span class="text-sm font-medium">Egresos</span>
            </a>
            <a href="#" class="flex items-center gap-3 p-2 rounded-lg text-slate-400 hover:bg-slate-900 hover:text-white transition">
                <i data-lucide="wallet" class="w-4 h-4"></i> <span class="text-sm font-medium">Cuentas</span>
            </a>
            <a href="#" class="flex items-center gap-3 p-2 rounded-lg text-slate-400 hover:bg-slate-900 hover:text-white transition">
                <i data-lucide="trending-down" class="w-4 h-4"></i> <span class="text-sm font-medium">Deudas</span>
            </a>
        </nav>

        <button class="flex items-center gap-3 p-2 rounded-lg text-red-400 hover:bg-red-400/10 transition mt-auto">
            <i data-lucide="log-out" class="w-4 h-4"></i> <span class="text-sm font-medium">Cerrar Sesión</span>
        </button>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden bg-slate-950">
        <header class="h-16 border-b border-slate-900 flex items-center justify-between px-8 bg-slate-950/50">
            <h2 class="font-bold text-slate-400 text-sm uppercase tracking-widest">Gestión de Egresos</h2>
            <div class="flex items-center gap-4 bg-slate-900/50 px-4 py-1.5 rounded-lg border border-slate-800">
                <button class="text-slate-500 hover:text-white"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                <span class="text-xs font-bold">Abril de 2026</span>
                <button class="text-slate-500 hover:text-white"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 space-y-8 custom-scroll">
            
            <section>
                <div class="flex items-center justify-between mb-4">
                    <h3 class="flex items-center gap-2 font-bold text-slate-300">
                        <i data-lucide="check-square" class="w-5 h-5 text-orange-400"></i> 3. Pagos Fijos (Checklist)
                    </h3>
                </div>
                <div id="container-pagos-fijos" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-3">
                    </div>
            </section>

            <section class="glass-card rounded-xl overflow-hidden border border-slate-800">
                <div class="p-4 border-b border-slate-800 bg-slate-900/20 flex justify-between items-center">
                    <h3 class="flex items-center gap-2 font-bold text-slate-300">
                        <i data-lucide="list" class="w-5 h-5 text-indigo-400"></i> 4. Historial Completo de Egresos
                    </h3>
                    <div id="active-filters" class="flex gap-2"></div>
                </div>

                <div class="grid grid-cols-5 gap-4 px-6 py-3 bg-slate-900/40 border-b border-slate-800 text-[10px] font-black text-slate-500 uppercase tracking-widest">
                    <div class="flex items-center gap-2 cursor-pointer hover:text-white transition group" onclick="ordenar('fecha')">
                        FECHA <i data-lucide="arrow-up-down" class="w-3 h-3 opacity-0 group-hover:opacity-100 transition"></i>
                    </div>
                    <div class="flex items-center gap-2 cursor-pointer hover:text-white transition group" onclick="ordenar('descripcion')">
                        DESCRIPCIÓN <i data-lucide="arrow-up-down" class="w-3 h-3 opacity-0 group-hover:opacity-100 transition"></i>
                    </div>
                    <div class="flex items-center gap-2 relative">
                        <span class="cursor-pointer hover:text-white transition group" onclick="ordenar('tipo')">FIJO/VAR</span>
                        <button onclick="toggleFiltro('dropdown-tipo')" class="ml-auto hover:text-indigo-400"><i data-lucide="filter" class="w-3 h-3"></i></button>
                        <div id="dropdown-tipo" class="hidden absolute top-6 right-0 w-32 glass-card rounded-lg shadow-2xl z-20 p-1">
                            <button onclick="filtrar('tipo', 'Todos')" class="w-full text-left p-2 text-[10px] hover:bg-slate-800 rounded">TODOS</button>
                            <button onclick="filtrar('tipo', 'FIJO')" class="w-full text-left p-2 text-[10px] hover:bg-slate-800 rounded">FIJOS</button>
                            <button onclick="filtrar('tipo', 'VARIABLE')" class="w-full text-left p-2 text-[10px] hover:bg-slate-800 rounded">VARIABLES</button>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 relative">
                        <span class="cursor-pointer hover:text-white transition group" onclick="ordenar('categoria')">CATEGORÍA</span>
                        <button onclick="toggleFiltro('dropdown-cat')" class="ml-auto hover:text-indigo-400"><i data-lucide="filter" class="w-3 h-3"></i></button>
                        <div id="dropdown-cat" class="hidden absolute top-6 right-0 w-40 glass-card rounded-lg shadow-2xl z-20 p-1 max-h-40 overflow-y-auto custom-scroll">
                            </div>
                    </div>
                    <div class="flex items-center gap-2 cursor-pointer hover:text-white transition group justify-end" onclick="ordenar('monto')">
                        MONTO <i data-lucide="arrow-up-down" class="w-3 h-3 opacity-0 group-hover:opacity-100 transition"></i>
                    </div>
                </div>

                <div id="tabla-egresos" class="divide-y divide-slate-900 max-h-96 overflow-y-auto custom-scroll bg-slate-950/40">
                    </div>
            </section>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
